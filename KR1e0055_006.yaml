body:
  text: 讀春秋編卷六宋陳深撰文公名興僖公子母聲薑諡法慈惠愛民曰文忠信接禮曰文元年乙未春王正月公即位穀梁傳繼正即位正也二月癸亥日有食之公羊有朔字天王使叔服來會葬僖云夏四月葬而叔服二月來會先至何耶見王室弱而恐後期也杜氏注叔氏服字諸侯喪天子使大夫會葬禮也夏四月丁已葬我君僖公五月而葬內葬雖得禮亦書明臣子之義天王使毛伯來錫公命左氏傳王使毛伯衛來錫公命毛國伯爵衛毛伯字杜氏注諸侯即位天子錫以命圭合瑞為信劉氏權衡曰錫命者何命為諸侯也諸侯在喪稱子踰年即位喪畢以士服見於王王乃於廟命之古者五十而命至周喪畢則命焉喪未畢而命之非禮也既畢喪而不受命於天子亦非禮也劉氏曰諸侯在喪稱子踰年即位終喪受命正也晉侯伐衛左氏傳晉文公之季年諸侯朝晉衛成公不朝使孔達侵鄭伐綿訾及匡晉襄公既祥告于諸侯而伐衛及南陽先且音趄居曰效尤禍也請君朝王臣從師晉侯朝王于溫先且居胥臣伐衛五月辛酉朔晉師圍戚衛邑六月戊戌取之盟衛數被狄之虐不能報伐止于為侵又俯就而與之既不朝晉又侵與國此晉所以首伐衛經書晉之爵蓋亦與之也叔孫得臣如京師杜氏注得臣叔牙之孫氏左氏傳叔孫得臣如周拜髙郵孫曰文公即位未嘗如周而天子錫命公受命矣又不自朝而使得臣往其不臣可知矣衛人伐晉左氏傳晉圍戚取之獲孫昭子衛人告于陳陳共公曰更伐之我辭之見伐求和不競太甚故使報伐示已力足以距晉衛孔達帥師伐晉伐伯主聲罪致討不自反其不仁無禮之罪乃稱兵以之故書人罪孔達也秋公孫敖會晉侯于戚左傳晉侯疆戚田衛邑故公孫敖慶父子會之杜氏注戚衛地在頓丘衛縣西冬十月丁未楚世子商臣弒其君頵楚以夷僭王擅強暴淩蔑中國久矣至頵在位四十六年之久尤肆其虐齊桓服之晉文勝之稍戢楚用夷道徒知用兵衛外而不知治其內及城濮之敗其勢始沮內溺于愛訪諸令尹子上欲以商臣為太子子上諌以商臣有蜂目豺聲之忍不可立弗聽既而又欲立職而黜商臣而使江芉婦人知其情冝乎禍敗之及身吁積不善之餘殃而卒使反之于其子天之報施真可畏哉春秋書之不言其父而言其君稱世子以見有父之親稱其君以見有君之尊商臣於二者義絶也特書其惡使為君父者謹履霜之漸而為萬世之大戒也公孫敖如齊如齊始聘通嗣君也公孫敖穆伯也二年丙申春王二月甲子晉侯及秦師戰于彭衙秦師敗績秦孟明帥師伐晉以報殽之役晉侯禦之及秦師戰秦師敗績晉人謂秦拜賜之師孟明前言三年將拜君賜故晉人以此笑之程子曰越國襲人秦之罪也忘親背惠晉之惡也秦經人之國以襲逺雖憤無以為辭矣故其來不稱伐晉不諭秦而與戰故書晉及憤以取敗故書敗績丁丑作僖公主作主造木主也公羊傳主者曷用虞主用桑禮平明而葬日中而反虞練主用栗期年練祭也理虞主兩階之間用栗藏主也作僖公主何以書譏不時也穀梁傳譏其後也作木主欲俾神有所依故得象神而祭古者既葬作主于墓不終日而虞祭僖公薨已十五月方為主慢禮而忘親甚矣三月乙巳及晉處父盟左氏傳晉人以公不朝來討公公如晉晉人使陽處父盟公以耻之書曰及晉處父盟以厭之也厭於涉反猶損也適晉不書諱之也不書公如晉榖梁傳不言公處父伉也為公諱也杜氏注處父為晉正卿不能以禮匡君而親與公盟故貶其族不地者盟晉都盟于晉都而公不出恥甚矣故諱之胡氏傳不書公抑大夫之抗不使與公為敵正君臣之分也適晉不書反書不致為公諱恥存臣子之禮也夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴左氏傳公未至穆伯會諸侯及晉司空士縠盟于垂隴晉討衛故也陳侯為衛請成于晉執孔達以説杜氏注垂隴鄭地滎陽縣東有隴城自十有二月不雨至于秋七月此志其不雨之始終也八月之雨不言可見趙子曰夫子因舊史之書不雨告廟者則每時書之不告廟則通言之志其不敬以示義也八月丁卯大事于大廟躋僖公時祭稱有事祫祭稱大事公羊傳大事者大祫也合祭也毁廟之主陳于大祖未毁廟之主皆升合食于大祖躋者升也升僖公譏逆祀也僖公繼閔之後是為人後也文公乃任情謂僖實閔之兄而躋僖公於閔之上以兄弟一家之私恩忘繼世天下之大統其踰制失禮甚矣書曰躋自下而上之謂也冬晉人宋人陳人鄭人伐秦秦嘗入滑侵晉晉襄敗其師至于一再可以已矣而復會諸侯以逺伐報復無已殘民結怨故奪晉侯之爵而併諸侯皆貶以人公子遂如齊納幣僖公之喪未畢而使公子遂納幣于齊雖至四十一月方娶忘喪而行吉禮以娶為急其哀戚之情為何如故特書以譏之三年丁酉春王正月叔孫得臣會晉人宋人陳人衛人鄭人伐沈沈潰左氏傳莊叔會諸侯之師伐沈以其服於楚也沈潰凡民選其上曰潰在上曰逃杜氏注沈國名汝南平輿縣北有沈亭可晉襄圖霸盍先定規模再伐秦而又伐沈沈從楚固罪曽不自求所以紹霸之德政故春秋併與諸侯貶而人之夏五月王子虎卒翟泉之盟王人王子虎也盟左氏傳王叔文公卒來赴吊如同胡氏曰王子虎不書爵譏之也天子內臣無外交以同盟而致恩禮是以私情害公義也秦人伐晉左氏傳秦伯伐晉濟河焚舟取王官及郊晉地晉人不出遂自茅津濟封殽尸而還秦穆歸自殽而作秦誓然彭衙之及此役猶以報復為事豈非悔過之心不能勝其恥敗之心而至此乎秦伯書人罪之也晉不出知其嘗再敗有必死之志而不與抗可謂善審事勢也秋楚人圍江左氏傳楚人圍江晉先僕伐楚以救江雨螽于宋左氏傳隊而死也公羊傳記異也螽飛至宋隊地而死若而隊冬公如晉左氏傳晉人懼其無禮於公請改盟改二年處父盟公如晉及晉侯盟晉陽處父帥師伐楚以救江左氏傳晉以江故告于周王叔桓公晉陽處父伐楚以救江門于方城遇息公子朱而還子朱楚大夫伐江之帥也聞晉師起而江兵解故晉亦還楚商臣有覆載不容之罪而致患于江晉當乘此機以誅之大合諸侯聲罪以致天討始可以言霸矣縱未能誅之亦暴其惡於天下商臣何以立乎其上必有圗之者矣逺攻強國而付之一大夫豈能濟乎四年戊戌春公至自晉夏逆婦薑于齊程子曰納幣在喪中與昏喪同也稱婦薑已成婦也不稱夫人不可為小君奉宗廟也趙子曰以成禮于齊故變文云逆婦以譏之不書逆女而書逆婦則成禮于彼是公親逆非卿逆也經不書公責其非禮也不待至魯而先往成婚于齊故書婦不告廟故亦不書至不復成其夫人之禮故不稱夫人狄侵齊狄自箕之敗至是始復侵齊秋楚人滅江左氏傳楚人滅江秦伯為之降服素服出次辟正寢不舉去盛饌過數鄰國之禮有數今過之大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也江之不祀晉襄不能為之逺謀也晉侯伐秦左氏傳晉侯伐秦圍邧新城以報王官之役程子曰秦逞忿以伐晉晉畏而避之其見報乃常情也秦至此能悔過矣故不復報晉聖人取其能遷善也王官之役晉避秦師焚舟之鋭而不與戰可謂得計今不忍而又報伐晉嘗伐楚救江未數月而江為楚滅是可怒也況楚商臣弒逆之賊晉襄坐視其夷滅小弱安在其為盟主也以春秋比事觀之上書楚人滅江次書晉侯伐秦見晉侯於可伐者不伐可已者不已聖人罪晉之意彰矣冬衛侯使寧俞來聘左傳衛寧武子來聘冬十有一月壬寅夫人風氏薨程子曰自成風已後妾母稱夫人嫡妾亂矣仲子始僭尚未敢同嫡也陸淳曰亦書薨著其非禮胡氏曰風氏僖公之母莊公妾也而稱夫人自是嫡妾亂矣生以夫人之名稱號之其沒亦以夫人之卒葬之非所以正其分也禮庶子為君為其母無服不敢二尊者也春秋於成風名以其實不為異辭者謹禮之變也五年己亥春王正月王使榮叔歸含且賵含户暗切賵芳鳳切杜氏注珠玉曰含含口實車馬曰賵子連上文故不云歸某人含賵省文也然亦不欲以天而稱號之也故略之以天子之命而歸諸侯妾母之含賵非禮也況含未斂時所用成風死於十一月今踰二月矣無歸含之禮不稱天王弗克若天也成風以妾僭嫡而王命之亂夫婦之倫矣故不稱天以譏之三月辛亥葬我小君成風陸淳曰自葬成風之後乃有二夫人祔廟非禮也仲子雖聘而非惠公之嫡故特為宫而不祔于姑雖非禮典之正猶有所别異至成風以來妾母皆葬乃有二夫人祔廟魯之禮寖失正矣王使召穀梁作毛伯來會葬王使榮叔歸含賵又使卿會葬施於諸侯妾母恩數有加非禮也故王再不稱天以示貶公孫敖如晉王洊使大夫歸含賵會葬公不自朝王庭盍亦遣大夫往拜天子之禮不報而令公孫敖如晉徒知畏盟主而忘其君也秦人入鄀音若入左氏傳初鄀叛楚即秦又二於楚夏秦人鄀傳僖二十五年秦晉伐鄀鄀本在商密秦楚界上小國其後遷于南郡鄀縣今襄陽冝城縣有故城秋楚人滅六六國杜氏注今廬江六縣地譜壽州安豐縣有六國故城今屬安豐軍左氏傳六人叛楚即東夷秋楚成大心仲歸帥師滅六楚公子燮滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸忽然而亡德之不建民之無援哀哉六與蓼皆臯陶後秦楚乃戎蠻經書入鄀滅六著秦楚之強盛也冬十月甲申許男業卒僖公卒昭公立與魯僖公六同盟六年庚子春葬許僖公夏季孫行父如陳左氏傳臧文仲以陳衛之睦也欲求好於陳夏季文子聘於陳且娶焉行父季友之子也秋季孫行父如晉左氏傳季文子將聘于晉使求遭喪之禮以行聞晉侯有疾故其人從者曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害所謂文子三思八月乙亥晉侯歡卒左氏傳晉襄公卒靈公少晉人以難故欲立長君趙孟曰立公子雍好善而長先君愛之且近於秦秦舊好也乃使先蔑士會如秦立公子雍冬十月公子遂如晉葬晉襄公晉殺其大夫陽處父晉狐射姑出奔狄射音亦一音夜射姑狐偃子賈季也處案傳晉搜于夷命狐射姑將中軍趙盾佐之太傅陽父聘衛而至謂趙盾能乃以盾將中軍射姑佐之射姑怨陽子易其班使續鞫居殺處父晉殺續簡伯賈季奔狄考之榖梁氏處父密言於襄公易射姑君漏言致射姑殺處父故春秋書晉殺其大夫罪纍上也夫子贊易於節之二爻極言君臣慎密之戒此先書殺處父次書射姑奔狄射姑何為奔也見殺處父者射姑也閏月不告月猶朝于廟告月告朔也經書閏月不告月明當告也猶朝于廟幸其猶存朝廟之禮也即不許子貢去羊之意七年辛丑公伐邾三月甲戌取須句遂城郚魯屢伐邾嘗取須句得而遄失今間晉難又伐邾取須句因城郚以備邾郚魯邑卞縣南有郚城今屬襲慶府泗水縣夏四月宋公王臣卒宋人殺其大夫左氏傳宋成卒於是公子成為右師公孫友為左師樂豫為司馬鱗矔為司徒公子蕩為司城華御事為司寇昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根故君子以為比況國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圗之親之以德皆股肱也誰敢攜二若之何去不聽穆襄之族帥國人以攻公殺公孫固公孫鄭于宫六卿和公室樂豫舍司馬以讓公子卭昭公即位而葬劉氏曰其稱人以殺何衆殺之者也昭公欲去羣公子而反為穆襄之族所攻殺公孫固公孫鄭于宫蓋僅然後勝爾胡氏傳書宋人者國亂無政非君命而衆人擅殺之也大夫不名義繫於殺大夫而其名不足紀也戊子晉人及秦人戰于令平聲狐晉先蔑奔秦左氏傳秦康公送公子雍于晉穆嬴日抱大子以啼于朝趙盾與大夫患且畏逼乃背先蔑而立靈公以禦秦師潛師夜起戊子敗秦師于令狐先蔑奔秦士會從之劉氏曰此晉趙盾之師也其稱人何不與大夫專廢君也程氏曰晉始逆公子雍既而悔之故秦興兵以納之晉不謝秦秦納不正皆罪也故稱人晉懼秦之不肯已而擊之故書晉及是晉人為志手是戰故書晉及書晉及秦戰不言敗者秦之納不正與晉逆公子雍既悔之又不謝秦皆罪然二國之兵晉曲尤甚故秦伯趙盾皆稱人而特以晉及書且不書秦之敗深罪晉之置君而不定也狄侵我西鄙襄陵許氏曰狄懲箕之敗四年間一侵齊而未肆至是始復侵魯侵齊侵宋侵衛晉襄既沒莫之忌矣秋八月公會諸侯晉大夫盟于扈扈鄭地杜氏注滎陽卷縣西北有扈亭今鄭州原武縣盾左氏傳齊侯宋公衛侯陳侯鄭伯許男曹伯會晉趙盟于扈晉侯立故也公後至故不書所會凡會諸侯不書所會後也程子曰文公怠政事多廢弛既約晉盟而復後至故書往會而隱其不及不序諸侯以見其不在故明年公子遂再注與晉盟大靈公在抱以一趙盾而會諸侯春秋不書其名止書夫若曰晉大夫俱同會也不與盾之專也冬徐伐莒公孫敖如莒涖盟左氏傳徐伐莒莒人來請盟見伐故欲結援穆伯如莒涖盟盟已定而往臨涖之八年壬寅春王正月夏四月秋八月戊申天王崩襄王崩頃王立冬十月壬午公子遂會晉趙盾盟于衡雍雍於用切人左氏傳晉以扈之盟來討襄仲會晉趙孟盟于衡雍報扈之盟也衡雍鄭地後漢河南卷縣有垣雍城古衡雍也與扈相近征晉靈幼而魯文怠故國事歸二臣伐會盟專之自是政在大夫矣乙酉公子遂會雒戎盟于暴暴鄭地出公子遂以二事將命而會趙盾甫二日遂會伊雒之戎以戎而居洛邑天地之中逼近畿輔春秋兩書公子遂故特别之內外不可雜也公孫敖如京師不至而復丙戌奔莒左氏傳穆伯如周弔喪不至以幣奔莒從已氏焉已氏莒女公孫敖受命以赴天王之喪棄君命而徒返是可罪也況志在淫放其罪可勝誅哉春秋書其慢王棄君忘哀廢命容其復而後奔著魯之無政刑也螽解見桓五年宋人殺其大夫司馬宋司城來奔左氏傳宋襄夫人襄王之姊也昭公不禮焉昭公適祖母夫人因戴氏之族華粲皇皆戴族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死故書以官司城蕩意諸來奔效節于府人而出公以其官逆之皆復之呂氏曰守節以死者死其官也稱官以奔者得其職也昭公初立欲去羣公子而致殺大夫之變今又以不禮於君祖母致大臣或死或奔春秋皆以官書所以見六卿君所與圗政者司馬典兵之官而被殺則威權奪矣司城捍禦之任而出奔則君孤露矣故以國殺書之以罪昭公也九年癸卯春毛伯來求金書此與隱三年武氏子來求賻同義周室微弱王政不行貢賦不入故國家遇喪則匱乏乃遣使求賻求金於諸侯以濟其用諸侯又不供其喪致使來求無君之甚矣當喪未君百官總已以聼於冢宰故不稱使然味聖師之微旨當時魯史必稱之聖筆削之也削之者不欲言天子使求金止言毛伯則似毛伯私求之耳求賻亦若是矣夫人薑氏如齊杜氏注歸寧二月叔孫得臣如京師辛丑葬襄王葬天王而公不往使大夫行失禮也然此猶愈於不遣大夫者也晉人殺其大夫先都左氏傳夷之搜晉侯將登箕鄭父先都登之於上軍夷搜在六年而使士縠梁益耳將中軍士縠本司空先克曰狐趙之勳不可廢也從之先克奪蒯得田於堇隂七年晉禦秦師于堇隂以軍事奪其田先克中軍佐故箕鄭父先都士縠梁益耳蒯得使賊殺先克殺先克不赴故不書乙丑晉人殺先都梁益耳益耳非卿不書稱國以殺者君與大夫以政殺之也加之以人則殺之者不特君大夫必有衆人與於其間書此見晉君幼而權臣擅殺無政刑也三月夫人薑氏至自齊夫人歸寧禮也反至於廟禮也夫人出不至者皆非禮也若文薑哀薑數出則不至也晉人殺其大夫士縠及箕鄭父左氏傳晉人殺箕鄭父士縠蒯得蒯得非卿不書是凡殺二大夫或三人不書及其罪均也書及者因殺人而并及之也所以著罪輕不當殺也先都士縠箕鄭父使賊殺先克以作亂固可罪然經不以討賊之辭書之何也蓋靈公幼趙盾專先克為中軍佐盾之黨也三人者忿盾之專欲先翦其羽翼以自強故殺先克春秋以其有所為故書人而不去其官書及是其罪輕者寧不可從末減乎而皆殺之是大夫之專生殺也楚人伐鄭公子遂會晉人宋人衛人許人救鄭左氏傳范山楚大夫言於楚子曰晉君少不在諸侯北方可圗也楚子師于狼淵以伐鄭囚公子堅公子龍及樂耳三子鄭大夫鄭及楚平公子遂會晉趙盾宋華耦衛孔逹許大夫救鄭不及楚師卿不書緩也以懲不恪楚自城濮之敗不敢窺中國者十五年聞晉襄卒而幼君立遂伐鄭趙盾秉晉之政志欲攘楚帥諸大夫之師救鄭而緩不及事及鄭而楚囚鄭公子而去惜乎盾志不恪不能乘機以撲楚之熖而使之知所畏憚也故春秋悉皆人之夏狄侵齊因諸大夫救鄭緩而玩敵故至夏而狄侵齊傳以夏楚侵陳克壺丘經不書皆晉之失也秋八月曹伯襄卒九月癸酉地震天動地靜常也今地動則異矣蓋隂盛極而動隂陽不兩大隂盛則陽微君弱臣強之應也冬楚子使椒來聘楚始以州舉狄之也及來聘始以人稱嘗一會諸侯以爵書亦漸而進之也自是止稱人至此君書爵而臣書名與諸侯同蓋聖人不輕絶人以其來聘而嚮慕中國則進之而不拒也張主一曰伐鄭而聘魯亦逺交近攻之意也秦人來歸僖公成風之襚衣服曰襚不稱夫人聖筆所定杜氏以為從來者辭非也此書法亦猶書王使宰咺來歸惠公仲子之賵之辭也此書僖公成風蓋妾母繫子之義成風卒已五年何秦人始來歸襚雖相去之逺寧無耳目以知之嘗度秦人之意欲逺交於魯行聘則不欲自卑故詐以為不知成風之喪已久姑致其襚結好以親之也葬曹共公無傳十年甲辰春王三月辛卯臧孫辰卒大夫書卒係國之重輕者則書臧文仲雖非賢者亦魯之名大夫其卒也固冝書然自莊公末年文仲已與聞國政四十餘年不聞治效夫子所謂其竊位者與知栁下惠之賢而不與立也不祥之實蔽賢者當之夏秦伐晉左氏傳秦伯伐晉取北徵縣屬馮翊程子曰晉舍嫡嗣而外求君罪也既而悔之正也秦不顧義理之是非惟以報復為事故春秋惡而外之也趙子曰吳楚舉號賤之也諸侯稱國外之也穆公悔過見於誓言康公不紹孫謀故反其初楚殺其大夫冝申冝申子西也為工尹與子家謀弒穆王穆王聞之殺冝申春秋不以弒君之賊討冝申而書曰楚人殺冝申而以國殺又不去其官何耶蓋穆王即楚世子商臣者弒逆之罪人人所得討也自正月不雨至于秋七月一時不雨則告廟告廟則書文公怠於政無閔雨之心不告廟故直併三時言之及蘇子盟于女音汝栗左氏傳頃王立故也杜氏注頃王新立與魯盟親諸侯也陸氏纂例曰公及之也不書公諱獨與天子大夫盟也呂氏曰天子內臣無外交與之盟非也冬狄侵宋楚子蔡侯次于厥貉狄侵宋諸侯不能救楚子與蔡侯次于厥貉將以觀宋之弊而乘之也楚於宋仇國常爭盟而晉救宋敗楚今陳鄭會楚子將以伐宋宋華御事見幾乃逆楚子遂相與田孟諸宋楚既和陳鄭自遄楚子獨與蔡侯次于厥貉將以致毒于人也楚今稱子至明年伐麇亦以爵書亦自是與中國等外之強則中國衰矣蔡書侯愧其以中國諸侯而從夷狄也十有一年乙巳春楚子伐麇左氏傳十年厥貉之會麇子逃歸春楚子伐麇成大心子玉之子敗麇師於防渚麇地潘崇復浮去聲伐麇至于錫音羊又音昔穴許氏曰楚侵伐書子始此中國日替矣夏叔仲彭生會晉郤缺于承匡杜氏注承匡宋地在陳留襄邑縣西今拱州襄陵縣侯左氏傳叔仲惠伯叔牙之孫會晉卻缺于承匡謀諸之從楚者九年陳鄭及楚平十年宋聼楚命諸侯之所以二楚者以不能自強亦以晉靈幼不能紹霸業趙盾雖專政無威令以服強楚故諸侯數被其患不得已從之承匡之會晉大夫不責已而又謀治諸侯之從楚者何不思晉文之為盟主其霸略何如耶秋曹伯來朝左氏傳即位而來見也音現公子遂如宋左氏傳襄仲聘于宋且言司城蕩意諸復之八年意諸來奔歸不書因賀楚師之不害也往年楚次厥貉將以伐宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹杜氏注鹹魯地左氏傳鄋音搜瞞侵齊鄋瞞狄國名防風之後姓遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔得臣綿房甥為右冨父終甥駟乘冬十月敗狄于鹹獲長狄僑如冨父終甥摏其喉以戈殺之十有二年丙午春王二月郕伯來奔左氏傳郕大子朱儒自安於夫音無鍾國人弗徇郕伯卒郕人立君大子以夫鍾郕邽音圭來奔公以諸侯逆之趙子曰諸侯嗣位未踰年猶稱子豈有君父死而不喪身未即位以邑出奔而稱郕伯一何乖繆劉氏權衡意者郕伯去年卒大子今即位而不能自安遂出奔此乃成真郕伯矣以其即位日淺而或謂之大子而左氏則誤以為大子出奔泰山孫氏曰諸侯播惡失地皆名此不名者非自失國也案莊八年師及齊師圍郕郕降于齊師自是入齊為附庸此又來奔齊所逼爾故不名杞伯來朝杜氏注復稱伯舍夷禮來左氏傳始朝公也公即位始朝二月庚子子叔姬卒文公女故曰子以别非先君之子也左氏載杞伯絶婚事蓋誤以成八年九年事妄置於此啖氏辨之詳且明矣夏楚人圍巢杜氏注巢吳楚之間小國廬江六縣東有居巢城今無為軍巢縣左氏傳楚成嘉為令尹若放曽孫子孔羣舒叛楚羣舒偃姓舒庸舒鳩之屬今廬江南有舒城舒城西南存龍舒夏子孔執舒子平及宗子遂圍巢平舒君名宗巢二國羣舒之屬秋滕子來朝左氏傳亦始朝公也秦伯使術來聘左氏傳秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也主人三辭賔答曰寡君願徼福于周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之張氏曰秦人以賄結魯魯亦厚賄答之賓主相與以貨利而坐視霸主之受兵此比事以書不待貶絶而惡見者也冬十二月戊午晉人秦人戰于河曲左氏傳秦為令狐之役故冬秦伯伐晉晉人禦之臾駢曰秦不能久請深壘固軍以待之從之秦伯謂士會晉士會七年奔秦壘曰若何而戰對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱年少不在軍事未嘗涉知軍事好勇而狂且惡臾駢之佐上軍也若使輕去聲者肆焉暫往而退其可十二月戊午秦軍掩晉上軍上軍不動趙穿追之不及反怒乃以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏秦行人夜戒晉師曰兩軍之士皆未憗也憗傷也明日請相見也臾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人于險無勇也乃止秦師夜遁復侵晉入瑕為河曲在河東蒲坂縣南主陸氏纂例曰戰不書及交主也程氏曰凡戰皆以人及客秦曲故不言晉及伐前年秦伐晉春秋以秦惟事報復故外之至此秦又晉戰于河曲秦曲甚矣故不書晉及其黷武殘民則二國之罪同故秦伯趙盾皆以人書貶之也季孫行父帥師城諸及鄆諸魯邑今密州諸城縣鄆魯之東鄆今鄆州須城縣鄆莒魯所爭者以其逺逼外國故帥師城之言及者别二城也春秋書大夫帥師城邑貶之也十有三年丁未春王正月夏五月壬午陳侯朔卒不書葬魯不會年共公卒靈公立宣十遇弒邾子蘧蒢卒左氏傳邾文公卜遷于繹史曰利於民不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利孤必與焉左右曰命可長也君何不為邾子曰命在養民死之短長時也民既利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命自正月不雨至于秋七月説見二年十年大室屋壞公羊大作世使左氏傳大室之屋壞書不共也簡慢宗廟至傾頽故書以見不恭大室大廟之室也自正月不雨至七月無壞道也廟久不修以至于壞春秋志此以譏文公怠慢事宗廟猶不謹若此其能修舉政事乎冬公如晉衛侯會公于沓髙郵孫氏曰沓之會公已去魯而未至于晉也狄侵衛十有二月己丑公及晉侯盟公還自晉鄭伯會公于棐公羊作斐杜氏注棐鄭地左氏傳冬公如晉朝且尋盟衛侯會公于沓請平于晉公還鄭伯會公于棐亦請平于晉公皆成之鄭衛二于楚畏晉因公請平公一出盟晉往還與衛鄭會又為請平於晉公羊氏謂春秋善之十有四年戊申春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾左氏傳邾文公之卒也公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾余氏曰居喪而伐人與伐人喪其罪一也夏五月乙亥齊侯潘卒左氏傳子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國而多聚士盡其家貸於公有司以繼之夏五月昭公卒舍即位六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城新城宋地杜氏注在梁國榖熟縣西今南京應天府左氏傳同盟于新城從於楚者服且謀邾也從楚者陳鄭宋謀邾晉欲納捷災纂例曰此行會禮而又别日行盟禮故書日以謹之程氏曰始會議合而後盟盟者志同故書同自許自晉文圍之不服襄公又嘗伐之今始與會盟楚晉襄末年滅江滅六已肆其暴趙盾秉政猶復伐鄭次貉圍巢其猾夏自若至十三年魯文朝晉衛鄭請平因招致久負固之許會盟于新城稍修復齊桓之霸政然何足以方首止葵丘其如晉靈尚少大夫擅政故止書癸酉同盟于新城當時楚商臣弒逆之罪若此徒以強暴服人非晉大夫稍主此盟則諸侯不免畏而從之中國淪而為夷矣秋七月有星孛入北斗孛彗星也狀如篲除舊布新之象其言入者斗有環域入其魁中也其北斗天之三辰綱紀之星貴星也孛以邪亂之氣入中春秋書之以紀異也左氏傳內史叔服曰不出七年宋齊晉之君皆將死亂宋齊晉天子方伯中國綱紀斗七星故曰不出七年至十六年宋人弒昭公十八年齊人弒懿公宣二年晉趙穿弒靈公天胡氏傳此三君皆違道失德而死于亂苻叔服之言之示人顯矣史之有占明矣公至自會晉人納捷災于邾弗克納左氏傳邾文公元妃齊薑生定公二妃晉姬生捷災文公卒邾人立定公捷災奔晉七月晉趙盾以諸侯之師八百乘納捷災于邾邾人辭曰齊出獲且長宣子曰辭順而弗從不祥乃還興趙盾豈不知獲且正而長當立捷災庶不當立何遽師八百乘綿地千里至邾之城下待其辭然後知竊料盾之知必不如是之疏也蓋盾之欲伯示服義於諸侯也趙子曰弗克納言失之於初而得之於末也愈乎遂也陸淳曰晉帥皆有名氏書人何也廢置諸侯王者之事人臣專之罪莫大焉夫子善其聞義能徙故為之諱也凡事不合常理而小可嘉者皆以諱為善九月甲申公孫敖卒于齊公孫敖以罪奔莒何以書卒敖為魯大夫棄君命從莒女失君臣父子兄弟之義竄身四年無所容於天地間死於旅而不獲歸春秋特書其卒著其迷於欲而忘反為世戒也齊公子商人弒其君舍左氏傳秋七月乙卯夜齊商人弒舍齊人定懿公使來告難故書以九月榖梁傳舍未踰年其曰君何也成舍之為君所以重商人之弒也陸淳曰聞之師曰春秋之作本懲姦惡也若未踰年之君被弒而不曰君則逆亂之臣皆以未踰年而肆其凶惡也故原其情以立此義髙郵孫氏曰人子之心則未踰年稱子國人弒君則未踰年而稱君此春秋所以辨君臣之分而防篡弒之禍也公子哀來奔左氏傳宋髙哀為蕭封人以為卿蕭宋附庸還并為卿不義宋公而出遂來奔書曰宋子哀來奔貴之也陸氏微旨曰時奔者皆以有罪而子哀獨以宋公不義不貪其祿而去之出奔之美者春秋之所未有故書字以褒貴之也冬單伯如齊泰山孫氏曰單伯魯大夫至此猶見者蓋其子孫世爾張氏曰單伯魯大夫之命于天子者自莊公元年至今已七十餘年未必一人或其子若孫與齊人執單伯齊人執子叔姬齊商人弒其君舍子叔姬舍之母魯女也魯使單伯如齊欲請以歸曰殺其子焉用其母商人怒為是而執之常山劉氏曰商人弒君之惡已顯而執叔姬之事聖人不獨罪商人也齊人不討賊俱北靣事之又致執其君母齊之人均有罪焉故曰齊人執子叔姬劉氏妙旨曰兩稱齊人者彼雖專執聖筆兩執之正男女之别也況為國女雖同執之猶將異之云爾十有五年巳酉春季孫行父如晉左氏傳季文子如晉為單伯與子叔姬故也魯不能及其間暇以明政刑仗義興師討齊弒逆之罪而反因晉以求于齊晉欲繼霸亦不思討商人何以言盟主也三月宋司馬華孫來盟司馬掌兵官也華孫宋督之孫華耦也來盟出於彼而自來盟也不稱使非君命之也以宋自僖二十一年被執之後久不與魯通問今華孫其君無政自來結盟通好將以紓難宋大夫書於經者多矣惟三人以官舉見春秋與之也夏曹伯來朝十一年曹伯來朝今復至齊人歸公孫敖之喪左氏傳齊人或為孟氏謀曰魯爾親也飾棺置諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之取而殯之齊人送之許氏曰以敖之醜奔而録卒録其喪歸春秋為之屢見於經者以文伯惠叔之哀誠無已也易曰有子考旡咎書曰爾尚蓋前人之愆惟忠惟孝故聖人以敖著教焉六月辛丑朔日有食之鼓用牲于社日有食之説見隱三年鼓用牲于社説見莊二十五年單伯至自齊榖梁傳大夫執則致致則名此其不名何也天子之命大夫也單伯自齊至魯書至是魯大夫明矣若以為周大夫何不言歸京師春秋何不罪齊之執王使也晉郤缺帥師伐蔡戊申入蔡新城之盟趙盾主之蔡不同盟故卻缺伐之然則禮樂征伐自大夫出矣蔡從楚不與中國諸侯盟固可罪晉既伐之不待其悔過而遽入其國甚矣秋齊人侵我西鄙季孫行父如晉左氏傳齊人侵我西鄙故季文子告于晉魯齊無故而侵故人之冬十有一月諸侯盟于扈左氏傳晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不會書曰諸侯盟于扈無能為故也劉氏曰諸侯何以不序不足序也欲治齊而後不能惡晉也惡晉而言諸侯何晉固諸侯之長矣亦諸侯之罪也胡氏曰八國之君不序略之也夫外裔然後略之君臣同辭而不分爵號曷為略八國等於外裔弒君之賊夫人所得討也故陳恆弒君孔子沐浴而朝告于哀公而請討今商人弒君晉與諸侯不奉天討受賂而退何以賢于外裔哉故書諸侯盟于扈分惡於諸侯也賂伯國合諸侯而謀舉事者將以圗功而成名也晉受而不舉則是求名而亡徒為盟會而已經不書晉但書諸侯兼罪之也盾之佐霸有愧於管仲矣十有二月齊人來歸子叔姬胡氏曰不言齊子叔姬來歸而曰齊人來歸子叔姬者見子叔姬無罪齊人自絶而歸之爾春秋深罪齊人以商人為君而不知其惡故其執其歸與弒其君商人皆稱齊人深責之也張氏曰齊商人既弒舍而絶其母於齊故不以出夫人之例書之而書齊人深罪其國人也齊侯侵我西鄙遂伐曹入其郛齊賂晉以諸侯之不能見伐故又侵魯伐曹以此年夏曹來朝魯也入其郛殆矣幾乎入矣公羊曰郛恢郭也城外大郭也十有六年庚戌春季孫行父會齊侯于陽榖齊侯弗及盟左氏傳春及齊平公有疾使季文子會齊侯于陽榖請盟齊侯不肯曰請俟君間弗及盟弗與盟也大國之卿可以會小國之君不可以會次國之君齊侯以季文子不可以敵已故弗與盟魯請盟於齊蓋欲與齊平也文公不自往而使季文子犯分而行安能平數年之隙遂為徒往以區區逆亂之齊文公不能自強以討之反為其侮命使則遭執辱時乎侵犯邉鄙以至自屈而與之平又不見答益見魯之衰矣夏五月公四不視朔視朔即朝廟而告朔也文公怠於政自二月至五月不視朔也左氏謂有疾託之也故聖筆不言疾而直書之自此不講告朔之禮致餘公不復舉行及定公時故夫子有愛禮存羊之論胡氏曰文公厭政備見於經閏不告朔朔不視無雨不閔會同不與廟壞不修作主不時事神治民之怠也則其心放而不知求久矣六月戊辰公子遂及齊侯盟于郪丘郪音西公羊作犀丘穀梁作師丘左氏傳公使襄仲納賂于齊侯故盟于郪丘師氏曰納賂於齊而求盟其弱可知也而齊侯受賂以與遂盟則嚮之弗及季孫者亦豈以禮而卻之哉秋八月辛未夫人薑氏薨左氏傳聲薑薨杜氏注僖公夫人文公母也毁泉臺左氏傳有蛇自泉宮出即泉臺入于國如先君之數自伯禽至僖公十七君此蛇妖亦十七也秋八月辛未聲薑薨毁泉臺蛇妖自此出而聲薑薨故毁之劉氏曰魯人以為祥而毁之非明民之道也公羊傳泉臺郎臺也未成為郎臺既成為泉臺先祖為之已毁之不如勿居而已矣楚人秦人巴人滅庸案傳楚大飢戎伐其西南又伐其東南庸人率羣蠻以叛麇人帥百濮伐楚楚人謀徙於阪髙蒍賈曰我能往寇亦能往不如伐庸秦人巴人從楚師羣蠻從楚子遂滅庸羣夷乘楚飢而攻楚儻畏而徙則無以保其國矣用蒍賈之善謀制而服之可也秦巴從楚楚為戎首以滅鄰國罪可知也人三國而書滅庸惡之也冬十有一月宋人弒其君杵臼左氏傳宋昭公將田孟諸未至夫人王姬襄夫人周襄王姊昭公祖母使帥甸攻而殺之蕩意諸死之司城也昭公不道襄夫人殺之而書宋人見衆欲弒之也然以弒君之罪歸宋人則凡與於弒者當以輕重斷獄所以辨上下定民志也十有七年辛亥春晉靈人衛成人陳靈人鄭穆人伐宋左氏傳晉荀林父衛孔逹陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公公子鮑而還卿不書經但書人失其所也失其所討之罪程子曰行天討而成其亂故貶之胡氏曰稱人賤之也夏四月癸亥葬我小君聲薑孫氏曰聲諡也九月而葬左氏傳葬聲薑有齊難是以緩齊侯伐我西鄙西左傳作北甫去年夏公子遂納賂於齊盟于郪丘十越月齊又來伐我盟可恃乎齊以強淩魯弱也六月癸未公及齊侯盟于榖左氏傳齊侯伐我北鄙襄仲請盟六月盟于榖齊方伐我我未能報先及而與之盟魯服而求平也以郪丘之盟公弗與而齊復來伐故親及盟也書此皆譏魯文也諸侯會于扈左氏傳晉侯搜于黃父遂合諸侯于扈平宋也公不與會齊難故也書曰諸侯無功也劉氏曰諸侯何以不序不足序也其不足序奈何欲治宋而後不能也書諸侯會而不列略之也與十五年盟于扈同秋公至自榖冬公子遂如齊左氏傳襄仲如齊拜穀之盟十有八年壬子春王二月丁丑公薨于臺下穀梁傳臺下非正也髙郵孫氏曰薨非路寢皆不正也其曰臺下蓋又甚焉秦伯罃卒秦康公卒子共公立夏五月戊戌齊人弒其君商人左氏傳齊懿公之為公子也與邴歜音觸之父爭田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使驂乘夏五月公遊于申池二人弒懿公納諸竹中歸舍爵而行諸齊商人驟施聚士以成弒舍之謀既立而天子不討侯容之故商人恣行不道反數數侵魯自以為莫敢誰何甫四年而禍起肘腋為二微者所弒卒自受其報出乎爾反乎爾理之常也然春秋之法仍書齊人弒其君者以商人君齊四年諸侯與之盟會不可不謂之君也殺之冝坐弒君之罪故書曰齊人弒其君商人此春秋懲篡弒塞禍亂之源也六月癸酉葬我君文公秋公子遂叔孫得臣如齊左傳襄仲莊叔如齊惠公立故且拜葬也襄仲賀齊惠公立莊叔謝齊來會葬冬十月子卒左氏傳文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲敬嬴事襄仲故以子託之襄仲欲立之叔仲惠伯不可仲襄仲見齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視襄仲殺大子惡及其母弟視視不書而立宣公書曰子卒諱之也仲以君命召惠伯襄仲詐以子惡之命其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中亦子之名左氏曰惡公羊曰赤未知孰是若如左氏則晉師服所謂異哉君之名子也子般書名而此不書文公已葬故不名也胡氏曰在喪稱子繼世不忍當也既葬不名終人子之事也踰年稱君緣民臣之心也臣不日史闕之也不地見其弒也上書公子遂叔孫得如齊後書夫人薑氏歸于齊中曰子卒則知邪謀出於使齊之二子矣夫人薑氏歸于齊左氏傳夫人薑氏歸于齊大歸也將行哭而過市曰天乎仲為不道殺嫡立庶市人皆哭魯人謂之哀薑胡氏曰書夫人則知其正書薑氏則見其非絶於先君書歸于齊則知其無罪異于孫邾者而魯國臣子殺嫡立庶敬嬴宣公不能事主君存適母其罪不書而並見矣季孫行父如齊告宣公之立也沙隨程氏曰遂得臣行父三人皆與謀以其前後如齊而知之也莒弒其君庶其張氏曰凡稱國以弒者蓋其君以無道為國人所弒而大臣坐視不能討皆當誅不赦之罪也且左氏傳莒紀公生大子僕又生季他愛季他而黜僕多行無禮於國僕因國人以弒紀公以其寶王來奔季文子使司寇出諸竟讀春秋編卷六
