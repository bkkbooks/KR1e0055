body:
  text: 讀春秋編卷八宋陳深撰成公名黑肱宣公子諡法安名立政曰成定王十七年即位元年辛未春王正月公即位張氏曰雖無王命有父命故書二月辛酉葬我君宣公無冰禮記月令仲春獻羔開氷今二月書無氷蓋冬溫無氷可藏至二月獻羔無以啓氷而廟薦故書以志之洪範豫恆燠若謂舒之罰常燠也經書無氷三蓋常燠也此則成公幼弱政事舒緩政在三家公室不張其兆見矣三月作丘甲作者創始為之也謂變古之常制而始作之也丘甲賦丘為甲也周禮九夫為井四井為邑四邑為丘十六井四丘為甸出長轂一乘甲士三人步卒七十二人此甸所賦也胡氏傳唐李靖曰周兵制一乘步卒七十二人甲士三人以二十五人為一甲凡三甲共出七十五人然則一丘所出十有八人積四丘具一乘今作丘甲是一甸之中共百人為兵矣蓋益兵而增三之一耳按甲士三人者統步卒七十二人每甲士一人統步卒二十四人故二十五人為一甲今每甸增二十五人而甸出四甲實一丘出一甲故曰作丘甲成公初年而變法增賦民困於暴斂矣故聖筆特書作之一字以惡之也夏臧孫許及晉侯盟于赤棘杜氏注赤棘晉地去初公孫歸父與宣公謀三桓聘于晉使還公薨懼而奔齊三桓用事怒齊納歸父聞齊將出楚師故臧孫許又懼晉討逺尋盟于赤棘書及者魯所欲也汲汲而求盟故眀年鞍之戰用晉師焉秋王師敗績于茅戎左氏傳晉侯使瑕嘉平戎于王單襄公如晉拜成劉康公王季子也徼戎戎平還要其不偹將遂伐之叔服周內史曰背盟而欺大國此必敗背盟不祥欺大國不義神人弗助將何以勝不聽遂伐茅戎三月癸未敗績于徐吾氏茅戎之别王師敗而不先言戰以王者至尊天下莫之敢亢而况戎乎不言戰所以存尊君之義也王者有征無戰今王無德以來逺人徼戎致敗是自敗之道也故不諱敗而書之因以示戒也冬十月二年壬申春齊侯伐我北鄙案左氏傳齊侯伐我北鄙取龍遂南侵及巢丘經不書失邑略之也齊納歸父而三家怒及魯盟晉而齊益疑故首來伐未幾有鞍之戰胡氏謂同為憤兵皆非義也夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績齊以伐魯之師南侵衛亦使孫良夫石稷將侵齊與齊師遇石稷欲還孫子不可遂戰于新築而敗經書及齊師以衛主之也蓋良夫不能全師愛民不從石稷之言必進而戰致敗君衆幾喪身辱國故以衛主之而罪良夫也齊侯自將而不曰齊侯不與衛大夫之敵齊侯也六月癸酉季孫行父丈子臧孫許宣叔叔孫僑如宣伯公孫嬰齊仲氏帥師會晉郤克獻子衛孫良夫昭子曹公宣子首及齊侯頃戰于鞍齊師敗績鞍齊地魯四卿並將踰制甚矣聖筆首詳書之以志其僣晉侯以郤克之怒許二臣之請毒民役衆非盟主不得已而用兵也四大夫擅命請兵交怨鄰國以肆其憤豈人臣之道僣竊之禍啓矣齊頃驕恣致四國之師師敗而幸免焉經例以受伐者為主此戰雖齊自取而不主齊者以四國騁憾殘民故主之以為憤兵之戒也秋七月齊侯使國佐如師己酉及國佐盟于袁婁鞍之戰齊師敗齊侯幸免晉師逐齊侯齊侯使國佐齊大夫如師請平鞍去齊五百里袁婁去齊五十里而及國佐盟齊亦窘甚矣諸侯之師迫人于此而受賂以盟其亦異于召陵之役也召陵則經書曰來盟于師盟于召陵楚人自服而求盟也此則經書曰使國佐如師雖曰齊侯哀鳴請服國佐之來將以賂免非服之也而晉之命之不以禮為國佐所折揖而去之郤克于是胅音舜魯衛之使以其辭而為之請然後許之逮于袁婁而與之盟故經書及見汲汲欲盟者晉也反以晉人及之吁國佐一言使四國大夫汲汲追與之盟辭之不可已者如此郤克以雪見笑之憤會四國之大夫一戰勝齊反魯衛侵地不為無功而春秋絀之惡其以大夫而専征伐挾主盟之勢戰勝脅迫而要賂以力而不以禮也八月壬午宋公鮑卒文公卒共公立成十五年卒庚寅衛侯速卒穆公卒定公立成十四年卒取汶陽田取者非其有而取之也汶陽漢志魯國汶陽縣今兖州泗水縣東南有汶陽故城汶陽田本魯田也齊歸而與之不曰歸而曰取蓋因晉勝齊齊不得已而歸之如賂焉非其志也齊嘗侵而有之晉命歸之其得之之易猶取之也不曰取之齊者本非齊地也冬楚師鄭師侵衛衛從晉伐齊故楚侵之鄭楚與國故以師會俱稱師見其衆也衛有穆公之喪鄭衛同姓從荆楚而伐喪其罪可知不書及與楚同貶也而又書楚于鄭上見楚主兵鄭服乎楚而聽其役也聖筆直書而罪自著矣十有一月公會楚公子嬰齊于蜀蜀魯地泰山博縣西北有蜀亭左氏傳楚侵衛遂侵我師于蜀經書侵衛不書侵我與師于蜀止書公會楚公子嬰齊于蜀何耶書其重者爾莫重乎以中國諸侯降班而下與外裔之大夫會也公既懼楚與其大夫為蜀之會遂率諸侯凡十一國與之同盟自是鄭専事楚晉不得宋由公即楚故也先書公會楚公子嬰齊于蜀以眀諸國棄晉從楚公之由也丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀左氏傳楚侵及陽橋魯地孟孫請往賂之公衡為質以請盟楚人許平十一月公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟于蜀卿不書匱盟也于是乎畏晉而竊與楚盟故曰匱盟蔡侯許男不書乘楚車也謂之失位程氏曰楚為強盛凌轢中國苟能保固疆圉要結鄰好豈有不能自存之理乃懼而服從與之盟約故皆稱人以見其衰弱責諸侯則魯可知矣人春秋魯史也故先書公次書楚主盟者也嬰齊貶稱以楚僣王黜之不同與列國諸國大夫亦稱人責其不能保固疆圉以事晉畏楚而服之是從夷也故極貶之三年癸酉春王正月公會晉侯宋公衛侯曹伯伐鄭去年公與鄭為蜀之盟魯宋衛曹咸在焉言猶在耳今又從晉伐之何耶與鄭盟為楚也今伐之從晉也反覆若此盟不足以固信矣雖然聖人未嘗不欲與中國而攘荆楚故盟于蜀則人之諸侯從晉伐鄭則書爵焉伐之者以鄭附楚也晉徒知鄭從楚而不知十一國亦竊與楚盟晉雖或知之以其衆難以盡罪之也故先問首從楚之鄭約魯宋衛同伐之以警其餘也經書爵者亦以許晉此役俾諸侯有所懼不致靡然盡從楚也宋衛有喪去衰絰而從金革不稱子而稱爵著其惡也譏宋衛則公與諸侯之非自可見矣辛亥葬衛穆公二月公至自伐鄭公昨畏楚而盟今附晉而伐未逾時而至以危之豈非公二心晉楚有危之道也甲子新宫災三日哭劉絢曰新宫宣公之宫也不曰宣宫者神主未遷也丹桓宫楹刻桓宫桷皆稱諡此不稱知主未遷也宫告成方新主未遷祭未舉故但稱新宫廟災而哭禮也為神靈之所止人情所冝哀今主未入遇災而哭此何禮哉宣公篡逆所立不正已薨獲免矣故廟成而燬天意所絶以其不可從祀也乙亥葬宋文公左氏傳宋文公卒始厚葬用蜃炭燒蛤為炭益車馬多埋車馬始用徇周人從葬椁有四阿四注椁也孔氏曰周禮匠人云殷人四阿重屋阿棟也四角設棟也棺有翰檜翰旁設檜上飾皆王禮君子謂華元樂舉于是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑死又益其侈是棄君于惡也何臣之為用胡氏以經不見葬之厚然聖筆至七月方書葬見其天子七月而葬之禮其僣侈可知矣夏公如晉左氏傳夏公如晉拜汶陽之田令魯復汶陽之田特書曰取足以見疆場之不出於王矣魯歸田以晉力故往拜賜其重如此後年晉使韓穿來言汶陽田奪而歸之于齊有以知晉之無以令天下矣鄭公子去疾帥師伐許左氏傳許恃楚許恃從楚而不事鄭鄭子良即公子去疾伐許許鄭皆即楚今鄭以許恃楚而不事之故興此伐以亂治亂聖人惡之又况大夫之専伐乎公至自晉公行多不至其書公至自晉譏之也譏其何為至自晉也公自即位不思朝周而往拜汶陽田而朝晉繆舉也經特書以罪之也秋叔孫僑如帥師圍棘左氏傳取汶陽之田棘不服故圍之杜氏注棘汶陽之邑在濟北蛇丘縣胡氏傳復故地而民不聽命至命上將用大師蓋魯于是時初稅畝作丘甲稅役日重矣棘雖復歸故國所以不願為之氓也成公不知薄稅斂輕力役修德政以來之而肆其兵力雖得之亦必失之矣大雩魯雩可也大雩不可也晉郤克衛孫良夫伐牆音詳咎音臯如杜氏注牆咎如赤狄别種也左氏傳伐牆咎如討赤狄之餘也牆咎如潰上失民也上失民也此傳釋經之文而經無牆咎如潰四字蓋經闕此四字宣十五年晉滅赤狄潞氏其餘散入牆咎如故討之大夫國氏亦以譏其専伐耳冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟左氏傳晉侯使荀庚來聘且尋盟衛侯使孫良夫來聘且尋盟丙午盟晉丁未盟衛子泰山孫氏曰此公及荀庚孫良夫盟也不言公者二伉也二子來聘不能以信相親反要公以盟非伉而何故言聘言盟以惡之鄭伐許四年甲戍春宋公使華元來聘左氏傳通嗣君也杜氏注蓋宋共公初即位故三月壬申鄭伯堅卒杞伯來朝左氏傳歸叔姬故也杜氏注將出叔姬先修朝禮言其故夏四月甲寅臧孫許卒公如晉左氏傳公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天惟顯思命不易哉夫晉侯之命在諸侯矣可不敬乎杜氏注敬諸侯則得天命張洽曰晉景公勝齊而驕魯欲叛之也葬鄭襄公秋公至自晉左氏傳公至自晉欲求成于楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇于我諸侯聽焉未可以二史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止冬城鄆任公輔曰魯西邑東郡廩丘東有鄆城即西鄆後漢志廪丘今濟南府鄆城縣杜氏注公欲叛晉故城而為備有二鄆此近晉者也魯鄭伯伐許左氏傳鄭公孫申帥師疆許田許人敗諸展陂許地鄭伯伐許取鉏任泠敦之田程氏傳稱鄭伯見其不復為喪以吉禮從戎何氏注喪未踰年稱伯者時樂成君位親自伐許故如其意以著其惡五年乙亥春王正月杞叔姬來歸榖梁傳婦人之義嫁曰歸反曰來歸陸氏纂例曰郯伯姬杞叔姬不書嫁而書出或嫁時夫未為君也胡氏曰春秋于內女其歸其出録之詳者重人倫之本以為世戒也仲孫蔑如宋左氏傳孟獻子如宋報華元也前年宋華元來聘夏叔孫僑如會晉荀首于榖公羊首作秀杜氏注榖齊地左氏傳晉荀首如齊逆女故宣伯即僑如餫諸榖野饋曰餫運糧饋之大夫之擅相與會志其専也梁山崩杜氏注梁山在馮翊夏陽縣北今同州韓城縣有禹貢梁山左氏傳梁山崩晉侯以傳中戀反驛也召伯宗伯宗辟音避重遇重載之車使之避已曰辟傳重人曰重載之人待我言車重行遲若待我回避不如捷之速也捷邪出問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉不舉樂降服乘縵車無文飾徹樂出次舍于郊祝幣太祝陳玉帛禮神史辭太史修言辭以謝過以禮焉其如此而已雖伯宗若之何伯宗請見不可遂以告而從之公羊傳梁山崩記異也外異不書此何以書為天下記異也胡氏曰絳人之語于禮文備矣古之遭變異而外為此文者必有恐懼修省之心主於內若成湯以六事檢身髙宗克正厥事宣王側身修行欲銷去之是也徒舉其文而無實以先之何足以弭災變乎夫國主山川至于崩竭當時諸侯未聞有戒心而修德也故自是而後六十年間弒君十有四亡國三十二其應亦憯矣春秋不眀著其事應其事應具存其可忽諸襄陵許氏曰山崩之嵗定王崩周室日衰又二年而吳兵始犯中國卒與晉爭盟于黃池王伯道衰秋大水隂盛邪勝之所致也冬十有一月己酉天王崩定王也魯不會不書葬十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢蟲牢鄭地杜氏注陳留封丘縣北有桐牢左氏傳許靈公訴鄭伯于楚六月鄭悼公如楚訟不勝楚人執皇戍及子國鄭穆公子故鄭伯歸使公子偃請成于晉冬同盟于蟲牢鄭服也泰山孫氏曰天王崩晉合諸侯同蟲牢之盟不顧甚矣鄭既服晉于是盟九國諸侯約備強楚也十一月聞天王之訃而不往奔喪十二月方且從事會盟經書其實事而諸侯不臣之罪自見也六年丙子春王正月公至自會二月辛巳立武宫武宫武公之廟也立者不冝立也書之譏非禮也武公名敖周公九世孫由武公至于成公十有二世矣非百世不遷之祖乃親盡已毁之宫也成公不考廟制諸侯五廟二昭二穆與太祖之廟為五過則毁之不可復立立之非禮也與其後定公立煬宫同取鄟音専又市臠反杜氏注鄟附庸國也左氏傳取鄟言易也胡氏傳鄟微國也書取者滅之也滅而書取為君隱也滅魯凌弱而以兵力取之雖不書書取亦貶之也衛孫良夫帥師侵宋以蟲牢之盟諸侯謀復會而宋辭以子靈之難故侵之夏六月邾子來朝公孫嬰齊如晉公孫嬰齊叔肸子也左傳子叔聲伯即公孫嬰齊如晉命伐宋壬申鄭伯費卒鄭悼公也秋仲孫蔑叔孫僑如帥師侵宋左氏傳孟獻子即仲孫蔑叔孫宣伯即僑如侵宋晉命也經侵者潛師侵掠也魯以晉命有事于宋出于無名故書侵以罪之也晉景不務彌縫諸侯之闕反使諸侯搆怨則楚必有以量中國矣之魯自成四年宋來聘五年魯報聘今年侵宋以蟲牢盟宋辭以子靈之難晉疑宋有異意故命魯侵之七年宋從晉于馬陵之盟于是晉魯宋交好如初故八年宋魯始為婚契終宋之世與會為好楚公子嬰齊帥師伐鄭楚始書大夫將鄭左氏傳楚子重即嬰齊伐鄭從晉故也楚伐鄭喪疑于文無貶以棄禮背義荆楚之常然下志晉欒書帥師救鄭善救者則伐者之罪見矣冬季孫行父如晉左氏傳夏四月丁丑晉遷于新田今平陽絳邑縣冬季文子如晉賀遷也晉欒書帥師救鄭鄭昔事楚而今歸晉故楚伐之晉不得不救之也晉救至而楚師還晉師欲與之戰而欒武子從知莊子范文子韓獻子三帥之諫不遷戮而遂還春秋所以善欒書也不戰而使楚師畏之而去不無功也襄陵許氏所謂存霸統也七年丁丑春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛鼷小鼠也口草食傷牛不覺天地之牛角栗宗廟之牛角握郊之大禮必用牛牛傷角則不可用郊禮非魯所當行以僣事天天不嚮也鼠初食牛角尚可曰養之不謹至于改卜牛鼠又食其角非人之所能也天意不嚮僣也如此即變異也襄陵許氏曰小害大下賊上食而又食三桓子孫相繼之象宣公有虞三桓之志至成弗戒亂之象著矣吳伐郯音談漢杜氏注吳國今吳郡淮郯己姓國秦有郯郡屬東海郡故城今在陽下邳縣北楚見于經始書荆後進而書楚盛而書子吳泰伯之後本伯爵春秋惡其僣王今始見于經但稱國其盛不過稱子與楚皆狄之也四夷雖大止當稱子春秋所以正名分也左氏傳吳伐郯郯成郯及吳平季文子曰中國不振旅蠻夷入伐而莫之恤無弔者也夫夏五月曹伯來朝曹宣公也不郊猶三望吳郡朱長文曰禮天子有四望諸侯則祭境內山川而已魯當祭泰山泰山魯之境也禮所得祭故不書三望僣天子禮是以書之三望説詳見僖公三十一年秋楚公子嬰齊帥師伐鄭左氏傳楚子重伐鄭師于汜音凡鄭地在襄城縣南楚未得志于鄭故子重復伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭楚伐鄭公會諸侯以救之伐者不善而救者善也故皆稱爵杞本公爵降而稱伯又列于莒邾之下志其削弱而託憫之之意也書晉合八國之師親往救鄭攘荆楚安中國之師也故救以善之曷不移八國之師往問罪於楚徒救而不能服之何足以言盟主也八月戊辰同盟于馬陵杜氏注馬陵衛地陽平元城縣東南有地名馬陵八國諸侯同病楚故同盟公至自會吳入州來杜氏注州來楚邑淮南下蔡縣今屬夀州巫楚子重子反以私憤讒殺申公巫臣之族臣怨之時在晉遂請使于吳與之射御教吳乘車戰陳教之叛楚吳始伐楚伐巢伐徐子重子反一嵗七奔命蠻力屬于楚者吳盡取之見于經春伐郯秋又入州來無所畏憚暴甚若此以晉通之前此楚嬰齊數伐諸侯自是不敢動畏吳之攻其後也雖然晉之通吳是又生一楚也冬大雩冬而旱得雨故雩衛孫林父出奔晉左氏傳衛㝎公惡孫林父孫良夫之子冬孫林父出奔晉衛侯如晉晉反戚焉戚林父邑出奔戚隨屬晉故晉因衛來朝而反其戚邑焉八年戊寅春晉侯使韓穿來言汶陽之田歸之于齊汶陽田魯之田也齊昔侵之鞍之役晉師勝齊晉俾齊歸侵魯之田今齊晉復合晉侯乃使韓穿來言歸之于齊脅而歸之也魯之田受于天子晉豈得私喜怒而専制之乎故春秋始不曰歸而曰取謂魯假諸侯之兵力得之也今書曰歸反若齊之物而歸之所以極晉罪也晉欒書帥師侵蔡襄陵許氏曰侵蔡報伐鄭也大國爭衡而小國受敗春秋矜焉公孫嬰齊如莒左氏傳聲伯如莒逆也因聘而自逆婦也宋公使華元來聘左氏傳聘共姬也許氏曰録伯姬始于此宋公使公孫夀來納幣杜氏注宋公無主昏者自命之故稱使也任氏曰婚禮不稱主人為其嫌于自媒也納幣而書宋公使之非禮也胡氏曰公孫夀卿也納幣使卿非禮也納幣大夫之事也晉殺其大夫趙同趙括趙朔晉侯之壻也其季父曰嬰朔死而亂其室趙莊姬趙同趙括怒戮而放之嬰曰我在故欒氏不作我亡吾二昆必憂弗聽莊姬怒譛之于君曰同與括將為亂君問諸欒氏卻氏對曰固聞之君于是殺同括譛同括為人臣內不能正家外専權自恣固足以來其而殺其身然稱國以殺而不去其官以晉侯信譛而殺無罪罪纍上也見晉之無政刑矣秋七月天子使召伯來賜公命周簡王初即位三年思有維固諸侯之心故使召伯來賜公命非禮也一人之私恩也故書曰天子天主子者子養天下主乎恩也天王者制治天下主乎法也乎恩則以情主乎法則以事江漢之詩曰王命召虎式辟四方王命召虎來旬來宣凡此者主乎事則知王者以法言也虎拜稽首天子萬年眀眀天子令聞不已凡此者主乎情則知天王以恩言也成公之立八年矣未嘗入見又無勤王之功何為而賜命也特出于上之私天恩而已是以聖筆變文曰天子以見非王者之大法誠子之僣賞也召伯召桓公周卿士為經書王而不加天不能承天也書天子而不稱天王其不能以天臨乎下也冬十月癸卯杞叔姬卒叔姬來歸自杞今四年矣其卒也故書雖見出猶書卒者為眀年杞侯來逆叔姬之喪以歸故也晉侯使士燮來聘叔孫僑如會晉士燮齊人邾人伐郯吳伐郯晉不救郯不得已成之晉又強魯并率諸侯伐之何義乎魯為郯請緩師亦不可魯弱畏晉而不敢違也來聘而強以伐人之國不道也僑如出會士燮主兵大夫之専甚晉之霸政亦自此而衰矣衛人來媵媵伯姬也媵不書此何以書譏三國來媵非禮也此後齊晉來媵二國媵之禮也九年己卯春王正月杞伯來逆叔姬之喪以歸左氏傳杞桓公來逆叔姬之喪請之也杞叔姬卒為杞故也還為杞婦故卒稱杞逆叔姬為我也既棄而復逆其喪為魯故公羊傳脅而歸之也啖氏曰出婦未反而逆其喪非禮也陸淳曰此言禮有婦既練而反未練而出然則出婦有反歸之禮但女嫁未三月而死猶歸葬于女氏之黨今叔姬生未反于杞而死反葬故曰非禮也公會晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲左氏傳為汶陽之田故諸侯二於晉晉人懼會于蒲以尋馬陵之盟在七年季文子謂范文子曰德則不競尋盟何為范文子曰勤以撫之寬以待之堅強以御之眀神以要之柔服而伐二德之次也晉不惇信義以率諸侯徒盟不足尚也盟鄭而鄭即楚故秋執之盟莒而莒為楚伐而潰晉不能救晉之無信義可知矣盟何益之有哉經書同盟以罪晉也公至自會二月伯姬歸于宋夏季孫行父如宋致女經不言逆逆之道微爾但書歸于宋譏其不得以禮行也古者婦人既嫁三月而後廟見稱婦擇日而祭于禰成婦之義也父母使人操禮致之謂之致女致女使大夫聘焉卿非禮也經詳書閔之也晉人來媵媵伯姬也諸國聞伯姬之賢而爭媵之也秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭稱人而執者既不以王命又不歸諸京師則非伯討也書人所以著其専執之罪楚以重賂與鄭鄭會楚公子成于鄧秋鄭伯悔而如晉晉人以其二於楚也執諸銅鞮使欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也楚子重侵陳以救鄭削而不書以鄭貪楚之賂背盟棄信無可救之善楚不得有救之名也晉與楚徒爭鄭不能以禮招攜以德懷逺但以區區之詐力求諸侯何足以言盟主患楚之強暴何不會諸侯以伐之使服及其伐國然後救之救未至而從之者則伐而爭之今執其君以伐其國又殺其使亦甚矣卒之鄭謀改立君以紓國難公子繻見殺叔申叔禽見討子如之死者四人鄭禍變若此皆晉為之也豈得謂之執有罪故書人貶之晉之罪著矣冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆今春晉方會諸國盟于蒲以備楚也莒小國不得不從不從則晉必會兵伐之今楚伐莒浹旬之間圍渠丘潰莒又入鄆莒固以無備而潰諸侯熟視而莫之救盟豈足恃乎其何以服人之心而使無攜二也冝乎晉之不競楚之無忌憚自若也秦人白狄伐晉左氏傳諸侯二故也主宣八年晉師白狄伐秦書曰師惡盟而同白狄也今秦伯與白狄伐晉書人以秦與狄均也然皆不書及一之于狄也晉不能謹內外之辨首與白狄伐秦故秦復與狄伐晉皆晉有以啓之也鄭人圍許左氏傳鄭人圍許示晉不急君也是則公孫申謀之曰我出師以圍許示不畏晉為將改立君者而紓晉使紓緩也勿亟遣使詣晉示欲更立君晉必歸君晉執鄭伯鄭人謀出師圍許將改立君以紓晉使晉必歸君此所以圍許也城中城杜氏注中城魯邑也在東海廪丘縣西南動治國安民以德政不専恃城池以為固勞民衆以興大役春秋所不取也故榖梁氏曰凡城之志皆譏也左氏曰書時固不論時與不時也十年庚辰春衛侯之弟黑背帥師侵鄭左氏傳衛子叔黑背侵鄭晉命也胡氏曰其為弟者子叔黑背生公孫剽孫林父寧殖出衛侯衎而立剽亦以其弟有寵愛之私故得立耳此與齊之夷仲年無異特書弟以為後戒其齊侯使其弟年來聘匹夫而代大夫之事也鄭伯使弟語來盟匹夫而代諸侯之事也衛侯之弟黑背侵鄭匹夫而代諸侯之權也不書氏族未命也夏四月五卜郊不從乃不郊魯之僣郊非禮也故天不享而卜之不從卜日卜牲蓋有常禮卜至于再不吉則已何至于五其瀆甚矣見天之不可妄徼其吉耶五月公會晉侯齊侯宋公衛侯曹伯伐鄭晉執鄭伯鄭公孫申謀立君而紓晉使晉必歸君公子班聞其謀三月立公子繻四月鄭人殺繻立髠頑成公太子子如奔許欒武子以鄭立君我執一人何益不如伐鄭而歸其君五月晉立太子州蒲為君會諸侯伐鄭鄭賂而盟辛巳鄭伯歸經但書晉侯傳安知是太子州蒲之晉侯生立為君者晉執鄭伯而伐之以要其賄始歸使鄭禍亂荐作晉為已甚矣書此志晉之罪而併罪諸侯也齊人來媵媵伯姬也晉衛同姓二國已來媵齊又媵則三國况異姓不冝媵非禮也丙午晉侯獳乃侯切卒晉景公卒厲公立成十八年遇弒秋十月公如晉公親往弔而朝嗣君也晉止公使送葬于是糴茷音廢又拔未反以公二于楚糴茷如楚候其還以知盧實冬葬晉景公而經不書左氏以為諱之石氏以左氏未足考據公雖如晉葬未必在也冬十月十有一年辛巳春王三月公至自晉公自去年七月如晉至此年春三月方至自晉凡留九月何其久也左氏有止公送葬之説其始也以公為二于楚止公請受盟而後使歸危亦甚焉晉侯使郤犫夭由切來聘己丑及郤犫盟郤犫晉郤克從父兄弟也時晉強魯弱郤犫以大夫而敵公盟何其専也來聘晉止以報公之如盟則我所欲也故書及不書公恥公與大夫盟而諱之也晉之來盟以公二楚魯畏晉強不敢不盟也夏季孫行父如晉報郤犫之聘也左氏曰且涖盟非也魯雖欲之晉安肯盟若以郤犫之來為來盟則當書之如衛侯使孫良夫來盟之類宣六年若以行父之往為涖盟則亦當書如公子友如齊涖盟之類僖三年秋叔孫僑如如齊左氏以修前好傳之蓋魯懲於附晉陵齊以自取辱而始講交鄰之禮雖欲附齊而未能也自鞍戰之後與齊盟于蜀又盟于蟲牢又盟于蒲雖盟而齊未釋憾於鞍之戰而魯未釋憾於汶陽之復歸故叔孫僑如如齊専以修鄰好耳冬十月十有二年壬午春周公出奔晉公羊傳周公者何天子之三公也左氏傳周公楚惡惠襄惠王襄王蔟之逼也且與伯與平聲爭政不勝怒而出及陽樊王使劉子復之盟于鄄而入三日復出奔晉書曰周公出奔晉凡自周無出周公自出故也杜氏注天子無外故奔者不言出周公為王所復而自絶於周故書出以非之人臣有過當服罪安有奔之事為臣出奔無君矣天下安有無君之國也晉納逋逃其罪亦著矣公會晉侯衛侯于瑣澤按左氏宋華元如楚遂如晉合晉楚之成鄭伯如晉聽成會于瑣澤傳既言宋合晉楚鄭聽成經何以但書會魯晉衛而鄭宋楚俱不與何耶以經考傳則有不可曉者矣秋晉人敗狄于交剛左氏傳狄人間宋之盟以侵晉問冏厠之間狄以晉楚盟于宋故冏之而侵晉冬十月十有三年癸未春晉侯使郤錡魚綺切來乞師天下無道禮樂征伐自諸侯出晉不稟命于天子擅欲興師其後雖假王命而行而非専稟命也况以私忿伐秦唯恐諸侯之不從故卑辭自屈以乞師自此至十六年十七年十八年凡四乞師于諸侯聖筆特書乞之一字其貶之也至矣晉為盟主動以信義徴諸侯以師會孰敢不聽何至於乞哉春秋直書實事以為後世戒也三月公如京師夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦書如京師而不書朝見非有朝王之實意因晉約伐秦道由王都而往朝之故書與列國之禮均書如京師之後而繼書遂會諸侯伐秦以見其實蓋深罪其志不在王室也泰山孫氏曰周官六年五服一朝王時巡守朝于方嶽未有因諸侯伐國過京師朝王之事故書晉使來乞師公如京師自京師遂伐秦以惡之也是年敗秦師于麻隧曹伯盧卒于師左氏傳曹宣公卒于師曹人使公子負芻守使公子欣時逆曹伯之喪秋負芻殺其太子而自立也諸侯乃請討之晉人以其役之勞請俟他年諸侯卒于師曰師卒于會曰會正也宣公卒成公立襄十八年卒秋公至自伐秦先書自京師遂會伐秦稍進其朝王之意及至自伐秦而不以京師至而以伐秦至眀本非朝京師也冬葬曹宣公左氏傳既葬子臧將亡子臧公子欣時曹之賢公子也不義負芻將亡奔他國國人皆將從之成公乃懼告罪且請焉請留子臧乃反而致其邑還邑于成公不食其祿為十五年執曹伯傳十有四年甲申春王正月莒子朱卒莒自兹牟公始見于春秋至此渠丘公凡四世矣而經書其卒莒夷也其君無諡皆以號為稱則禮之不備可知矣死不卒不能赴也卒不葬我不往會也徐邈曰葬皆稱諡而莒行夷禮君無諡故與楚僣王號同不書葬終春秋夏衛孫林父自晉歸于衛左氏傳衛侯如晉晉侯強見孫林父焉林父以七年奔晉定公衛不可衛侯歸晉侯使郤犫送孫林父而見之衛侯欲辭定薑曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈于亡乎衛侯見而復之君林父七年奔晉言自晉由晉侯得歸也林父得罪于而出奔晉晉使郤犨送而見之衛雖欲辭迫于大國之請而不果則衛之為衛晉之為晉可知矣書自晉歸于衛參譏也蓋衛侯出奔六卿専晉之漸也秋叔孫僑如如齊逆女逆公夫人也鄭公子喜帥師伐許左氏傳鄭子罕伐許戊戌鄭伯復伐許許人平以叔申之封四年鄭公孫申疆許田許人敗之不得定其封疆今許以是所封之田求和于鄭九月僑如以夫人婦薑氏至自齊僑如不氏一事而再見者卒名也稱婦宣公穆薑尚存故也冬十月庚寅衛侯臧卒衛侯有疾立妾敬姒之子衎為大子是為獻公襄十四年出奔秦伯卒桓公卒景公立昭公五年卒十有五年乙酉春王二月葬衛定公三月乙巳仲嬰齊卒仲嬰齊者公子遂襄仲之子歸父之弟也歸父出奔齊魯人傷其無後使嬰齊為歸父後立弟為子也何休謂亂昭穆之序失父子之親也為歸父後則弟不可為兄嗣為襄仲後父字為氏亦非也書仲嬰齊卒又見弟之後兄為非正也癸丑公會晉侯厲衛侯獻鄭伯成曹伯成宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師左氏傳會于戚討曹成公也計其殺太子自立也執而歸諸京師諸侯將見子臧于王而立之子臧辭曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋程氏曰十三年曹伯卒于師負芻弒世子自立既三年諸侯與之盟矣方執之稽天討也故書同盟見其既同蘇氏曰稱侯以執執有罪也歸之京師禮也春秋書執諸侯者多矣惟是為得禮侯晉既與曹伯盟乃執之繆舉也當先執曹伯以令諸然後盟之乃盡善也公至自會夏六月宋公固卒宋共公卒平公立昭十年卒楚子伐鄭左氏傳楚將北師侵鄭衛子囊曰公子貞新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭及暴隧鄭地遂侵衛及首止衛地鄭子罕侵楚取新石楚邑欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰為明年晉敗楚于鄢陵傳秋八月庚辰葬宋共公三月而葬速宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚左氏傳宋華元為右師蕩澤為司馬蕩澤弱公室殺公子肥文公子輕公室以為弱故殺其枝黨華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣乃出奔晉左師魚石自止華元于河上請討許之乃反返按經云奔晉又云自晉歸于宋若果因魚石止而遂則經必不如是書之也故趙氏疑之時蕩氏乘喪作亂殺公子肥六卿皆其族華元懼不得不出奔晉假晉之力以討之元既得民又挾晉以自重元自晉歸使國人攻蕩氏殺子山而國始定蕩氏宋之族也不書氏眀背其族也背其族是伐其本故去族以示法稱國以殺罪纍上也山實有罪而稱國以殺何也殺一大夫而國幾于亂非政也魚石以同桓氏故疑懼而奔楚左氏謂出者五人而經獨書魚石出奔楚當以經為正而傳不足信也冬十有一月叔孫僑如會晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離左氏傳吳始通也吳未嘗通中國今始來通晉帥諸侯之大夫會之故殊會鍾離楚邑淮南縣今濠州城下故鍾離國嬴姓後為楚邉邑程氏曰吳益強大求會于諸侯諸大夫往而從之故書諸國往與之會以見吳日盛而中國衰也時中國病楚故與吳親榖梁傳會又會外之也胡氏曰吳以號舉外之也會而殊會有二會世子于首止意在尊王室不敢與世子抗也會吳于鍾離于相于向意在于惡吳而非諸侯往與之會也夫以泰伯至德是始有吳以族言之則周之伯父也至其後世遂以號舉者以其僣竊稱王不能居中國之爵號耳成襄之間中國無霸齊晉大國亦俯首東向而親吳聖人蓋傷之故特殊會可謂深切著朋矣許遷于葉舒涉切葉今汝州葉縣左氏傳許靈公畏逼子鄭請遷于楚楚公子申遷許于葉今案葉近楚而楚遷以自近中國之盟主不能安小國而使之昵夷蠻以求安春秋深以著小國之失所也十有六年丙戌春王正月雨木冰杜氏注記寒過節氷封著樹杜氏既以十一月為周正何為言寒過節自相抵捂如此是又主夏正而言也公羊傳雨而木氷也何休曰木者少陽幼君大臣之象氷者疑隂兵之類氷脅木者君臣將困於兵之徴胡氏曰未幾有沙隨苕丘之事天人之際休咎之應焉可誣也也唐遜皇帝以為木稼者是也木稼蓋木介爾此記異劉歆曰上陽施而不下通下隂施而不上達故雨而木為之氷也夏四月辛未滕子卒滕文公卒成公立昭三年卒鄭公子喜帥師侵宋左氏傳楚子自武城使公子成楚大夫以汝隂之田求成于鄭鄭叛晉鄭得楚田遂叛晉子駟從楚子盟于武城四月滕文公卒鄭子罕伐宋滕宋之與國鄭因滕有喪而伐宋宋將鉏樂懼敗諸汋陂敗子罕退舍於夫渠宋地不警鄭人覆之敗諸汋陵獲將鉏樂懼宋恃勝也衛侯伐鄭至于鳴鴈鄭地為晉故也六月丙寅朔日有食之晉侯使欒黶來乞師左氏傳晉侯將伐鄭使郤犫如衛遂如齊皆乞師焉欒黶來乞師程氏曰時穆薑叔孫僑如將作難故師出後期甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績晉侯將伐鄭范文子止之欒武子請行于是興師楚子救鄭晉楚遇于鄢陵及戰吕錡射楚共王中目鄭伯納旌于韜以免囚楚公子茷扶廢反旦而戰見星未巳子反命軍吏察夷傷補卒乘繕甲兵雞鳴而食晉徇曰搜乘補卒眀日復戰逸楚囚共王召子反謀子反醉王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日穀范文子立于戎馬之前曰君幼諸臣不佞何以及此君其戒之楚共王傷故不言師君重于師也言及者晉志乎此戰也晉楚之戰勍敵也旦戰至日莫未巳勝負未可知也晉亦幸而捷爾楚雖敗而益張晉亦怠矣欒氏譛而誅三郤晉遂亂范文子始不欲戰幸勝而復戒其言信可重也楚殺其大夫公子側鄢陵之戰楚子親臨行陳而敗不思所以自責乃歸罪于大夫故稱國以殺以纍上之辭言之秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公沙隨杜氏注宋地梁國寧陵縣有沙隨亭不見公者晉侯不見公也鄢陵之戰晉侯乞師于魯公以叔孫僑如通穆薑惡季文子孟獻子欲去之公將出師待于壞隤申宫警備設守而後行是以後宣伯即僑如使告郤犫曰魯侯以待勝者郤犫譛公晉侯不見公程氏曰晉侯不見公聽譛怒公後期故不見公君子正已無恤乎人魯後期國難故也晉不見為非矣彼曲我直故不足恥也晉聽譛怙強無義不見公我何恥焉故直書之而在會諸侯俱有罪也公至自會內有穆薑之難外不為盟主所禮故至以危之公會尹子晉侯齊國佐邾人伐鄭尹子王卿士子爵也齊不躬行而以大夫會故但書齊國佐邾書人蓋微者皆直書其事以譏之也曹伯歸自京師曹伯殺嫡自立晉侯執之歸于京師天子當正其罪上書王卿士尹子之來會伐見其情矣蓋王反為曹圖之而俾晉侯釋之也今聖筆直書歸自京師見王之釋有罪也不絶曹伯之位者譏在王而不罪負芻也九月晉人執季孫行父舍之于苕丘晉聽叔孫僑如之譛而執季孫故稱人以示譏言非伯討也舍處之也苕丘晉地執之無罪誅之無名舍之苕丘以待命也魯大夫見執如叔孫意如昭十三年叔孫婼二十四年類皆書其至今行父不至蓋公在而行父執焉公待于鄆與之共歸書公至自會舉公為重也冬十月乙亥叔孫僑如出奔齊僑如通穆薑欲去季孟而取其室又譛公于郤犫使殺行父及魯平赦季孫故僑如奔齊恐公未歸嘗命國人逐僑如僑如亦自知譛君之罪既覺禍及已故不容不奔也十有二月乙丑季孫行父及晉郤犫盟于扈左氏傳晉許魯平赦季孫出叔孫僑如而盟之僑如奔齊石氏曰季孫獲歸與郤犫盟于扈晉之政在大夫可知矣公至自會君臣同出以君至也公伐鄭不至自伐以會至者行父故也乙酉刺公子偃左氏傳歸刺公子偃與偃與鉏俱為穆薑所指而獨殺偃偃謀公子買言不卒戍刺之言非其罪而加之也偃止言刺言當其罪此內殺大夫有罪無罪之别也刺之義見僖公二十八年十有七年丁亥春衛北宫括帥師侵鄭括衛成公曽孫左氏傳鄭子駟侵晉虛滑晉二邑衛北宫括救晉侵鄭至于髙氏在陽翟縣西南夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵左氏傳鄭太子髠頑侯獳乃侯切為質于楚楚公子成公子寅戍鄭公會尹武公單襄公及諸侯伐鄭自戲音禧童至于曲洧杜氏注晉未能服鄭故假天子威周使二卿會之為鄭叛晉即楚晉會諸侯往伐之則求盟既盟復背晉盟主于是假王室二卿與諸侯共伐之及楚兵一出諸侯遂還亦徒為此盟猶未能盟之也罪曹伯負芻乘喪弒太子自立晉雖執之于京師王舍而歸之今又列于會王無政刑矣故是不書王見王之不王也盟齊桓首止之會王世子不與盟異時月而書諸侯同于首止葵丘之會周公在而未嘗盟亦異月日而書曰九月戊辰諸侯同盟于葵丘會而不盟尊王也今此既尊二卿在上及同盟則不殊而混為一列有愧于齊桓矣自是習以為常非禮也秋公至自會不以伐鄭至而以會至蓋以晉罪公未久則公之危不在于伐而在于會會以得免為幸故以會至録也齊髙無咎出奔莒左氏傳齊慶克通靈公母聲孟子與婦人蒙衣乘輦而入于閎鮑牽見之以告國武子武子召慶克而謂之慶克久不出而告夫人曰國子謫我夫人怒國子相靈公以會會伐鄭髙鮑處守髙無咎鮑牽及還將至閉門而索客搜索備姦人孟子訴之曰髙鮑將不納君而立公子角國子知之秋七月壬寅刖鮑牽而逐髙無咎無咎奔莒髙弱無咎子以盧叛盧髙氏邑靈公不眀信讒而逐其世臣以致禍亂自殞其身悲夫九月辛丑用郊公羊傳用者不冝用也九月非所用郊也然用郊用正月上辛聖人制祭祀必天子乃得郊魯之僣郊非禮也經特書之以示譏也或曰用者用人也以人享也蓋叩其鼻血以薦也牛羊人之用也用人淫矣晉侯使荀罃來乞師晉乞師於魯十三年使郤錡來十六年使欒黶來十七年使荀罃來其後十八年又使士魴來閔五年而四來乞師以盟主而自卑辱如此豈能得楚鄭之畏服乎冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭晉以鄭即楚再假王命三合諸侯以伐之楚救至則諸侯還晉不能一舉伐荆楚以強中國安能服鄭徒勞民動衆何足以言伯主也十一月公至自伐鄭公凡三會晉侯伐鄭前此但至會此方以伐至也壬申公孫嬰齊卒于貍脤市軫切貍脤地闕蘇氏曰嬰齊從于伐鄭還道卒大夫卒不地其地在外也案下有十二月丁巳朔則壬申非十一月失之矣十有二月丁巳朔日有食之邾子貜音躣且音狙卒晉殺其大夫郤錡郤犫郤至三郤族大而強又民多怨晉厲公自鄢陵勝楚還而驕甚胥童夷陽五長魚矯皆嬖于公公謀盡去羣大夫而立其左右先誅三郤郤氏知之郤錡欲攻公郤至止之靖以待命公使長魚矯皆殺之郤雖多怨公殺之不以其罪故稱國以殺列數之以著其惡一日而尸三卿其誰與處榖梁以為禍于是起眀年遂有被弒之禍經據實事以纍上之辭言之為後世戒也楚人滅舒庸左氏傳舒庸人東夷偃姓之國廬州城下舒城以楚師之敗也道吳人圍巢楚邑伐駕楚邑圍釐虺楚二邑遂恃吳而不設備楚公子槖師襲舒庸滅之十有八年戊子春王正月晉殺其大夫胥童左氏傳十七年閏月乙卯晦欒書中行偃殺胥童經書在今春從告厲公之殺三郤皆胥童為之欒書之討以政也故經不書二臣殺之而稱國以殺之以君實為之也然胥童嘗以甲劫二臣于朝故二臣因之作亂先殺胥童自是而弒君故以殺其大夫書而以纍上之辭言之此輕重之權衡也庚申晉弒其君州蒲實欒書中行偃殺之其稱國以弒何稱國以弒衆殺其君之辭也眀晉侯之惡甚矣以二子之惡分之于衆也齊殺其大夫國佐齊髙無咎之子弱以盧叛使崔杼慶克圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以其私邑叛齊侯與之盟而復月之十一月盧降使國勝告難于晉待命于清今年正甲申晦齊侯殺國佐使清人殺國勝刖慶克通穆薑國佐謫之穆薑怒譛于公既奔無咎而鮑牽矣穆薑又謀害國佐國佐憤怨遂棄命専殺以叛國佐叛而公復之亦知慶克之內亂可誅國佐非私忿殺之也然卒殺國佐則穆薑為慶克報復而重譛之而靈公惑之也其後遂成慶封黨賊之禍而政歸陳氏矣國佐仕亂朝惜乎不能早去卒殞其身經稱國殺之罪纍上也公如晉左氏傳朝嗣君也夏楚子鄭伯伐宋宋魚石復入于彭城彭城宋邑今徐州彭城縣鄭伯侵宋遂會楚子伐宋取朝郟音夾宋邑楚子辛鄭皇辰侵城郜宋邑取幽丘宋邑同伐彭城宋邑晉吳往來之道納宋魚石向為人鱗朱向帶魚府五大夫以十五年出奔楚今楚納之彭城以害宋而毒吳晉獨書魚不以帥告也以三百乘戍之而還之楚子伐宋取宋邑彭城魚石宋叛臣也不言楚子使守而言復入者如魚石自入焉不與楚子之入鄰國而納其叛臣也言復者彭城本宋邑今楚取之魚石本宋臣今楚納之而令入其宋邑故書曰復入甚著其惡也公至自晉晉侯使士丐來聘左氏傳公至自晉晉范宣子來聘且拜朝也君子謂晉于是乎有禮肅襄陽許氏曰公朝始至而聘使繼至晉悼之下諸侯矣列國之所以睦而叛國之所以服也秋杞伯來朝左氏傳祀桓公來朝且問晉故公以晉君語之杞伯于是驟朝于晉而請為昏八月邾子來朝左氏傳邾宣公來朝即位而來見也築鹿囿杜氏注築牆為鹿苑孫氏曰春秋興作皆書雖城池之固門廄之急無遺焉以其德不及之而徒勞民力也况耳目之玩一身之娛哉左氏曰書不時也蓋得時猶書也許氏曰大夫擅國威福日去而公務自娛于鳥獸草木是之謂冥豫在上何可長也樂文王靈囿麀鹿濯濯芻蕘雉皆得往焉蓋與民同也經于魯成之鹿囿書之曰築蓋築垣牆以防限獨樂其樂也故書以示譏焉己丑公薨于路寢榖梁傳路寢正也男子不絶于婦人之手以齊終也冬楚人鄭人侵宋左氏傳宋老佐華喜圍彭城老佐卒焉楚子重救彭城伐宋宋華元如晉告急韓厥為政曰欲求得人必先勤之勤恤之成霸安強自宋始矣晉侯師于台谷以救宋遇楚師于靡角之谷宋地楚師還晉侯使士魴來乞師左氏傳晉士魴來乞師季文子問師數出師之數于臧武仲對曰伐鄭之役在十七年知伯荀罃實來下軍之佐也荀罃佐晉下軍如伐鄭可也師出如十七年伐鄭之師可也事大國無失班爵而加敬焉加敬使者禮也從之襄陵許氏曰悼公復興伯業而乞師猶循厲公故事元年而後遂無乞師則召兵而已矣十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虛朾虛起居切朾他丁反地闕彭左氏傳謀救宋也宋人辭諸侯而請師以圍城不敢煩諸侯但請其師以圍彭城襄陵許氏曰襄公不會在喪故也悼之所以仁諸侯也丁未葬我君成公左氏傳書順也杜氏注薨于路寢五月而葬國家安靜世適承嗣故曰書順讀春秋編卷八
