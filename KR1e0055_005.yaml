body:
  text: 讀春秋編卷五宋陳深撰僖公名申莊公庶子閔公兄母成風諡法小心畏忌曰僖元年壬戌春王正月僖公內不承國于先君上不請命于天王不書即位正王法也公羊傳繼弒君子不言即位此非子也其稱子何臣子一例也注禮諸侯臣諸父兄弟以臣之繼君猶子之繼父也其服皆斬衰敵傳稱臣子一例齊師宋師曹師次于聶北救郉狄伐郉齊桓率諸侯之師以救之次于聶北者杜氏謂按兵觀釁以待事也蓋齊桓懼狄而持重視其便利不遽決於一戰春秋書次譏其緩也禮救患當急齊與諸國俱稱師必兵力之衆可救而不速進故郉潰出奔師然經書次不書緩以其終有救郉之功也聶北杜氏注邢地夏六月郉遷于夷儀公羊作陳儀北夷儀杜氏注郉地輿地廣記河郉州龍岡縣北有夷儀嶺器左氏傳諸侯救郉郉人潰出奔師師遂逐狄人具郉用而遷之師無私焉閔二年傳郉遷如歸見齊侯委任得人用兵齊整書郉遷謂其意欲遷而遷以定之也與逼遷而強取者不同齊師宋師曹師城郉郉畏狄而自遷于夷儀齊與諸侯城之救災患也所以美齊桓之功也雖不以王命興師是時中國衰微滅亡相繼天子不能正諸侯能救而存之則聖人亦興之也故胡氏曰以王命興師者正能救而興之者權秋七月戊辰夫人薑氏薨于夷齊人以歸左氏傳閔二年哀薑孫于邾齊人取而殺之于夷以其尸歸僖公請而葬之夫人在內薨有常處故止書薨在外則書地不言齊人殺諱之也哀薑淫亂而殺二君齊為魯討其罪而以喪歸蓋自文薑弒夫逃辟而啓之也齊桓仗義而伯故哀薑慶父皆不能免使後之姦惡有所畏而不敢為也楚人伐鄭左氏傳楚人伐鄭鄭即齊故也其荆始以州舉今改號曰楚經書楚書人以自此浸強矣然猶君臣同辭終齊桓之世而不得與中國之會盟者齊桓能制其強也至僖十七年齊桓沒而宋襄霸楚始列于會盟不特書人乃以爵書亦由漸而至也八月公會齊侯宋公鄭伯曹伯邾人于柳柳音赬杜氏注宋地陳國陳縣西北有柳域今宛丘縣也此左氏傳盟于犖音洛謀救鄭也犖即柳也地有二名衣裳之會第六九合第四會也是時楚伐鄭其勢方強齊會諸侯合謀救之慎重而不輕舉也九月公敗邾師于偃杜氏注偃邾地乃八月公方與邾會于柳甫一月詐敗邾師左氏以虛丘之戍將歸者也蓋邾人送哀薑還齊齊殺之公求諸齊齊送薑氏之喪邾懼乃歸公要而敗之不言邾侵我伐我又不言戰而遽書敗邾師以詐敗之幸勝也故書以譏之魯僖恃齊之親亦不畏齊之伯政遂敗與會之邾齊不之罪者以公親至柳邾以人會也僖之意莫非哀薑孫于彼故遷怒以敗其師然則邾何罪耶冬十月壬午公子友帥師敗莒師于酈獲莒拿女居反酈音梨魯地師莒人來求歸慶父之賂而不與乃以兵至季友以偏敗之獲莒侯之弟拿胡氏曰不能喻以辭命使知不直以抑止之又用詐謀擒其主將故以友為主而書敗獲責之備也十有二月丁巳夫人氏之喪至自齊齊為霸主以哀薑與弒二君正其罪殺之于夷義已絶而死不以正不可復入宗廟矣僖公請而葬之告廟而書至非義也死書薑氏喪至則去薑姓以惡之也而仍氏者不同乎文薑也文薑弒夫雖臣子得絶之矣哀薑殺子終不可以子故讎母唯霸主得行焉二年癸亥春王正月城楚丘楚丘衛邑衛為狄所滅野處漕邑齊桓率諸侯城其邑俾之立國德莫大焉木瓜之詩美之夫子蓋嘗録之矣然春秋書城楚丘齊與諸侯略而不言若魯自城其邑又不言為衛何邪諸儒謂諸侯不得專封春秋不與之故不書呂氏曰非也專封者以此地封此人也諸侯有相滅亡其時天子不能令方伯不能救力能救而復之可也以是為專封是嫂溺援之以手而以為罪也陸氏謂魯城之非正也曷為無譏焉曰王政不行列國相殘齊桓為霸主存亡繼絶魯從其令亦所以自安也故通其變以示不失正也不書齊命為桓諱也不繫于衛示無所譏也若言城衛楚丘則彼我俱非也夏五月辛巳葬我小君哀薑僖公請之故純用小君禮而書葬也哀薑莊公之夫人哀薑夫人之諡諡所以旌德夫人之所為如此而不得其死誠可哀也已虞師晉師滅下陽晉欲伐虢以屈産之乘垂棘之璧假道於虞虞公許之宫之竒諫不聼虞貪寶而忘脣亡齒寒之勢乃起師為之嚮導故書虞師為戎首在晉師之上下陽虢邑也非國而曰滅重下陽也蓋下陽虞虢之塞邑其地險要失下陽則虞虢亡矣故書滅而其後不書滅虢晉與虞虢同姓之鄰國晉大而虞虢小晉圖虢恐虞虢之相救故以貨啖虞而間其交虞不悟虢亡則虞亦亡因貪賂而迷焉春秋書之所以示虞之自取滅亡著晉獻凌小國滅同姓之罪也秋九月齊侯宋公江人黃人盟于貫公羊作貫澤江國在汝南安陽縣今蔡州新息縣之地黃嬴姓國在汝南弋陽縣今光州定城縣也貫宋地今興仁府濟隂縣有貫城左氏傳盟于貫服江黃也服此衣裳之會第七九合第五會也江黃楚與國始來齊但約宋與盟不煩諸侯也齊桓欲服楚先服此二國以孤楚之勢以漸而致楚之來其慮事也逺矣此其所以成霸功也冬十月不雨穀梁傳不雨者勤雨也言不雨是欲得雨之心勤也明君之恤民楚人侵鄭左氏傳楚伐鄭鬭章囚鄭𥅆伯也楚自元年稱人不狄之比之小國三年甲子春王正月不雨夏四月不雨穀梁傳不雨者勤雨也一時言不雨者閔雨也經一時輒言不雨憂民之至閔憂也閔雨者有志乎民者也去冬及今年春夏之不雨陽亢也聖筆屢書之著其君憂民之憂也若夫文公厯三時不雨而併書之故自十有二月不雨至于秋七月而書自正月不雨至于秋七月而書見其不以民為憂而棄民事所以著其慢也徐人取舒杜氏注徐國在下邳僮縣東南舒國今廬江舒城縣舒附庸之國服屬於楚徐人取之蓋隂附齊而為齊取也不然寧不畏楚之強況徐與舒相去甚逺非封境相接而欲廣其土地越竟而取其國必有所恃而有所為也書取而不書滅不絶其祀也六月雨穀梁傳雨云者喜雨也喜雨有志乎民者也民不雨而屢書見憂民之憂喜雨而特書見樂之樂故懼災恤民之意春秋書之以示訓也秋齊侯宋公江人黃人會于陽穀陽穀齊地今東平府須昌縣北此衣裳之會第八九合第六會也會江黃去年來盟今嵗再會定伐楚之約也及四年齊諸侯侵蔡伐楚而江黃不從行但守其境不動何耶此蓋齊桓令其自為犄角之勢以制勝克敵此桓之善為謀也冬公子友如齊涖盟左氏傳齊侯為陽穀之會來尋盟杜氏曰公時不會陽穀故齊侯自陽穀遣人詣魯求尋盟魯使上卿詣齊受盟涖臨也就盟于齊臨涖之耳猶莊以涖之之涖也楚人伐鄭左氏傳楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我勤恤鄭難棄德不祥齊之恤鄭至矣鄭以囚𥅆伯之故欲從楚鄭臣懷之諫以不可忘德楚至此凡五侵伐鄭矣是以齊侯明年大舉以伐之四年乙丑春王正月公會齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘蔡自北杏一會明年為楚入是時楚方強故齊桓養其威力不肯輕出師以救之自是之後蔡黨于楚今齊會八國之師先事侵蔡蔡潰先披楚之黨也潛師掠境曰侵用奇兵也聲罪致討曰伐用正兵也遂以諸侯潰蔡之師伐楚威震而兵強楚於是大懼何敢嬰其鋒乎齊與諸侯之師乃次于陘陘楚地次止也止而不速進也恐速進則多傷士卒蓋欲臨之以威綏之以德楚子使屈完如師來求盟因而許之雖有諸侯而不用蓋霸者之師求以服人而已桓之此舉不戰而服楚是可紀其功也所惜者齊桓與管仲不知請命于天子擅合諸侯規模狹隘非天吏討罪之法也聖筆書遂者譏其專也書次于陘者著其師有節制能懾楚以定中國也夏許男新臣卒傳言卒于師陸淳以為非蓋召陵地屬潁川潁川今之順昌府長社縣去許密邇故許男疾而歸也故經不書卒于師而但書卒也楚屈完來盟于師盟于召陵屈完楚大夫之名氏通之者嘉其服義而進之也來而不書使不與其同於盟會以嚴中外之分而重方伯之體屈完既至而桓公退師以禮楚與盟而不遂也於此見齊師雖強桓公能以律用之而不暴楚人已服桓公能以禮下之而不驕雖不足以盡王者之事夫子所謂一匡天下民到于今受賜實二百四十年甚盛之舉不得不序其績也齊人執陳袁濤塗袁左氏作轅今從公穀而袁濤塗陳大夫也齊帥諸侯自陳南至楚其還師也陳恐齊亦由此道復有供給之費故令袁濤塗説桓公濵海而東服東夷且歸桓公於是還師濵海而東大陷于沛澤之中顧而執濤塗齊侯以濤塗誤軍故執之胡氏曰陳大夫一謀不協其身見執其國見伐見侵桓公失在於量淺而器不宏也春秋稱人以執罪齊侯也秋及江人黃人伐陳程子曰齊命也穀梁傳不言其人及之何內師也魯之師也左氏傳伐陳討不忠也陳濤塗之事左氏與公羊傳不同如左氏則齊師仍由還但怒濤塗之言幾誤軍事耳若果由陳鄭而歸則何必魯及江黃伐陳又再勤七國之師乎以此考之則公羊大陷沛澤之説可信不然何齊桓怒陳之甚既伐而又侵之也八月公至自伐楚師出三時之久故必告而書至也葬許穆公冬十有二月公孫兹帥師會齊人宋人衛人鄭人許人曹人侵陳公孫兹叔牙子叔孫戴伯也陳左氏傳叔孫戴伯帥師會諸侯之師侵陳成歸轅濤塗袁春秋書侵陳極貶之也齊桓服楚受盟而志頓驕陳濤塗誤軍非惟罪其臣伐其君而又會七國侵之待其服而後已五年丙寅春晉侯殺其世子申生穀梁傳目晉侯斥殺惡晉侯也公羊傳殺世子母弟直稱君者甚之也初晉獻公以世子申生為冢嗣後嬖驪姬姬欲立其子奚齊譖申生申生不辨被讒自縊陸淳曰申生有愛父之心而陷父於不義使讒人得志國以大亂諺所謂小仁大仁之賊也春秋罪獻公正其本也獻公寵驪姬嬖庶孽迷於欲而忘反蔽讒賊而不知輕世適之重以自禍其家國中生死未幾而公卒奚齊卓子亦被殺晉亂二十餘年董子所謂為人父而蒙首惡之名者聖筆專罪晉侯以為有國者之鑒也杞伯姬來朝其子伯姬來寧成風也其子十歲隨母以來朝公也杞伯在其子幼而令行朝禮失正也春秋書以參譏之也夏公孫茲如牟左氏傳公孫兹如牟娶焉兹叔牙子公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止首止公榖作首戴杜氏注陳留襄邑有首鄉襄邑今屬拱州此衣裳之會第九九合第七會也王世子惠王之太子鄭也惠后死繼后生叔帶欲立之齊桓以王廢長立幼溺愛不可以諫遂率諸侯會王世子于首止示天下戴之以為天王之二所以尊國本絶亂階也於是世子之位定而周以寧故春秋善之是時王室衰微諸侯不貢覲齊桓率諸侯以尊世子是即尊天子也天子聞之寧不樂諸侯之推戴其子而不易其位君臣父子之道得矣故漢之四皓從太子而惠帝之位定周之諸侯會世子而襄王之位定皆納約自牖之義竊疑子房用齊桓之遺意也會春秋書及以會若王子在是諸侯咸往會焉特殊其所以尊君而抑臣也秋八月諸侯盟于首止公羊傳諸侯何以不序一事而再見者前目而後凡也穀梁傳無中事而復舉諸侯何也尊王世子而不敢與盟也尊則其不敢與盟何也盟者不相信也故謹信也不敢以所不信而加之尊者桓諸侯也不能朝天子是不臣也王世子子也塊然受諸侯之尊已而立乎其位是不子也桓不臣王世子不子則其所善焉何也是則變之正也雖非禮之正而合當時之冝天子微諸侯不享覲桓控大國扶小國統諸侯不能以朝天子亦不敢致天王尊王世子于首戴乃所以尊天王之命也世子含王命會齊桓亦所以尊天王之命也世子受之可乎是亦變之正也天子微諸侯不享覲世子受諸侯之尊已而天王尊矣世子受之可也今此盟蓋會世子之禮已畢約諸侯以同戴世子謂自盟後不可違盟而反助惠王廢世子也世子天下之本本一搖則亂謀于未亂所以寧周此春秋之義舉也鄭伯逃歸不盟惠后欲易世子惠王徇其意故聞齊桓此舉反不以為恱左氏傳王使周公宰孔也召鄭伯曰吾撫汝以從楚輔之以晉可以少安王恨齊桓定大子位故召鄭伯使叛齊也晉楚不服于齊故以鎮安鄭鄭伯喜於王命而懼其不朝于齊也故逃歸不盟孔叔止之曰國君不可以輕輕則失親失親患必至病而乞盟所喪多矣君必悔之弗聽迅其師而歸傳例曰逃義曰逃逃者匹夫之事鄭伯內牽私命外欲與楚故不盟而逃春秋書之極致其貶桓公不師諸侯以討鄭則天下無心于尊周則不知所懲矣楚人滅弦弦子奔黃杜氏注弦國在弋陽軑縣東南地譜光州光山縣左氏傳楚鬬穀於菟滅弦弦奔黃於是江黃道柏方睦於齊皆弦姻也弦子恃之不事楚又不設備故亡泰山孫氏曰此言楚人滅弦者惡齊桓之不能救也故弦子不名十年狄滅溫十二年楚人滅黃同此黃弦同壤黃受弦子之奔故十二年楚滅黃原於齊桓不能救弦遂啓其圍許鄭之紛紛有慿陵諸夏之意春秋書滅弦罪桓也九月戊申朔日有食之冬晉人執虞公左氏傳晉侯復假道於虞以伐虢宫之竒諌曰虢虞之表也虢亡虞必從之晉不可啓寇不可玩一之謂甚其可再乎諺所謂輔車相依脣亡齒寒其虞虢之謂也弗聼許晉使八月晉侯圍上陽滅虢虢公醜奔京師師還館子虞遂襲虞滅之執虞公二年書虞師晉師滅下陽五年書晉人執虞公虞方為晉伐虢甫三年而晉滅虢虞亦滅不言晉之滅虞見虞之自取也此可為嗜目前之利而忘後患者之鑒然晉之用心亦險矣春秋書人以執惡晉侯也六年丁卯春王正月夏公會齊侯宋公陳侯衛侯曹伯伐鄭圍新城杜氏注新城鄭新密滎陽密縣今屬鄭州所左氏傳諸侯伐鄭以其逃首止之盟故也圍新密鄭以不時城也實新密而經言新城者鄭以非時興土功齊桓聲其罪以告諸侯以諸侯之力圍鄭新邑久而不舉蓋欲待其自服也鄭不即服故書伐又書圍著鄭伯之罪也秋楚人圍許諸侯遂救許楚圍許蓋攻其所必救以解鄭圍楚之計欲恩鄭以來之也齊移諸侯之師以救許所以抑暴而救患不得不墮楚之計中然齊卒下討楚之圍許亦畏其強而不輕舉也春秋書遂善之也公至自伐鄭不言救許大伐鄭也師出踰三時之久故致也七年戊辰春齊人伐鄭鄭伯南與楚合故齊復伐之力自足以制鄭故不會諸侯稱人將卑師少也夏小邾子來朝小邾子附庸國即郳犂來也莊公五年嘗來朝後從齊桓尊周室王命以為小邾子鄭殺其大夫申侯案左傳鄭以陳袁濤塗之譖內惡申侯故托以申侯自楚奔鄭故不忘楚嘗誤鄭背齊從楚於是殺之以説齊將以求寧母之盟春秋書國以殺貶其擅殺之罪然申侯專利而不厭嘗城其賜邑甚美是皆有以致之也秋七月公會齊侯宋公陳世子款鄭世子華盟于寧母杜氏注髙平方音房與音預縣有泥母亭音與寧同貢管仲言於齊侯以德與禮懷諸侯令諸侯各受方所天子之物鄭伯使世子聼命于會言于齊侯欲去泄氏孔氏子人氏三族乃事齊為內臣齊侯辭焉蓋鄭伯猶未誠服先使世子來以嘗之也至明年洮之會鄭欲與而不得始乞盟焉此衣裳之會第十九合第八會也曹伯班卒班公羊作般公子友如齊杜氏注罷盟而聘謝不敏也冬葬曹昭公八年己巳春王正月公會王人齊侯宋公衛侯許男曹伯陳世子款盟于洮鄭伯乞盟杜氏注洮曹地下此兵車之會第一王人士微者也序乎諸侯之上尊王命也案左氏傳七年閏月惠王崩襄王惡大叔帶之難懼不立不發喪告難于齊八年盟于洮謀王室也襄王定位而後發喪王人會洮還而後王位定乞者卑遜自屈之辭也鄭伯始逃盟而今求盟惟恐齊之不與盟故特書曰乞鄙之也夏狄伐晉左氏傳晉里克敗狄于采桑前年事也平陽北屈縣有采桑津八年夏狄伐晉報采桑之役也衛狄浸強伐郉滅衛既已得志今又伐晉其後滅溫侵齊桓為盟主何置之度外令其肆行無所忌憚也秋七月禘于大廟用致夫人禘王者之大祭非魯之所得用于大廟大廟周公廟也穀梁傳范氏注劉向曰夫人成風也致之于廟立以為夫人穀梁傳用者不冝用也致者不冝致也言夫人必以氏姓言夫人而不以氏姓非夫人也立妾之辭也夫人者正嫡之稱謂非崇妾之嘉號以妾體君則上無别欲尊其母實卑其父故曰赤正也孫氏曰嫁非廟見不得與祭僖公欲尊其母因秋禘用夫人之禮致于大廟使之與祭也妾母稱夫人僭之大者故不言風氏以貶之冬十有二月丁未天王崩惠王也也左氏傳王人來告喪難故是以緩杜氏曰實以前年閏月崩以今年十二月丁未告師氏曰不書葬魯不會葬故也九年庚午春王三月丁丑宋公御説卒左氏傳春宋桓公卒夏公會宰周公齊侯宋襄子衛文侯鄭文伯許僖男曹共伯于葵丘宰冢宰周公名孔王之三公周采地天子三公不字宋子襄公也在喪稱子葵丘宋地陳留外黃縣今開封雍丘縣葵此衣裳之會第十一九合第九會也左氏傳會于丘尋盟且修好禮也王使宰孔賜齊侯胙故葵丘之會為甚盛秋七月乙酉伯姬卒內女也公羊傳未適人何以卒許嫁矣婦人許嫁字而笄之死則以成人之喪治之不以殤禮降也九月戊辰諸侯盟于葵丘陸氏微旨曰盟稱諸侯前目後凡之義且明周公之不與盟禮也天子無疑諸侯之理孟子曰五霸桓公為盛葵丘之會諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有德三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好言齊桓以正率人一明天子之禁諸侯咸諭乎桓之志春秋所未有故再書葵丘以美之甲戌晉侯佹諸卒晉獻公也公甲戌左氏作甲子佹穀作詭冬晉里克殺其君之子奚齊不書被弒是國人皆不欲立而里克殺之也克固不能無罪以經之書法視之不可以弒君之罪加之也故穀梁氏曰其君之子云者國人不子也國人不子何也不正其殺世子申生而立之也竊詳聖人之微旨正所以明獻公之罪而為後世為人君者之鑒也十年辛未春王正月公如齊公始朝齊也狄滅溫溫子奔衛杜氏注狄蓋中國之狄溫子周司寇蘇公之後國於溫故曰溫子左氏傳狄滅溫蘇子無信也蘇子叛王即狄又不能狄狄伐之王不救故滅蘇子奔衛溫畿內諸侯狄得而滅之方伯不能救是縱狄肆行於中夏矣溫子出奔不名與談弦同晉里克弒其君卓及其大夫荀息卓公羊作卓子生里克初告世子申曰子懼不孝無懼弗得立可謂正論及驪姬將弒世子難里克謀於優施飲里克酒為烏鳥集枯之歌以感動里克克聼其謀欲中立以自免稱疾不朝驪姬遂得成其奪嫡之計及獻公卒克殺奚齊又殺卓子其志欲納重耳納重耳此固克之有識以重耳之冝為君也然當申生未死之前不能守正以諫乃苟容以自圖及庶孽既立克又不以先君之遺帝而遽殺之春秋正名書弒克不得辭矣故為人臣不知春秋之義必陷于篡弒之罪也荀息傅二庶子雖云從昏然能不失信於先君故春秋重其死節而不失其官此可見聖人與奪輕重之權衡矣夏齊侯許男伐北戎北戎杜氏注山戎也北左傳隱九年北戎侵鄭桓六年戎伐齊莊三十年齊人伐山戎北戎屢肆侵暴固當伐然方今狄楚恣橫伐國滅國相繼齊桓為盟主置而不圖乃逺伐北戎何耶昔伐戎稱人今乃稱爵晉殺其大夫里克左傳齊隰朋帥師會秦師納惠公夏周公忌父王子黨會齊隰朋帥師立晉侯晉侯殺里克以説自解説不篡將殺里克使謂之曰微子則不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劒而死里克殺奚齊弒卓子與一大夫荀息春秋不以討賊之辭殺之又稱國以殺謂君不以罪殺之罪纍上也其事與專殺大夫同蓋克之所為弒志在立重耳也夷吾立懼其殺二君也又將及我遂殺之春秋以其殺之不以罪稱國而不去其官書之所以罪惠公也克固不能無罪使其心非公而行篡逆則殺之也春秋不若是書也當如衛人殺州吁齊人殺無知之類稱人以殺之謂一國之人為可殺去族以殺之矣秋七月冬大雨雪雨于付反雨雹公羊傳作十有一年壬申春晉殺其大夫丕鄭父左氏傳丕鄭之如秦也言于秦伯曰呂甥郤稱兾芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣冬秦伯使泠至報問且召三子郤芮曰幣重而言甘誘我也遂殺丕鄭祁舉及七輿大夫榖梁傳稱國以殺罪纍上也蘇氏曰丕鄭里克之黨也惠公既殺里克丕鄭言于秦伯曰請出晉君而納重耳鄭則有罪矣然鄭之謀由殺里克致之也故稱國以殺言君亦過也夏公及夫人薑氏會齊侯于陽榖陽榖齊地公會齊侯而以夫人與於其間非禮也書之所以參譏之也夫人聲薑也秋八月大雩禮龍見而雩常祀不書書者以旱也榖梁傳得雨曰雩不得雨曰旱冬楚人伐黃齊桓伯業初盛江人黃人嘗慕義而來僖二年與盟于貫三年會陽穀及齊伐楚則為犄角之勢又從齊伐陳所恃齊大國十年盟好之久今一旦黃為楚伐被兵城守三時齊桓坐視而不救見桓之伯業自此衰矣十有二年癸酉春王三月庚午日有食之夏楚人滅黃榖梁傳貫之盟管仲曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟管仲死楚伐江滅黃桓公不能救故君子閔之胡氏曰國滅死于其位得正而斃於禮為合書滅者見楚人之強罪諸夏之弱責方伯連率之不修其職使小國賢君困于強暴不得其所公羊子所謂亡國之善詞上下之同力者也秋七月冬十有二月陳侯杵臼卒十有三年甲戌春狄侵衛夏四月葬陳宣公公會齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹杜氏注鹹衛地東郡濮陽縣東南有鹹城也此兵車第二會也戍左氏傳淮夷病杞故且謀王室秋為戎難故諸侯周齊仲孫湫致之十一年傳楊拒泉臯伊雒之戎同伐京師王子帶召之也十二年傳王以戎難故計王子帶王子帶奔齊秋九月大雩冬公子友如齊凡三見三年涖盟十有四年乙亥春諸侯城緣陵緣陵杞邑遷左氏傳諸侯城緣陵而杞焉避淮夷遷之都于緑陵公羊傳曷為不言桓公城之不與諸侯專封也胡氏曰齊桓城三國而書詞不同城楚丘則沒諸侯而不書城緣陵則書諸侯而不序城郉則再序三國之師何也郉以自遷為文故再列三師而城郉者美其得救患分災之義無封國之嫌也淮夷病杞諸侯會于鹹城緣陵而遷杞焉其事專矣故前目後凡直書諸侯而不序也衛為狄滅東徙渡河野處漕邑桓公城楚丘而不書諸侯正王法也夏六月季姬及鄫子遇于防使鄫子來朝杜氏注鄫國今琅邪鄫縣鄫似綾切繫季姬魯女也書字未適人也若子叔姬是也已嫁必國明有所從如紀伯姬是也此上未見書季姬歸于鄫而今遽書季姬及鄫子遇于防季姬鄫子曾不待父母之命媒妁之言隂為期會一旦遇于防此即野有蔓草邂逅相遇之意既已遇矣季姬遂使鄫子來朝使來請已為妻也朝不言使言使非正也以病鄫子也此意出於季姬故書及書使以著其惡書遇以明鄫子從季姬期而來非素不知也或以僖公鍾愛其女使自擇配故得與鄫子遇于防而使之來請也其失禮甚矣非所以謹男女之别也書之所以罪魯僖歟秋八月辛卯沙鹿崩杜氏注沙鹿晉地山名平陽元城縣有沙鹿土穀梁傳林屬於山為鹿沙山名何氏注鹿山足也羊左氏傳沙鹿崩晉卜偃曰期年將有大咎幾亡國公傳沙鹿河上之邑其言崩襲邑也注襲者默陷入地中言崩者以在河上也河岸有髙下如山有地矣故得言崩襄陵許氏曰恆星不見星隕如雨齊桓之祥也沙鹿崩晉文之祥也齊桓將興而天文墮晉文欲作而地理決王道之革也狄侵鄭狄自入衛伐郉滅溫至是侵鄭肆行而無忌憚莫有攘之者書此所以志桓之志衰矣冬蔡侯肸卒是年晉饒乞糴于秦十有五年丙子春王正月公如齊十年嘗朝齊矣至是五年再相朝禮也楚人伐徐楚在江南都郢發兵伐徐徐在山東相去甚逺又近齊略不畏憚方伯之援師深入徐境其強暴可知矣必窺見桓之怠逆料齊之救必不速故敢爾三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐牡丘齊地與匡近杜氏注匡衛地在陳留長垣縣西南公孫敖慶父之子左氏傳盟于牡丘尋葵丘之盟且救徐也孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之大此兵車第三會也言次者譏諸侯之緩又不自往遣夫行故卒不解也書此以見桓之德衰而志怠也是年齊管仲隰朋皆卒夏五月日有食之不書朔與日官失之也秋七月齊師曹師伐厲左氏傳伐厲以救徐也杜氏注厲楚與國義陽隨縣北有厲鄉八月螽公羊作􅏑九月公至自會齊桓會諸侯魯未嘗書至惟此書至暴師過三時之久危之也季姬歸于鄫前年夏季姬及鄫子遇于防而今方歸于鄫子以見淫奔而後成禮直書之而鄫子季姬之罪自見而魯僖之愧亦不可掩也己卯晦震夷伯之廟左氏傳震夷伯之廟罪之也於是展氏有隱慝焉夷伯魯大夫也夷諡伯字展氏之祖父大夫既卒書字震者雷電擊之程氏遺書曰大抵春秋所書皆天人響應有致之之道如石隕于宋而言隕石如夷伯之廟震而言震夷伯之廟此天應之也但人以淺狹之見以為無應其實皆應之然漢儒推災異皆牽合不足信儒者見此因盡廢之冬宋人伐曹莊十四年北杏之會齊會陳曹伐宋今宋伐曹左氏謂修舊怨也後宋與曹既已屢盟今宋無故而忽伐曹宋可罪也所以人之楚人敗徐于婁林婁林杜氏注下邳僮縣東南有婁亭今泗州臨淮縣救徐之師皆諸侯之大夫不用其情伐厲欲攻其所必救以解徐難俱無所濟楚深入吾境以諸侯之師救徐而楚反敗之何示弱也書之所以愧齊也十有一月壬戌晉侯及秦伯戰于韓獲晉侯九年秦齊會師納晉侯晉侯許賂中大夫既而皆背之賂秦伯河外列城五既而不與晉飢秦輸之粟秦飢晉閉之糴故秦伯伐晉經不書伐專罪晉侯之背施幸災貪愛怒鄰而恕秦伯也秦直故勇晉曲故老晉侯師敗身執而大辱國也君獲不言師敗績君重於師也秦舍晉君于外已而歸諸晉故不言以歸也十有六年丁丑春王正月戊申朔隕石于宋五是月六鷁退飛過宋都左氏傳隕石于宋五隕星也六鷁退飛過宋都風也程子曰隕石于宋自空凝結而隕六鷁退飛倒逆飛也必有氣驅之也常書是月者隕石之月所以别非戊申之日爾鷁飛無不可定以日故言是月宋人以為災告於諸侯故魯史書之聖人因災異以明天人感應之理而著之於經為後世戒星陽之象見于上而動忽隕而為石石隂之類墜于下而靜是陽化為隂動極而靜精氣返為頑礦其齊桓伯業衰微將終之兆也獨見於宋者齊桓終而宋始伯也然宋無其德故天見災異之象于其地以警悟之也而宋不知警鷁水鳥遇風退飛欲進反退倒逆而飛其宋襄欲伯反為楚辱之兆也明年齊桓卒而宋伯至五年有孟之執六年宋為楚所敗不數月被創而卒亦如五石六鷁之數天之示人顯矣三月壬申公子季友卒友名也季字也大夫卒稱名今書字蓋僖公以公子友援立之功生而賜氏俾世其卿非禮也初曰季子來歸季氏自此興矣今曰季友卒季氏自此盛矣季氏盛而魯衰矣書以譏之者豫為之戒也夏四月丙申鄫季姬卒春秋內女適諸侯者書卒秋七月甲子公孫茲卒兹叔牙子也冬十有二月公會齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮左氏傳謀鄫且東略也鄫為淮夷所病故淮杜氏注臨淮郡左右臨淮郡今泗州城鄫役人病有夜登丘而呼曰齊有亂不果城而還此兵車第四會也十有七年戊寅春齊人徐人伐英氏左氏傳以報婁林之役也英楚與國齊為徐興師不伐楚而伐英畏強凌弱也其伯業之衰乎夏滅項秋夫人薑氏會齊侯于卞杜氏注項國汝隂項縣卞魯國卞縣今襲慶府泗水縣經左氏傳師滅項杜氏曰師魯師公在會别遣師滅項不言師諱之淮之會公有諸侯之事未歸而取項齊人以為討而止公內諱執皆言止秋聲薑以公故會齊侯于卞聲薑僖公夫人齊女以夫人而會齊侯雖曰齊之女非正也齊侯會之亦不可公又不當使之往參譏之齊以魯擅滅項而止僖公不冝逺會婦人于魯地此管仲既亡桓公志荒之政也九月公至自會杜氏曰公既見執于齊猶以會至者諱之冬十有二月乙亥齊侯小白卒左氏傳齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯內嬖如夫人者六人長衛姬生武孟公子無虧少衛姬生惠公元鄭姬生孝公昭葛嬴生昭公潘密姬生懿公商人宋華子生公子雍公與管仲屬孝公於宋襄公以為太子雍巫有寵公許之立武孟管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與寺人貂因內寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛巳殯六十七日乃殯東萊呂氏曰桓公雖能用管仲攘夷狄霸諸侯有一匡天下之功然仲本無正心誠意格君之學徒急于一時之功利卒致五子之亂其所以有始無終者家法不正也管仲且有三歸之失豈能正其君哉十有八年己卯春王正月宋公曹伯衛人邾人伐齊左氏傳宋襄公以諸侯伐齊欲納孝公三月齊人殺無虧以説宋案左傳齊侯嘗與管仲以公子昭即孝公托孤於宋公則是生前已定昭為世子矣桓公因嬖寺貂易牙以樹禍本衛姬謀立其子無虧結二嬖及桓卒遂至羣公子爭立齊亂初桓公與管仲豈不欲豫立長子無虧意必庸謬故思其次以公子昭托之於宋宋受其托後公子昭奔宋故宋合諸侯兵伐齊以納昭齊方立無虧三月齊人殺之見無虧不能君也宋公受齊之托立昭不以其私故穀梁謂非伐喪也夏師救齊魯誠欲恤鄰曷不諭齊以定孝公又從而以師是助作亂之羣子抗宋也經不書公救齊而但曰師救齊下又書狄救齊所以愧魯之所為與狄等也言救非所救也五月戊寅宋師及齊師戰于甗齊師敗績甗齊地人左氏傳齊將立孝公不勝四公子之徒遂與宋人戰無虧已死故曰四公子夏五月宋敗齊師于甗立孝公而還狄救齊狄何以利動來救齊者安知非四公子之徒往求之也春秋據其實事書之也秋八月丁亥葬齊桓公桓公卒五公子爭立以故宮中空莫敢棺公尸在牀上六十七日尸蟲出于户十二月乙亥無虧立乃棺赴辛巳夜斂九月而葬亂故八月無丁亥日誤冬郉人狄人伐衛郉昔為狄所伐遷夷儀而幾亡賴齊桓救而城之以復其國今何忘怨會狄同伐衛故春秋亦書人以賤之也狄稱人何亦以纍漸而至于強爾與楚稱人同郉則賤焉狄則人之進之也郉亦何知不過齊桓嘗有城郉之恩欲報之故與狄同伐衛所以救齊也郉小國不知所以自守而擅興兵以伐人之國故終為衛所滅爾十有九年庚辰春王三月宋人執滕子嬰齊滕介宋齊之間自與幽之會已三十七年矣中間衣裳兵車之會未嘗一至宋襄繼起又不能事大國其見執冝矣春秋書名所以罪之也宋非有德義服人肆已之強一會而虐二君非伯討也執雖以罪不歸于京師惡其專也故春秋書人以貶之夏六月宋公公羊作人曹人邾人盟于曹南此宋襄盟之始也二國不親至使其大夫來曹猶不服盟不國地而于曹之南所以及秋而見圍宋襄始盟而曹已異趣無以服人心矣鄫子會盟于邾鄫子不及曹南之盟諸侯既罷而會之于邾故書曰會盟于邾己酉邾人執鄫子用之鄫子雖來後猶愈於不來也邾子何肆其暴虐以説宋乃執而用之次睢之社睢水之次有妖神東夷皆社祠之蓋殺人而用祭左氏傳以宋公使邾子劉氏以為不然曰鄫子為季姬所使而朝魯春秋猶書使鄫子來朝豈宋公使之用鄫子于社而經不書乎愚案邾子於宣十八年戕鄫子于鄫其惡鄫若此之酷宋公于戰尚不肯禽二毛安肯用鄫以祭此蓋邾附勢為之故聖筆直書其罪以貶之也秋宋人圍曹左氏傳討不服也子魚司馬子魚公子目夷也言于宋公曰文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君德無乃猶有所闕而以伐人若之何盍姑內省德乎無闕而後動近宋圗霸業欲服諸侯先自近始方與曹盟未幾即叛宋莫如曹滕宋公一出執滕不足以示威盟曹不足以示信不思子魚省德之論徒欲速合諸侯而無逺略冝其無成功而遽敗也衛人伐郉左氏傳衛人伐郉以報菟圃之役郉不自量其召兵冝也冬會陳人蔡人楚人鄭人盟于齊公羊會上有公字好左傳陳穆公請修於諸侯以無忘齊桓之德冬盟于齊修桓公之好也杜氏注地于齊齊亦與盟楚欲抗衡於中國久矣齊桓能制其強故不得與中國之會盟及桓志少衰滅黃敗徐駸駸猾夏然猶有所懼也桓公殁而宋襄繼伯不能服諸侯故楚假不忘桓德之説求參與中國之盟會而行其志陳蔡及鄭近楚素所服者故先受其謀齊孝公不能繼志魯僖忘周公荆舒是懲之訓遂與之盟明年鹿上之盟及孟之會因執宋公以伐宋故春秋諱魯而人諸侯以謹楚人與盟之始也梁亡梁嬴姓國伯爵虞伯翳之後梁地今屬同州韓城縣左氏傳梁亡不書其主自取之也初梁伯好土功亟城而弗處民罷而不堪則曰某寇將至乃溝公宮溝塹曰秦將襲我民懼而潰秦遂取梁公羊傳此未有伐者其言梁亡何自亡也其自亡奈何魚爛而亡也何氏曰魚爛自內發二十年辛巳春新作南門杜氏注魯城南門也本名稷門僖公更髙大之今猶不與諸門同改名髙門也言新者蓋舊有而更新為之也作者創造而非因仍榖梁謂有加其度也春秋凡有興作苟非所當為則必書聖人重民力故也南門如不可不作則與泮宫閟宫同不書矣蓋興學校以教民復閟宫以事祖考有國者之先務固不必書也今書新作南門正閔子所謂仍舊貫如之何何必改作者故特書以示譏也夏郜子來朝郜姬姓國後漢志濟隂城北有郜城公羊傳郜子者何失地之君也何以不名兄弟辭也郜魯之同姓故不忍言其絶秋隱十年鄭伐宋取郜歸于魯以此知郜為宋有在春前至桓二年宋以郜鼎賂魯蓋宋取郜時所得者及此又九十餘年矣而子忽來朝魯公羊所謂失地之君蓋非昔之郜君郜君之子孫也以同姓故來親書之者亦喜內見歸也五月乙巳西宫災杜氏注西宫公别宫也天火曰災公羊傳西宫者何小寢也小寢曷為謂之西宮有西宮則有東宮矣魯子曰以有西宮亦知諸侯之有三宮也西宮災何以書記災也鄭人入滑左氏傳滑人叛鄭而服於衛夏鄭公子士鄭文公子泄堵寇鄭大夫帥師入滑滑秦之邉邑鄰於鄭鄭從楚以楚可恃故陵其邉邑而入之春秋書人以罪之也秋齊人狄人盟于邢左氏傳齊狄盟于邢為邢謀衛難也於是衛方病邢衛報邢之師未巳齊不能會諸侯相與圗之乃與狄盟豈先志也狄能從齊恤患救災故人而進之齊亦人之與狄同貶之也冬楚人伐隨左氏傳桓六年楚侵隨楚與成焉隨季梁諫隨侯修政楚不敢伐八年楚伐隨敗隨隨及楚平今隨不自量欲復漢東與諸侯叛楚楚方強是召其伐而自屈也二十有一年壬午春狄侵衛杜氏曰為邢故衛楚狄數出民受其害狄侵故但書狄削而不人之也宋人齊人楚人盟于鹿上杜氏注鹿上宋地汝隂有原鹿縣宋主盟故在齊楚上時宋襄欲伯而無伯略而乃與楚盟中外雜處豈所謂伯春秋所以列序而人之以著宋襄志大而識淺自取敗辱也夏大旱杜氏注雩不獲雨故書旱自夏及秋五稼皆不收秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂執宋公以伐宋杜氏注盂宋地楚始與中國行會禮故稱爵乎左氏傳諸侯會宋公于盂子魚曰禍其在此君欲已甚其何以堪之公羊傳執宋公以伐宋孰執之楚子執之曷為不言楚子執之不與夷狄之執中國也宋公與楚子期以乘車之會公子目夷諫曰楚夷國強而無義請君以兵車之會往宋公曰不可吾與之約以乘車之會自我為之自我墮之曰不可楚人果伏兵車執宋公以伐宋宋襄知不能識楚之詐其往會也不納目夷之諫愚而自用輕以其身陷於豺虎以取執辱諸侯見楚執會主而無一人伸義以正曲直之分故春秋以諸侯同執為文以譏之也冬公伐邾杜氏注為邾滅須句音劬故須句在東平須昌縣楚人使冝申來獻捷楚以詐執宋公伐宋宋服故來獻捷盂之會魯雖不與楚假此夸大以威魯也上書執宋公此書楚獻捷以明楚之執矣魯拒其使而不受請於天王討之可也僖公畏其強安能為是舉也春秋不書曰宋捷為宋諱不與夷之詐也十有二月癸丑公會諸侯盟于薄釋宋公薄史記作亳漢山陽薄縣湯所都也古字通用伯宋與楚初無怨隙楚因會以詐執之伐宋其志蓋欲也楚之計以宋大國猶為我執之諸侯不待盟而自服矣諸侯若能使宋人征繕而修文告之辭明宋之直正楚之罪則楚義愧情屈而歸宋公矣今魯僖不知伸中國之正理反與五國為會求盟于楚以請宋公而後得釋正墮楚人之計中春秋不書會楚子而曰會諸侯不與楚專釋也亦不與楚主是盟也然其執其釋權皆出於夷已傎甚矣聖人全中國之體故諱之蓋以為中國之大恥而罪魯與諸侯反為楚所制視中國為無人矣二十有二年癸未春公伐邾取須句音劬顓左氏傳任宿須句臾風姓也實司大皥與有濟之祀大皥伏羲也四國伏羲之後故主其祀任今任城縣也顓臾在太山南武陽縣東北須句在東平須昌縣西北四國封近濟故世祀之以服事諸夏邾人滅須句須句子來奔因成風也須句成風家成風為之言於公曰崇明祀保小寡周禮也蠻夷猾夏周禍也邾雖曹姓迫近戎狄雜用其禮若封須句是崇皥濟而修祀紓禍也春伐邾取須句反其君焉不公伐邾復須句之國春秋何不善之仍書取焉何也請王命擅取人國而返其君以亂易亂何異於他日之伐取也夏宋公衛侯許男滕子伐鄭左氏傳三月鄭伯如楚夏宋公伐鄭子魚曰所謂禍在此矣以宋襄近為楚執辱得釋而歸當悔過自艾修德布政自強國歸甫三月遽興伐鄭之師鄭已服楚楚必救之是自召其伐也秋八月丁未及邾人戰于升陘陘音郉杜氏注升陘魯地左氏傳邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也君無謂邾小蜂蠆有毒而況國乎弗聼八月公及邾師戰于升陘我師敗績邾人獲公胄縣諸魚門邾城門記檀弓云邾婁復之以矢蓋自戰升陘始也謂邾雖勝死傷亦甚無衣可以招魂以矢招之也經書及公戰也不言公不書敗為內諱也魯不務德好戰以陵小國不敢諫以致敗幾殞其身邾亦不自量而與大國角力所喪多矣豈保國之道乎冬十有一月己巳朔宋公及楚人戰于泓宋師敗績左氏傳楚人伐宋以救鄭宋公將戰大司馬固諫曰天之棄商久矣君將興之不可赦也已言不如穀楚勿與戰弗聽戰于泓宋人既成列楚人未既濟未盡渡泓水司馬曰彼衆我寡及其未既濟請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉門官守門者師行在君左右國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘宋商紂後不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耇獲則取之何有於二毛明耻教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉意林曰宋襄公不厄人於險不鼓不成列此天下之所謂仁義而春秋惡之以其好戰而不務本飾小名而妨大德此無異盜跖以分均為仁後出為義也君子不然正其義不謀其利修其道不急其功子夏為莒父宰問政於孔子孔子曰無欲速無見小利所謂欲速者遺本也所謂小利者計末也師氏曰宋襄非王者之德而慕王者之兵無霸者之術而貪霸者之業志大謀淺妄意要功以自取敗觀其敗齊師執滕子圍曹伐鄭連年暴師毒民以逞其欲其於仁義蓋亦逺矣及戰于泓方以不禽二毛不以阻隘為辭則區區之意不足以濟事適足以自敗矣宋楚以強暴干王略故泓之戰雖曲王不能伐而使在辭無所與宋公稱及極貶之也二十有三年甲申春齊侯伐宋圍緡緡宋邑漢志山陽郡東緡縣今濟州金鄉縣十九年諸侯盟于齊以無忘桓公之德宋志於霸獨不會召齊人共盟鹿上故今討之十八年齊亂孝公奔宋宋襄公受托孤之命率諸侯納孝公甫五年宋為楚敗孝公遽忘納己之德視之不救而又乘機加之以兵故伐圍並書以誅其惡也夏五月庚寅宋公兹父卒左氏傳傷於泓故也襄魯僖忘盟薄之信不會宋葬有志於附楚也臣宋襄公卒成公羊立秋楚人伐陳左氏傳楚成得臣帥師伐陳討其二於宋也成得臣子玉遂取焦夷城頓而還焦今譙縣也夷一名城父今譙鄂城父縣二地皆陳邑頓國今汝隂南頓縣冬十有一月杞子卒左氏傳杞成公卒書曰子杞夷也杜氏注杞入春秋稱侯莊二十七年絀稱伯至此年卒乃貶稱子二十有四年乙酉春王正月夏狄伐鄭二十年鄭人入滑滑人聽命後即衛鄭又伐之王使伯服遊孫伯如鄭請滑鄭怨王與衛滑也不聼執王使王怒將以狄伐鄭富辰諌弗聼使頽叔桃子出狄師夏狄伐鄭取櫟襄陵許氏曰鄭執王使無王也王不能伐而使狄伐之天下何恃不亂近世如唐晉資外兵之力以定其國蓋不講於春秋戒襄王之所以出也秋七月冬天王出居于鄭王德狄將立其女隗氏為后富辰諫曰狄固貪婪王又啓之女德無極婦怨無終狄必為患王弗聼同母弟王子帶又通於隗氏王廢隗氏頽叔桃子恐狄怨遂奉叔帶以狄師攻王王適鄭處于汜音泛帶以隗氏居溫明年晉侯以王命次于陽樊右師圍溫左師逆王王入于王城取大叔帶于溫殺之于隰城晉侯朝王榖梁傳天子無出出失天下也王者無外言出則有外之辭居居其所雖失天下莫敢有也雖實出奔而王者無外王之所居則成王畿鄭不敢有之以為國常山劉氏曰春秋之時王者政令僅行於境內才出畿內即非王有故曰出聖人撥亂反正則曰普天之下莫非王土故曰居出自周無出特書曰者言其自取之也晉侯夷吾卒晉惠公以二十三年九月卒其子圉懷公嗣立今年正月秦伯納文公重耳二月入于曲沃使殺懷公于髙梁不書皆不告也杜氏以為文公定位而後告惠公喪春秋據諸侯䇿書赴告而作經也二十有五年丙戌春王正月丙午衛侯燬滅邢左氏傳衛人將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕二十五年衛人伐邢二禮從國子巡城掖以赴外殺之正月丙午衛侯燬滅邢穀梁傳燬之名何也不正其伐本而滅同姓也常山劉氏曰春秋滅國多矣惟衛燬滅邢而生名之者滅同姓也禮諸侯不生名失地滅同姓名以絶先祖之裔蔑骨肉之恩故生以匹夫稱之示王法不容誅也邢周公之胤也衛同所自出以小忿釁而絶滅之又使其臣為詐詭傾覆之計故名之同於楚子虔之誘殺也夏四月癸酉衛侯燬卒宋蕩伯姬來逆婦伯姬魯女為宋大夫蕩氏婦也自為其子來逆婦姑自來逆婦非禮也何以書公自主之也諸侯嫁女於大夫主大夫以與之公自主之亦非禮也伯姬之嫁不書蓋內女雖親體不敵則不書於䇿所以尊君也今君失其禮以愛易典主大夫之昏是自卑朝廷而慢宗廟非安上治民之節也宋殺其大夫稱國以殺不以其罪也與莊公二十六年曹殺其大夫義同秋楚人圍陳納頓子于頓頓子迫於陳而出奔故楚圍陳以納之是中國諸侯不能恤小國也葬衛文公冬十有二月癸亥公會衛子莒慶盟于洮衛稱子在喪洮魯地莒小國無大夫以公與會故進之時有衛子則無敵公之嫌慶不氏未命也左氏傳衛人平莒于我十二月盟于洮修衛文公之好且及莒平也莒以元年酈之役衛文公將平之未及而卒成公追成父志降名以行事故曰修文公之好二十有六年丁亥春王正月己未公會莒子衛寧速盟于向杜氏注向莒地以左氏傳公會莒兹丕公兹丕時君之號莒夷無諡號為稱寧莊子衛大夫也盟于向尋洮之盟也重洮之盟甫及一月餘以非莒子親至故盟焉所以致齊之討也齊人侵我西鄙公追齊師至酅弗及酅音畦齊地濟北榖城縣西有地名酅下追左氏傳討是二盟也蘇氏曰侵曰人曰師不可言公追齊人故也夏齊人伐我北鄙齊孝公春方侵魯西鄙夏又侵魯北鄙故貶而人之衛人伐齊魯與衛盟于洮復盟于向齊以二盟伐魯故衛為魯伐齊公子遂如楚乞師左氏傳東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也言其不臣事周室可以此置責而伐之公羊傳乞者何卑辭也齊再伐魯懼不能支故公子遂如楚乞師書者惡魯不能內修戎備而外乞師于逺以極罪為國者之無謀也使其能用展禽其政必有可觀者矣秋楚人滅夔以夔子歸杜氏注夔楚同姓今建平秭歸縣左氏傳夔子不祀祝融與鬻熊祝融高辛氏之火正楚之遠禮也鬻熊祝融之十二世孫楚人讓之對曰我先君熊摯有疾鬼神弗赦而自竄于夔熊摯楚嫡子有疾不得嗣位故别封為夔子吾是以失楚又何祀焉秋楚成得臣鬭冝申帥師滅夔以夔子歸熊楚祖鬻熊夔祖熊摯諸侯之祀不過其祖則祝融鬻是夔之不得祀者也楚反以是滅之夔國滅虜服當名春秋以非其罪也故存其爵而不名冬楚人伐宋圍緡左氏傳宋以其善於晉侯也重耳之出宋襄公贈馬二十乘叛楚即晉冬楚令尹子玉司馬子西帥師伐宋圍緡公羊氏謂刺道用師也時以師與魯又中道用之以伐宋故伐圍兼書以責楚也公以楚師伐齊取榖左氏傳公以楚師伐齊取榖凡師能左右之曰以左右謂進退在已置桓公子雍於榖易牙奉之以為魯援雍本與孝公爭立故使居穀以逼齊楚申公叔侯戍之為二十八年楚子使中叔去穀張本齊同盟也楚踈逖也魯假踈逖之兵力以伐同盟而又取其邑春秋以實事書之而罪自見也公羊謂患之起必自此始魯不能修戎備徒乞踈逖之兵以犯強齊會齊侯昭卒晉文行伯幸而免爾公至自伐齊二十有七年戊子春杞子來朝左氏傳杞桓公來朝用夷禮故曰子公卑杞杞不共也余氏曰杞子來朝即位始來也書子以其棄周禮故也卒也則書子卒之來也則書子至之春秋之謹嚴若此夏六月庚寅齊侯昭卒左氏傳有齊怨不廢喪紀禮也秋八月乙未葬齊孝公二月餘葬速乙巳公子遂帥師入杞左氏傳入杞責無禮也師今春杞子方來朝至秋遽帥入之杞之朝其儀禮縱有不共何故輒加之罪興兵以入其國亦虐甚矣故春秋書入以著魯之惡冬楚人陳侯蔡侯鄭伯許男圍宋左氏傳楚子及諸侯圍宋宋公孫固如晉告急先軫曰報施救患取威定霸於是乎在矣狐偃曰楚始得曹而新婚於衛若伐曹衛楚必救之則齊宋免矣於是乎搜于被廬被廬晉地作三軍謀元帥趙衰曰郤穀可亟聞其言矣説禮樂而敦詩書乃使郤穀將中軍程氏傳楚稱人貶之為其合諸侯以圍宋也榖梁傳楚人者楚子也其曰人何也人楚子所以人諸侯也其人諸侯何也不正其信夷狄而伐中國也微旨曰四國仲夷狄之威屈中國之義其惡大矣若書楚子則四國之惡不著故書曰楚人則從夷狄之罪昭然可見也十有二月甲戌公會諸侯盟于宋杜氏注諸侯伐宋公與楚有好而往會之非後期宋方見圍無嫌於與盟故直以宋地胡氏傳春秋於宋之圍人楚子以貶諸侯而公會之公之罪亦著矣二十有八年己丑春晉侯侵曹晉侯伐衛杜氏曰再舉晉侯者曹衛兩來告急左氏傳二十七年冬楚子及諸侯圍宋宋公孫固告先軫曰報施救患取威定伯於是乎在矣狐偃曰楚始得曹而新婚於衛若伐曹衛楚必救之則齊宋免矣先軫晉下軍之佐原軫也前年楚使申叔戍殺以逼齊二十八年春晉侯將伐曹假道于衛衛人弗許還自南河濟侵曹伐衛取五鹿衛地晉侯齊侯盟于斂盂衛侯請盟晉人弗許初晉侯之出亡也曹衛皆不禮焉宋襄贈馬二十乘晉侯歸而立其志欲霸至是宋為楚圍適乘此機遂伐曹衛以解宋難恩怨並行晉文之志得矣然其規模狹隘非霸者之大舉時陳蔡鄭許魯皆從楚伐宋豈不可先伐乎聖筆雖以侵伐而亦書爵蓋善其救患也公子買戍衛不卒戍刺之左氏傳公子買戍衛公懼於晉殺子叢以説焉謂楚人不卒戍也杜氏注公子買魯大夫子叢也內殺大夫皆書刺用周禮三刺之法周禮司刺掌三刺之法一曰訊羣臣二口訊羣吏三曰訊萬民注刺殺也於魯附楚畏晉故殺大夫以説強國戍衛本楚命詭言楚不卒戍而殺之又以解於楚內殺大夫謂之刺不欲斥言殺以避惡名之辭也聖筆特書其實事以見殺無罪也其貶之也至矣楚人救衛左氏傳晉侯齊侯盟于斂盂衛侯請盟晉人弗許楚人救衛不克晉於衛有宿怨方怒衛不假道又以其與楚新婚亦恐其非誠服于晉故請盟不許楚人救之欲其分兵力以解宋難也三月丙午晉侯入曹執曹伯畀宋人左氏傳晉侯入曹數之以不用僖負羈而乘軒者三百人也且曰獻狀令無入僖負羈之宫而免其族報施也執曹伯分曹衛之田以畀宋人杜氏曰畀與也執諸侯當以歸京師晉欲怒楚使戰故以與宋所謂譎而不正蘇氏曰晉侯以不禮故私討于曹既執曹伯又以與宋人皆非義也書晉侯為入曹也既言晉侯入曹不可復言晉人執曹伯非以伯討許之也呂氏曰此一年記晉事最詳皆聖人所致意者觀晉文公舉動如此其有意於為善乎侵伐皆稱人貶之也晉侵曹伐衛乃伐楚與國以緩宋難也再稱晉侯不沒其爵善其救宋也其有意於攘夷狄尊中國以繼齊桓之業乎至入曹仍以爵稱宋則貶而人之不可匹敵於晉也夏四月己巳晉侯齊侯宋師秦師及楚人戰于城濮楚師敗績晉文嘗受宋楚之施是時宋為楚圍晉於是不攻楚而攻楚之與國知楚之必救以解宋之圍晉方圗霸坐視楚暴則霸權歸楚矣然必待楚之先動而應之則天下不謂我背惠食言其謀可謂譎矣楚子倦兵欲退師其剛躁而欲戰者子玉也先軫謀隂擕其黨拘其使以激怒之晉兵至于退舍其譎尤甚既以報德又以驕敵蓋先以逆料子玉之必不退也春秋以楚雖請戰而書及乃在晉侯由先軫激之是以書晉此誅必原情之義也昔齊桓伐楚致屈完召陵楚未大創故滅弦誘鄭終桓公之霸不能制楚患晉文公以楚不大創則不知畏故欲戰而勝楚以定霸業蓋自齊桓沒楚與宋爭霸會于盂戰于泓執其君圍其城數以窘宋宋無霸略楚故侮之連年楚橫行侵暴逾甚良由中夏之無人故得以自恣及晉文奮起其規模素定善審去就侵曹伐衛兵威已震及城濮之役一戰遂霸自是楚人束手斂衽不犯中國者十五年晉文繼桓之業不旋踵而興可謂盛矣齊桓死于僖之十七年不踰年而楚與中國之盟晉文死於僖之三十二年直至文公九年楚方敢伐鄭其畏晉若此故晉之子孫終春秋之世相繼而霸也楚書人狄之也楚殺其大夫得臣楚子使得臣子玉也去宋曰無從晉師得臣請戰既敗王使謂之曰大夫若入其若申息之老何申息二邑子弟皆從子玉而死言何以見其父老至連榖而死王無赦故自殺得臣自伐陳楚子立為令尹授以兵柄無非縱之以猾夏之事今楚子既知晉之不可敵不能使子玉勿敵而乃少與之師是棄其將而又棄其師也及其一敗而遂殺之故稱國以殺而不去其官罪纍上也衛侯出奔楚左氏傳衛侯欲與楚國人不欲故出其君以説于晉衛侯出居于襄牛聞楚師敗懼出奔楚遂適陳使元咺奉叔武以受盟文春秋於諸侯出奔則名之衛侯不名責晉文也必晉迫脅之也衛侯聞晉師勝故懼而奔楚文公逐衛侯而立叔武使其兄弟相疑君臣交訟故曰衛之禍文公為之也皆原於文公鑿智自私而心不廣也五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土左氏傳晉師還至衡雍鄭地今滎陽卷縣作王宮于踐土五月丁未獻楚俘于王駟介百乘徒兵千鄭伯傅王用平禮也己酉王享醴命晉侯宥王命尹氏及王子虎內史叔興父䇿命晉侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千諸侯賜弓矢然後専征伐秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受䇿以出出入三覲杜氏注衛侯出奔其弟叔武攝位受盟從未成君之禮故稱子而序鄭伯之下三傳皆謂晉侯師還致天王屈尊下勞故經沒而不書非也天王避狄之難出居于鄭亦既五年諸侯未嘗救天王未嘗歸也晉文因破楚之威還過鄭地先會諸侯以朝天王然後導王北出諸侯前驅大駕徐渡不煩一矢而溫地之狄望風遁逃矣於是諸侯解甲而講朝會之禮天王耀兵而行搜狩之事向之諸侯復從王而南王入京師諸侯又南圍許晉侯經略中外自今年之春自北而南夏自南而北冬復自北而南明年春復自南而北始歸于晉一年之中四過成周三傳但以為召君以就其地誤矣陳侯如會杜氏注陳侯本與楚楚敗懼而屬晉來不及盟故曰如會公羊傳如會後會也陳侯蓋迷而復者言如會非晉強之也公朝于王所杜氏注王在踐土非京師故曰王所即王所在爾時晉率諸侯朝王于踐土公亦朝故書于史六月衛侯鄭自楚復歸于衛衛侯畏晉奔楚今自楚歸于衛衛侯出而不名復歸而名之其出也憫其為晉所迫其歸也罪其藉楚之力而又擅殺叔武也衛元咺出奔晉案傳初晉逐衛侯立叔武叔武辭立而它人立恐衛侯之不得反也於是立衛侯得反而疑其弟則曰叔武篡我元咺爭之曰叔武無罪衛侯終殺叔武其罪大矣元咺出奔晉訴其君也衛侯歸之易以得叔武之賢在內守之故也陳侯款卒陳穆公卒秋杞伯姬來去年魯公子遂帥師入杞今年杞伯姬來伯姬莊公女也二十五年歸杞今其來寧成風也志入杞之怨釋也晉文伯權之立諸侯弛兵而遂修族姻鄰國之好也公子遂如齊二十七年公以楚師伐齊取穀今年盟于踐土故公遣大夫聘之解仇惡而修舊好皆晉霸之所致也冬公會晉文侯齊昭侯宋成公蔡莊侯鄭文伯陳共子莒兹平父子邾文子秦穆人于溫左氏傳會于溫討不服也討衛許杜氏注陳共公稱子先君未葬宋襄公稱子而從本班今陳稱子降在鄭下陳懷公稱子乃在鄭上主會者次之也溫今河內溫縣天王狩于河陽壬申公朝于王所穀梁傳水北為陽山南為陽溫河陽也縣河陽古孟津地今懷州河陽説見前盟于踐土下晉人執衛侯歸之于京師晉侯惡衛侯元咺衛臣也故得以訟之于晉公羊傳衛侯之罪何殺叔武也此晉侯也其稱人何貶曷為貶衛之禍文公為之也文公逐衛侯而立叔武使人兄弟相疑放乎殺母弟者文公為之也襄陵許氏曰司馬法邦國賊殺其親則正之衛侯殺叔武則執有罪也何為不得為霸討天子在是而擅執諸侯軋矣是以推而逺之也晉元咺自晉復歸于衛元咺訟衛侯于晉晉執之歸于京師囚之元咺即歸衛立公子瑕其歸何易也以文公主之也元咺自以晉侯必殺衛侯故歸而先立瑕安知魯為之請納玉十瑴乃得釋元咺卒罹其禍以及公子瑕諸侯遂圍許會溫諸侯也許比再會不至故因會共伐之曹伯襄復歸于曹遂會諸侯圍許晉侯筮疾曹伯之豎侯獳貨筮史以得免其歸不正矣名之者以其用賂而苟免也以許近楚恐晉之威不足以庇已而德下足以懷楚是果于不服二十有九年庚寅春介葛盧來左氏傳介葛盧來朝舍于昌衍之上魯城東南有昌平城公在會饋之芻米禮也杜氏注介東夷之國也在城陽黔􅑍縣今密州膠西縣地葛盧介君名不稱朝不見公且不能行朝禮雖不見公國賔禮之故書公至自圍許圍許逾年而還不能服之也夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉左氏傳公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉尋踐土之盟且謀伐鄭也晉侯始伯翼戴天子諸侯朝睦王室無虞而王子虎下盟列國以瀆大典諸侯大夫上敵王人公侯討禮傷教故諸大夫諱公與盟杜氏注翟泉今洛陽城內大倉西南池水也胡氏曰翟泉近在洛陽王城之內而王子虎於此下與列國盟是謂上替諸侯大夫於此上盟王子虎是謂下陵而無君之心著矣諱公不書諸國之卿貶稱人而王子亦與焉正其本也秋大雨雹雨去聲者左氏傳大雨雹為災也榖梁傳何氏曰雹隂脅陽臣侵君之象陽氣之在水雨則溫熱隂氣薄而脅之不相入轉而成雹胡氏曰雹戾氣也當時僖公即位日久季氏世卿公子遂專權政在大夫萌於此矣冬介葛盧來左氏傳以未見公故復來朝禮之三十年辛卯春王正月夏狄侵齊齊孝公不能紹霸業故狄數侮之是時晉文稱霸坐視其慿陵列國而不問何耶書之者罪齊而譏晉也秋衛殺其大夫元咺及公子瑕左氏傳秋乃釋衛侯衛侯使賂周歂冶厪曰苟能納我吾使爾為卿周冶殺元咺及子適子儀子儀瑕母弟穀梁傳稱國以殺罪纍上也故元咺不去其官衛侯在外得釋志在殺元咺與瑕而後入瑕本辭位不欲立不為國人所惡故以公子冠之而稱及見瑕無罪以元咺故延及而衛侯忌克專殺之罪著矣然瑕立於元咺非受命于天王傳國于先君故不曰君案傳三十一年瑕齊楚三十二年楚令尹子上侵陳蔡陳蔡成遂伐鄭將納公子瑕瑕覆于周氏之汪軍傾覆池水土外僕髠屯禽之以獻時鄭惡瑕乃殺瑕以獻文夫人鄭文公夫亡斂之鄶城之下衛侯鄭歸于衛衛侯始歸殺叔武再歸殺大夫元咺及公子瑕忮害而專殺甚矣故名之以著其罪始歸稱復以繼之也再歸不稱復絶之也而國非其國矣晉人秦人圍鄭左氏傳晉侯秦伯圍鄭以其無禮於晉且二於楚也翟泉之盟鄭不至晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之夜縋而出見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益于君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪鄰鄰之厚君之薄也若舍鄭以為東道主行李之往來共其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕二邑朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之闕秦以利晉唯君圖之秦伯説與鄭人盟使杞子逢孫楊孫戍之乃還子犯請擊之公曰不可微夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之王氏集傳箋曰晉侯為盟主用兵以報私怨秦伯踰晉越周千里而助人圍鄭皆勞民危國之道也故皆稱人以示貶介人侵蕭再來魯而次年遂侵蕭求援而後舉兵也與荆人之聘同冬天王使宰周公來聘左氏傳王使周公閲來聘髙郵孫氏曰禮雖有天子聘諸侯之義然義不當使三公書曰宰周公來聘用見周道之衰而諸侯強盛也公子遂如京師遂如晉左氏傳東門襄仲公子遂也將聘于周遂初聘于晉魯大夫如京始此自入春秋魯始聘晉凡遂者繼事辭爾皆以實書其褒貶即觀上下之文乃辨之爾古之為禮賜君子小人不同日况聘天子而乃可與諸侯同使哉實書其事而貶自見三十有一年壬辰春取濟西田髙郵孫氏曰此蓋晉侯執曹伯而反諸侯之侵地魯濟西之田嘗見侵于曹魯於是取之趙子曰凡力得之曰取不當取也惡其專奪雖復取本邑亦無異辭言雖復魯之舊地亦與非其有而取之者同蓋無王命以正疆理者取之不以其道也況晉假公義以釋私憾乎公子遂如晉左氏傳襄仲如晉拜曹田也公晉為盟主屢會盟又歸曹所侵田故使子遂往行聘禮也夏四月四卜郊不從乃免牲劉氏曰郊用正月上辛則為卜我以十二月下辛卜正月上辛如不吉則以正月下辛卜二月上辛如不吉則以二月下辛卜三月上辛如不吉則不郊公羊曰三卜禮也四卜非禮也求吉之道三蓋魯郊三卜不從故又以三月下辛卜四月上辛又不從始不郊非至四月始四卜郊也榖梁曰免牲者為之緇衣纁裳有司玄端奉送于南郊免牛亦然卜郊不吉免之明本為天不敢留天牲免謂縱之也劉氏曰郊嵗事也六月上甲始庀牲十月上甲始繫牲帝牲必在滌三月如不從則免矣中禮曰牲不中禮曰牛夏后氏玄牲商人白牲周人騂牲天地之牛角繭栗宗廟之牛角握賓客之牛角尺穀梁曰牛卜日曰牲得吉日則牛改名牲成王以周公有大勳勞以天子之禮樂賜魯伯禽使祀后稷以配天故記曰魯之郊禘非禮也周公其衰矣成王不當賜伯禽不當受也故魯用僭禮之郊終十二公莫有能行之者或纍卜而不從或先之以牛變示之天之警懼也至矣聖人即實事書之以志其僭因以示戒也猶三望望望祭也天子之事也天子不可逺屈凡天下山川百神無由遍及因望而祭之諸侯祭境內山川必躬必親何得行望而祭之之禮哉猶者言卜郊不從猶用三望之僭禮特書猶以譏之也三望公羊曰泰山河海鄭康成以河不在魯以為海岱及淮杜氏以為分野之星國中山川魯分奎婁之神三説之中意公羊必有所傳也秋七月冬杞伯姬來求婦榖梁傳婦人既嫁不踰境杞伯姬來求婦非正也二十五年蕩伯姬來逆婦三十一年杞伯姬來求婦皆小事也春秋何屢書之惡婦人預外事因書以示戒有國有家者不可不嚴間有家之義也狄圍衛十有二月衛遷于帝丘衛遭狄患久矣昔為狄所滅齊桓救而封之齊桓沒狄與邢假義伐衛狄又嘗侵衛自晉文興不復侵伐今復圍衛衛畏狄而遷都蓋晉文惡衛狄覘晉之必不救故敢肆行而無忌晉文既為盟主以恤同惡尊中國為事銜小怨而失大體何以為霸乎帝丘杜氏注東郡濮陽縣故帝顓頊之故墟故曰帝丘衛地也今開德府三十有二年癸巳春王正月夏四月己丑鄭伯捷卒捷公羊作接立鄭文公卒穆公衛人侵狄秋衛人及狄盟左氏傳狄有亂衛人侵狄秋請平焉秋衛人及狄盟杜氏注不地者就狄廬帳盟胡氏曰再書衛人而稱及者所以罪衛也盟者中國諸侯之禮衰世之事已非春秋之所貴况不耻城下乃即其地而刑牲歃血以要之哉辱與外盟而即其地實于是始唐德宗所以召平涼之春秋貶之以示戒也冬十有二月己卯晉侯重耳卒左氏傳晉文公卒三十有三年甲午春王二月秦人入滑秦穆公因杞子來告欲謀鄭使三大夫孟明西乞白乙出師千里襲之事不成而中道滅滑已滅而書入者不能有其地也滑滑國河南緱氏縣或曰晉邉邑或曰鄭邉邑齊侯使國歸父來聘左氏傳齊國莊子來聘自郊勞至于贈賄禮成而加之以敏臧文仲言于公曰國子為政齊猶有禮君其朝焉夏四月辛巳晉人及薑戎敗秦于殽秦出師襲鄭不克晉與薑戎要擊之殽間敗秦師晉襄欲繼文公霸業而與薑戎禦秦親未葬而墨縗經即戎忘親背惠其惡甚矣春秋不書晉子而書晉人罪之也秦為無道不哀其喪而越人之境志貪其利而襲人之國違大臣而信小臣以喪其師故止書秦狄之也癸巳葬晉文公左氏傳晉子墨縗絰敗秦師于殽遂墨以葬文公晉於是始墨狄侵齊左氏傳狄侵齊因晉喪也公伐邾取訾婁秋公子遂帥師伐邾左氏傳以報升陘之役在二十二年邾人不設備襄仲復伐邾杜氏注魯因晉喪以陵小國晉人敗狄于箕左氏傳狄伐晉及箕八月戊子晉侯敗狄于箕郤缺獲白狄子襄陵許氏曰自三十年狄始侵齊晉未暇討自是列國歲有狄患至敗於此而後懲艾不復犯略是故強暴之來不能震疊以威武則未易以德懷也杜氏注太原陽邑縣南有箕城冬十月公如齊左氏傳公如齊朝且弔有狄師也十有二月公至自齊自國歸父來聘臧文仲以其有禮而請公朝以比事屬辭觀之間晉而虐邾所以因齊聘而朝之以自託也乙巳公薨于小寢杜氏注小寢夫人寢也譏公就所安不終于路寢君子貴於得正而斃薨于小寢非正也隕霜不殺草李梅實隕霜而百草不死冬溫也惟冬溫故李梅實春秋書之記異與不時也天道四時失序則人道必應之繼襄陵許氏曰僖公寬仁過厚其失也豫而文公暗弱之其咎遂著三桓之盛自僖公始卒以專魯晉人陳人鄭人伐許左氏傳晉陳鄭伐許討其二於楚也讀春秋編卷五
