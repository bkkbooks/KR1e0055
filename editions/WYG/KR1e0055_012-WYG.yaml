body:
  text: 讀春秋編卷十二宋陳深撰哀公名蔣定公之子定姒所生諡法恭仁短折曰哀元年丁未春王正月公即位楚子陳侯隨侯許侯圍蔡左氏傳楚子圍蔡報栢舉也定四年蔡人男女以辨男女各别係累而出降使疆于江汝之閒而還楚使徙國江之北汝之南蔡於是請遷于吳楚既還蔡更叛楚就呉餘隨漢東之國自楚武見伐之後不復見者一百四十年未嘗列諸侯之㑹盖世服於楚也呉師入郢楚子奔隨而隨獨免之卒復楚國故徳之而使列於諸侯今得見於經定六年許為鄭所滅未久復見楚封之也經不書不與中國制在强楚也國楚師遷蔡經止書圍蔡盖蔡嘗以呉師入楚㡬亡其楚復讎之事可恕也故書楚子圍蔡而稱爵恕楚之辭也鼷䑕食郊牛改卜牛夏四月辛巳郊春秋書郊終於此魯郊非其禮而又非其時故牲被災害比比有之經削而不書則無以見其失禮盡書之則有不勝書故聖筆因其變而志其失以示戒也秋齊侯衛侯伐晉左氏傳齊侯衛侯次于乾侯救范氏也師及魯師齊師衛孔圉鮮虞人伐晉魯不書非公命取棘蒲晉地之許氏曰霸主奉王以正天下而諸侯至於合從以伐春秋特書以著中國之無霸也王道既盡覇統復亡春秋之變至是而窮矣冬仲孫何忌帥師伐邾定十四年邾子來㑹十五年邾子來朝其年定公薨邾子來奔䘮邾之事魯甚謹定公䘮甫朞而仲孫何忌伐邾書之以見内惡也二年戊申春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷火虢反又音郭東田及沂西田左氏傳春伐邾將伐絞邾邑邾人愛其土故賂以漷沂之田而受盟取襄十九年魯嘗取邾田自漷水今三卿帥師伐邾又漷東沂西之田三家伐國非君意取田以入已私也經列書之以彰其惡魯兩納邾叛人邑三取其田㡬何而不盡也三家恃强凌弱不道甚矣以中國伯衰故無所忌憚也癸巳叔孫州仇仲孫何忌及邾子盟于句繹句音鉤邾地春秋書盟止此自是内外盟皆不書不足書也季劉氏曰曷為三人伐而二人盟季孫臨之叔仲成之孫之汰也盖自謂猶君矣紓三家政由已出既取邾田又强要之盟邾何敢弗從其滅亡幸矣經列書之以著其惡夏四月丙子衛侯元卒靈公卒世子蒯聵出奔在外聵之子輙立滕子來朝滕來朝凡四今止此晉趙鞅帥師納衞世子蒯聵于戚經書衞世子本其當立也書納于戚不于衛輙拒父之惡不言自著矣聵雖出奔靈公未嘗有命廢之後欲立郢郢辭遂止及公卒而聵之子輙立則立輙非君命也使輙知其命之非正逆其父而還以位則子道順而國定矣奈何輙貪國而不知有父堅拒其入聵居戚十三年因孔悝之臣乃得入而輙始奔魯是滅其天性絶其天倫不可立於天壤閒矣尚何足以君國乎經書鞅納衛世子鞅不降書人得無貶焉則知所納善也與晉人納㨗菑于邾者異矣秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績鐵衛地在戚城南宏左氏傳齊人輸范氏粟鄭子姚即罕達子般駟送之士吉射逆之趙鞅禦之遇于戚甲戌將戰郵無恤御簡子即鞅衛太子為右登鐵上鄭人擊簡子中肩斃踣也於車中獲蠭旗太子救之以戈鄭師獲溫大夫趙羅太子復伐之鄭師大敗獲齊粟千車皆言帥師其衆敵也戰而言及之者主之者也猶曰晉趙鞅為志乎為此戰也云爾兩不足書侵伐無客主也罕達送輸而趙鞅禦之也冬十月葬衛靈公七月而葬緩十有一月蔡遷于州來蔡殺其大夫公子駟左氏傳呉洩庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以說殺駟以說于呉言不時遷駟之所為哭而遷墓將遷與先君辭呉楚圍蔡蔡降使疆于江汝楚師還又背楚請遷于呉許之又悔呉以師臨蔡蔡侯懼告大夫殺公子駟以說於是徙于州來書大夫而稱國以殺君與用事大夫擅殺之也蔡悔請遷及呉師入委罪於人自此誰為盡忠以謀其國宜乎上下危疑旋致禍敗也三年己酉春齊國夏衛石曼姑帥師圍戚左氏傳齊衛圍戚求援于中山鮮虞也以衛石曼姑為衛輙圍戚而書齊國夏先之者子不可加父臣不可以加君也特書以誅其惡許氏曰觀乎蒯聵之亂則齊景之不霸可知矣晉以君臣稱兵而齊為臣伐君衛以父子争國而齊助子圍父以是令於諸侯君子是以知齊之將亂也夏四月甲午地震地震凡五詳見文九年五月辛夘桓宫僖宫災左氏傳夏五月辛夘司鐸火宫名火踰公宫桓僖災孔子在陳聞火曰其桓僖乎家天子七廟諸侯五廟親盡則毁桓僖不毁非禮也三以出於桓而立於僖以是為恱者桓至此十世僖至此七世矣僭而存之瀆禮之甚天變豈虚加哉季孫斯叔孫州仇帥師城啓公羊作開陽杜氏注魯黨范氏故懼晉比年四城啓陽今琅邪開陽縣年襄陵許氏曰所城近敵故帥師焉元年鼠食郊牛三地震宗廟災變異之弗圖而取田城邑兵役相繼可謂不畏天命矣中失而外鍵本亡而末務此魯之季世也宋樂髠帥師伐曹以十年宋大心奔曹而助之故也秋七月丙子季孫斯卒左氏傳季孫有疾命正常桓子之竉臣曰無死南孺子之子季桓子之妻男也則以告而立之女則肥季康子也可季孫卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉魯大夫視之則或殺之矣乃討之討殺者召正常正常不反畏康子也康子聞桓子有遺男不須遽請退當令鞠育之俟其長而還以位則善矣正常言未㡬而奔公使共劉視之則已殺之矣康子偽勇於退而使人戕之也貪位而忍心如此不義甚矣蔡人放其大夫公孫獵于吳杜氏注公子駟之黨人放公孫獵書大夫而稱言國亂無政衆人擅放之也冬十月癸夘秦伯卒惠公卒悼公立叔孫州仇仲孫何忌帥師圍邾去年伐邾取田與邾子盟今年又圍邾皆叔仲貪利忘信也經詳書以志其惡四年庚戌春王二月庚戌盜殺蔡侯申蔡公孫辰出奔呉左氏傳蔡侯將如呉諸大夫恐其又遷也承承音懲楚音也公孫翩逐而射之入于家人而卒以兩矢門之衆莫敢進文之鍇後至曰如牆而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫旴即公孫霍夫蔡侯誑呉乃委罪執政以說人心危疑又將如呉大懼其復遷公孫翩逐而射之卒蔡人殺翩公孫辰奔蔡殺公孫姓公孫霍疑皆翩之黨也翩之黨猶名則翩非微者也非微者而稱盜盖一旦竊發爾國君行有軍從居有衛兵而為盜所殺其君之不道可知矣胡氏所謂變文書盜以警有國者之君也書盜殺蔡侯申繼書公孫辰出奔見辰亦與聞乎弑畏人疑之而自逸耶經去其官亦微見矣葬秦惠公宋人執小邾子許氏曰天下無霸故宋得以執小邾子伐鄭入曹而無所忌夏蔡殺其大夫公孫姓公孫霍蔡侯既為盜殺未久主殺二大夫者誰與當時用事之臣也故前軰疑蔡下闕一人字蔡人殺二大夫之以其翩之黨春秋稱國以殺而不去其官以專殺大夫罪書之盖以其黨罪未明而失刑耳晉人執戎蠻子赤歸于楚楚圍蠻氏蠻氏潰蠻子赤奔晉隂地河南山北楚使謂隂地之命大夫曰晉楚有盟好惡同之若將不廢則寡人之願也不然將通少習商嶺武闗以聽命趙鞅曰晉國未寧安能惡楚必速與之乃詐執戎蠻子以畀楚師北經書晉人貶之也戎蠻失地窘窮奔于晉之河南山楚人求之晉人詐執之不仁也執而歸之楚不義也以中國之霸主而歸夷狄之俘不競至此可哀也已僖二十八年晉侯執曹伯畀宋人今曷云歸于楚胡氏謂猶京師楚也畏楚之强也吕氏曰春秋之世諸侯視强弱相侵伐以相取下動失其正人理絶滅不道之甚也城西郛魯城西郭以備晉也六月亳社災亳即殷也亳社殷社也殷都于亳武王克商而班其社於諸侯以為亡國之戒社者封也亡國之社以為廟屏戒也記曰䘮國之社屋之不受天陽也又曰亳社北牖使隂明也天火曰災亳社災屋之故有此災此制計必始于湯也亡國之社災變之大也書之以記災也秋八月甲寅滕子卒頃公卒隱公虞母立冬十有二月葬蔡昭公葬滕頃公五年辛亥春城毗毗魯邑城之以備晉也十魯不能親仁善隣連年懼晉城邑定四年城莒父及霄十五年又城漆哀三年城啓陽去年城西郛今年城毗明年又城邾瑕勞民以興土功經屢書之以示貶也夏齊侯伐宋晉趙鞅帥師伐衛左氏傳趙鞅伐衛范氏之故也遂圍中牟秋九月齊侯杵臼卒左氏傳齊燕姬生子燕姬景公夫人生嫡子不成而死未冠不成人諸子鬻姒景公妾之子荼嬖荼即安孺子諸大夫恐其為大子也言於公曰君之齒長矣未有太子若之何公曰二三子閒於憂虞則有疾疢亦姑謀樂何憂於無君景公欲立荼未發姑以此塞大夫之請公疾使國惠子國夏高昭子高張立荼寘羣公子于萊秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔冬叔還如齊閏月葬齊景公閏月䘮事不數葬齊景公非禮也春秋二百四十二年唯文七年不告月此年葬齊景公爾皆譏其變常也春秋不書閏月此其書閏何也䘮事不數閏譏其閏月葬也六年壬子春城邾瑕杜氏注任城亢苦浪又音剛父縣北有邾婁城今濟州任城縣地也劉氏曰或邾之瑕也或曰内邑也民魯自背晉數年閒凡八城邑懼晉來伐以嚴守備勞極矣未聞修徳布政以自力經屢書之以示貶也晉趙鞅帥師伐鮮虞左氏傳晉伐鮮虞治范氏之亂也四年鮮虞納荀寅于柏人呉伐陳左氏傳呉伐陳修舊怨也焉呉之入楚也使召陳懷公懷公朝國人而問逄滑陳大夫曰臣聞國之興也視民如傷呉日敝於兵暴骨如莾而未見徳焉禍之適呉其何日之有陳侯從之及夫差克越哀二年侵陳今又復修舊怨楚子曰吾先君與陳有盟不可以不救乃救陳夏齊國夏及高張來奔左氏傳齊陳乞偽事高國者言諸大夫將棄子之命子早圖之又謂諸大夫曰二子禍子矣盍及其未作也先諸大夫從之六月戊辰陳乞鮑牧及諸大夫以甲入于公宫昭子聞之與惠子乗如公戰于莊敗國人追之國夏奔莒遂及高張晏圉弦施來奔陳乞將立陽生乃與諸大夫謀先逐高國高國去陳乞弑君之謀得肆矣高國並為世臣一時阿君廢長立少既受命又不能全陳乞諂事而不察其詐謀反覆卒也墮其術中故書名以罪之叔還音旋㑹吳于柤柤楚地㑹叔還以呉在柤故徃之始結呉好秋七月庚寅楚子軫卒楚子在城父將救陳卜戰不吉卜退不吉將戰王有疾卒于城父子章立齊陽生入于齊齊陳乞弑其君荼書齊陽生入于齊繼書陳乞弑其君荼見陽生與聞乎故也陽生已奔魯何為而遽入于齊陳乞召之來也乞召之來匿於其家將以之為君也以之為君必去荼也荼之弑乃陽生令朱毛遷於駘而殺諸野幕之下經何以書陳乞弑其君荼陳乞以計出高國意在立陽生高國去乃召陽生入則首禍者陳乞也豈非乞弑荼乎加陽生以弑君之罪則陳乞弑立之迹不明書陽生之入而陳乞弑君則陳乞之惡著而陽生與有罪焉然陽生不書公子者以其廢父命簒荼以自立是自絶于先君豈復得為先君之子也不稱公子誅不子也稱齊陽生者程子謂見景公廢長立少以啓亂也冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年癸丑春宋皇瑗帥師侵鄭左氏傳宋師侵鄭鄭叛邱晉也定八年鄭始叛老之役定十五年鄭以宋公子地來奔欲取地以處之故伐宋搆怨自此始至是宋侵鄭此後各取其師以逞其暴是時伯衰故恣其所為也晉魏曼多帥師侵衛左氏傳晉師侵衛衛不服也五年晉伐衛至今未服夏公㑹呉于鄫才陵切鄫今琅邪鄫縣子左氏傳夏公㑹呉于鄫呉來徵百牢服景伯對曰先王未之有也呉人曰宋百牢我魯不可以後宋且魯牢晉大夫過十呉王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有滛者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而日必百牢亦惟執事呉人弗聽景伯曰呉將亡矣棄天而背本不與必棄疾於我乃與之禮呉恃强大欲霸中國魯㑹吳于鄫徵百牢景伯以周折之弗聽魯以吳棄禮知其不能霸也秋公伐邾八月己酉入邾以邾子益來季康子欲伐邾饗大夫謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保於城城保於徳失二徳者危將焉保康子不樂而出康子為景伯道破伐小國不仁乃推公伐無故而入人之國處其宫晝夜掠此何異大盜魯以禮義之國而忍為之是皆季孫恃强凌弱貪利專恣而無忌憚也明年呉為邾來伐齊人來取二邑自貽其辱然後乃歸邾子益于邾始懼呉齊矣經書而不諱以示戒於後也邾子益何以名以其虜服也不言滅者邾既滅茅夷鴻保於茅請救于呉故明年呉伐魯魯復邾子故不言滅宋人圍曹冬鄭駟𢎞帥師救曹左氏傳宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋八年甲寅春王正月宋公入曹以曹伯陽歸此滅曹也其不言滅何也曹伯陽好田弋曹之鄙人公孫彊獲白鴈獻之且言田弋之說說之因訪政事大說之彊言霸說於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救書曰宋公入曹而不書滅言自滅也猶虞之滅言晉人執虞公而不言滅也子宋去冬築五邑於曹郊圍之春宋公伐曹將還褚師肥殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城彊以歸殺之趙氏曰經不書殺故宜略之呉伐我吳為邾故來伐不言四鄙直言伐我兵加于國都也呉師首克武城克東陽進舍於五梧明日舍于蠶室明日舍于庚宗遂次于泗上呉人行成盟而還魯恥城下之盟因諱而不書也夏齊侯取讙及闡讙濟北蛇邱縣西有下讙亭今襲慶府龔邱縣闡魯闡鄉漢為剛縣故城在龔邱縣季左氏傳齊悼之來也季康子以妹妻之即位而逆之魴侯康子叔父通焉女言其情弗敢與也齊侯怒夏五月齊鮑牧帥師取讙及闡民程子曰内失邑不書君辱當諱也不能保其土地人是不君也已與之彼以非義而受則書取此與濟西田是也魯入邾以其君來致齊怒呉伐故賂齊以說之許氏曰外取邑不書以即歸我故書之也歸邾子益于邾齊侯以康子不與季姬又邾子齊甥魯執之以歸齊使呉請師將以伐我故懼而歸邾子秋及齊平且逆季姬以歸秋七月冬十有二月癸亥杞伯過卒僖公卒閔公維立齊人歸讙及闡左氏傳季姬嬖故也九年乙夘春王二月葬杞僖公杜氏注三月而葬速宋皇瑗帥師取鄭師于雍邱杜氏注雍邱縣屬陳留今開封鄭武子賸即罕達嬖許瑕許其外取邑故許瑕圍宋雍邱宋皇瑗圍鄭師壘合鄭師哭子姚救之大敗二月甲戌宋取鄭師于雍邱受趙氏曰悉俘之曰取取者得之稱任氏曰取者腹背敵無所逃命面惟我之所得也春秋未嘗書取某師惟宋鄭二事而已或以取字即敗字之誤䘮鄭罕達輕許嬖人以利而動擅弄兵以圍人之邑徒師敗律以殘民命罕達之罪也夏楚人伐陳左氏傳陳即呉故也秋宋公伐鄭杜氏注報雍邱冬十月十年丙辰春王二月邾子益來奔左氏傳邾隱公來奔齊甥故遂奔齊公㑹呉伐齊左氏傳九年春齊侯使公孟綽辭師于呉呉子曰昔嵗寡人聞命今又革之不知所從將進受命于君十年公㑹呉子邾子郯子伐齊南鄙師于鄎齊地齊人弑悼公赴于師呉子三日哭于軍門之外徐承帥舟師將自海入齊齊人敗之呉師乃還常山劉氏曰公㑹夷狄伐中國諸侯具文可見其罪三月戊戌齊侯陽生卒公㑹呉伐齊齊人弑悼公以說而以疾赴于師春秋不著齊人弑君之罪而以卒書胡氏謂不忍以附吴之賊加中國之君也其存天理之意微矣魯入邾以其君來齊侯取讙及闡如呉請師討之魯懼而歸邾子齊歸讙及闡使使辭師于呉呉子怒反約魯伐齊魯畏呉不敢不從遂伐齊南鄙師于鄎齊用事諸臣竟不思禦之之道遽弑悼公以說于吳使齊戰而敗績危在旦夕亦不可行弑逆以抒難意悼公猜忍而無人君之度其用事大臣必有疑忌或悼公欲殺用事者以說而謀泄反為用事者弑之以解兵禍齊之臣子其罪固不可勝誅矣而經止以卒書者不忍中國之君為呉夷來宼而罹此凶也如是書法斷自聖心此游夏不能贊一辭也夏宋人伐鄭宋去年春取鄭師秋又伐鄭今年夏又伐鄭春秋惡其修怨不已悉書以示貶晉趙鞅帥師侵齊左氏傳趙鞅帥師伐齊取犂及轅犂一名隰皆齊地毁高唐之郭侵及頼而還竊齊方有䘮晉人伐之非禮乗閒以利耳經書實事以見其罪五月公至自伐齊葬齊悼公悼公弑簡公壬立衛公孟彄自齊歸于衛彄蒯聵之黨輙方拒父何敢歸也必齊納之也薛伯夷卒惠公卒秋葬薛惠公冬楚公子結帥師伐陳呉救陳左氏傳冬楚公子期伐陳陳即呉故呉延州來季子救陳謂子期曰二君不務徳而力争諸侯民何罪焉我請退以為子名務徳而安民乃還呉季札壽夢少子也壽夢以襄十二年卒至今七十七嵗壽夢卒季已能讓國年當十五六至今盖九十餘矣劉氏曰推驗季子年僅百嵗彼其清高不汚寧貪將亂國之兵者邪似異時事傳附著為説耳春秋凡書救未有不善之也呉救陳何獨以號舉而不進之也以呉純用貪亂之道也楚伐陳列國坐視而不敢救楚伐而呉救之故變而書號而傷中國之衰故書救亦止於此也十有一年丁巳春齊國書帥師伐我齊國書伐我為前年公㑹吳伐齊師于鄎故冉求為季氏宰勉季孫主乎戰以禦齊師及齊師戰于郊冉求之師能用矛入於齊軍獲甲首八十齊人不能師遁師胡氏曰春秋之記斯師特曰伐我者欲省致之由而躬自厚也垂訓之義大矣夏陳袁左氏榖梁作轅頗破可及又平聲出奔鄭左氏傳初轅頗為司徒賦封田封内之田悉賦稅之以嫁公女有餘以為已大器鑄鐘鼎之屬國人逐之故出許氏曰春秋書袁頗之奔所以為人臣附上以刻下托公以營私者之戒也五月公㑹呉伐齊甲戌齊國書帥師及呉戰于艾陵齊師敗績獲齊國書案傳為郊戰故公㑹吳子伐齊五月克博壬申至于嬴甲戌戰于艾陵展如呉大夫敗高子國子敗胥門巢呉大夫王卒助之大敗齊師獲國書公孫夏閭邱明陳書東郭書革車八百乗甲首三千以獻于公下公再㑹吳伐齊戰于艾陵不言公者公與上伐不與戰也公何為不與戰齊主與呉戰不為魯也獲齊國書戰而言及之者主之者也猶曰國書為志乎此戰也云爾秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋左氏傳衛太叔疾即世叔齊出奔宋初疾娶于宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣寘于犂而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或滛于外州外州人奪之軒以獻恥是二者故出疾在宋處巢死焉十有二年戊午春用田賦左氏傳十一年季孫欲以田賦邱賦之法因其田財通出馬一疋牛三頭今欲别其田及家財各為一賦故言田賦使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中歛從其薄如是則以邱亦足矣邱十六井出戎馬一疋牛三頭此賦歛之常法若不度於禮而貪胃無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聽十二年春用田賦許氏曰先王之法九夫為井四井為邑井邑未有賦也四邑為邱邱十六井乃有牛馬之賦今以邱為不足也於是更用田賦藉井而取之不待及邱此非禮也古者盖田有稅邱有賦稅以足食賦以足兵何氏注田謂一井之田賦者歛取其財物也言用田賦者若今漢家歛民錢以田為率矣不言井者城郭里巷亦有井嫌悉賦之禮稅民田不過什一軍賦十井不過一乗哀公外慕强呉空盡國儲故復用田賦過什一書曰用田賦用者不宜用者也宣公初稅畝而既益其稅矣成公作邱甲而又増其賦矣於此又欲變而别以田為賦則歛愈重而民愈困矣夏五月甲辰孟子卒昭公夫人呉女也其曰孟子諱取同姓也呉與魯同姓在禮娶妻不取同姓買妾不知其姓則卜之所以厚别也昭公之取孟子徒欲一時結好强呉以去三家悖禮甚矣春秋隱之來不書至卒不書薨葬不夫人不諡不小君皆諱同姓也何則書至必曰夫人某氏至自某孟子則不可言姬氏至自吳也書薨必曰夫人某氏薨孟子則不可曰夫人姬氏薨也書葬必曰葬我小君某氏孟子則不可曰小君姬氏也言婦人之字必配之姓孟子不可諡曰昭姬此所以但書曰孟子耳然雖為君隱其實亦不可揜矣公㑹呉子于槖章夜反一音託臯槖臯在淮南逡遒縣東南今廬州慎縣左氏傳公㑹吳于槖臯呉子使大宰嚭請尋盟尋鄫盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟尋而温之也若可尋也亦可寒也乃不尋盟公往年㑹鄫今又㑹槖臯經據事而書譏復與夷㑹也秋公㑹衛侯宋皇瑗于鄖鄖在海陵今泰州城下侯左氏傳吳徵㑹于衛秋衛㑹吳于鄖公及衛侯宋皇瑗盟而卒辭吳盟呉以衛先時殺呉行人欲執之以子貢言乃舍衛侯趙氏曰案上文公自㑹吳于槖臯不言宋衛同㑹若實同㑹即當書之又若四國同㑹如何三國盟而獨辭呉乎呉力猶能囚衛侯三國敢拒之乎故知此傳謬甚矣經文衛不與呉㑹即子木子貢之言並無所施矣宋向巢帥師伐鄭左氏傳宋鄭之閒有隙地焉曰彌作頃邱玉暢嵒戈錫凡六邑子産與宋人為成曰勿有是約二國俱棄之定十五年宋公子地奔鄭鄭人為之伐宋欲取地以處之及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫九月宋向巢伐鄭取錫殺元公之孫遂圍嵒十二月鄭罕達救嵒圍宋師冬十有二月螽冬温而螽生書以紀異也十有三年己未春鄭罕達帥師取宋師于嵒宋向巢帥師伐鄭圍嵒鄭罕達救嵒帥師圍之腹背受敵無所逃焉惟我所得而已故曰取宋師報雍邱之役也二國取師以相償報其惡如此夏許男成卒公㑹晉侯及呉子于黄池陳留封邱縣有黄亭近濟水地譜東京開封縣有黄池左氏傳夏公㑹單平公周卿士不書尊之也不與㑹晉定公呉夫差于黄池黄池之㑹吳晉争長左氏以為先晉非也國語以為先吳外傳又謂呉以甲三萬脅晉而先之是也盖是時晉霸已衰不主諸侯者二十四年宋之㑹襄二十七年楚已先晉矣陵遲至此夫差擅强氣吞區宇中國愈不能抗故此㑹宜乎呉主之也書公㑹晉侯及呉子者言及者呉主㑹而晉侯及之也諸夏衰而同于呉也然不曰㑹呉子者呉終不可主乎中國也此上屢書呉但舉號此進之子何耶晉諷呉僭王宜曰呉公呉從之以其知過故進之以爵亦所以見中國之衰書晉在上而及呉子所以抑呉人之横也抑狂僭存中夏聖人之意微矣公羊謂及吳子何㑹兩伯之辭也不與吳人之主中國則曷為以㑹兩伯之辭言之重呉也曷為重呉呉在是則天下諸侯莫敢不至也想斯時大小諸侯畢至惟宋不至故呉㑹後伐之然止書魯晉㑹者聖筆削之也削之者不與呉人之主中夏也自此世愈降而愈下其亂極矣宜乎明年聖筆絶於獲麟也其時呉方强恣先㑹諸侯不知越已乗虚而入吳矣呉子歸及越平終子胥三年呉始弱矣之語楚公子申帥師伐陳陳即呉故楚屢伐之今以越入呉呉亂不救故又伐之於越入呉左氏傳六月丙子越子伐呉為二隧道也疇無餘謳陽越二大夫自南方先及郊呉太子友王子地王孫彌庸夀於姚自泓上觀之彌庸見姑蔑之旗姑蔑越地曰吾父之旗也彌庸父為越所獲故姑蔑人得其旌旗不可以見讎而弗殺也太子曰戰而不克將亡國請待之彌庸不可屬徒五千王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守丙戌復戰大敗吳師獲太子友王孫彌庸夀於姚丁亥入呉呉人告敗于王王惡其聞也惡諸侯聞之自剄七人於幕下以絶呉子方㑹諸侯于中州越乗其無備而入胡氏曰呉自柏舉以來憑陵中國黄池之㑹遂主夏盟可謂强矣而春秋繼書於越入呉所謂因事屬辭垂戒後世見深切著明之義也秋公至自㑹晉魏曼多帥師侵衛許氏曰晉以范中行難伐衛伐鮮虞閒齊之難而一侵之又再侵衛而諸侯卒莫之宗者惟其國無政也師雖數出能侵而已益玩而頓矣此王霸道盡之時也葬許元公九月螽冬十有一月有星孛于東方孛彗星也光芒四出曰孛不言所次見于旦也旦則衆星皆沒而孛乃見故不言所在之次除舊布新之妖其兆於東方乎盜殺陳夏區音謳夫十有二月螽吕氏曰此年九月螽十二月又螽又比年十二月螽隂陽錯亂之甚當世君臣亦可以自省許氏曰自用田賦而比年三書螽貪殘無已之應也春秋書魯人事至用田賦書魯天災至於二年三螽則見其民力已窮天命已去君子之心於魯已矣故春秋以大歛之顛終也十有四年庚申春西狩獲麟杜氏注大野在魯西故言西狩左氏傳西狩于大野大野在高平鉅野縣東北大澤是也叔孫氏之車子鉏商獲麟車子微者鉏商名以為不祥以賜虞人時所未嘗見故怪之虞人掌山澤之官仲尼觀之曰麟也然後取之言魯史所以得書獲麟詩釋文麟麕身牛尾馬足一角角端有肉毛蟲之長不踐生草不履生蟲音中律吕行中䂓矩王者至仁則出杜氏曰子曰鳯鳥不至河不出圖吾已矣夫盖傷時王之政也麟鳯五靈王者之嘉瑞也今麟出非其時虚其應而失其歸此聖人所以為感也絶筆於獲麟之一句者所感而起固所以終也麟仁獸也出非其時不幸以狩獲而罹害夫子烏得不感歎而傷之乎故春秋于是終焉嗚呼春秋之季亂至極矣禮義泯絶綱紀紊亂中國益微强暴益横淪而至戰國矣孛見而麟獲文中子所謂仲尼申天道以戒周歟除舊布新之妖其兆於東乎王者之嘉瑞其獲於西乎於是乎絶筆讀春秋編卷十二
