body:
  text: 讀春秋編卷九宋陳深撰襄公名午成公子母定姒諡法因事有功曰襄辟土有徳曰襄元年己丑春王正月公即位公生扵成公十六年至是始四嵗即位仲孫蔑會晉欒黶宋華元衛甯殖曹人莒人邾人滕人薛人圍宋彭城彭城宋邑也楚取之令魚石守晉㑹八國之師圍之不但曰彭城而曰宋彭城經特書之言彭城本宋之地非楚得而有之魚石等叛宋而歸于楚故亦不言其姓名止繫之宋以成宋志詳此書宋一字實出宣聖簡嚴之筆深以罪楚之奨亂助惡抑强楚而黜叛臣也彭城苟不書宋無以見魚石之不臣楚子之猾夏與夫諸侯討亂之功矣夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人杞人次于鄫才陵切秋楚公子壬夫帥師侵宋公羊厥作屈鄫作合字鄫鄭地晉伐鄭故諸侯之師次于鄫以備楚楚侵宋所以救鄭經不言楚救鄭盖鄭無可救之善楚不得有拯救之名也九月辛酉天王崩簡王崩子靈王立杜氏注辛酉九月十五日邾子来朝冬衛侯使公孫剽来聘晉侯使荀罃来聘簡王崩諸侯當奔赴為急未聞一國及王庭者何耶邾子方且来朝衛晉大夫来聘左氏謬以為禮杜氏以未聞䘮失之綱常道䘮視君猶路人世變至此可哀也已聖筆直書其事而諸侯之罪自見也二年庚寅春王正月葬簡王五月而葬速鄭師伐宋左氏傳楚令也惡鄭為楚伐宋不待貶而著矣夏五月庚寅夫人姜氏薨成公夫人齊姜也六月庚辰鄭伯睔昆去聲又魂上聲卒左氏傳鄭成公疾子駟請息肩于晉公曰楚君以鄭故親集矢于其目非異人任任當也言楚非為他人而當此患寡人也為我也若背之是棄力與言是棄楚救鄭之力與盟言其誰䁥我免寡人免我棄力與言之過唯二三子鄭伯至死而不背楚以楚徳之不敢忘使晉以道恤而懐之鄭豈終叛乎晉師宋師衛甯殖侵鄭左氏傳晉師侵鄭扵是子罕當國子駟為政子國為司馬諸大夫欲從晉子駟曰官命未改成公未𦵏嗣君未免䘮故言未改不欲違先君意上書鄭伯卒繼書晉宋衛侵鄭則三國伐䘮之罪自見鄭之所以懐楚而不貳者亦以其衛之之力故也而晉不因其䘮而恤之少緩其師乃樂乗其禍亟與二國伐之又安能懐来之也秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚左氏傳會于戚謀鄭故也孟獻子曰請城虎牢以偪鄭虎牢舊鄭邑今屬晉故請築城以逼迫之知武子曰善鄫之會吾子聞崔子之言齊崔杼有不服晉之言今不来矣成之㑹齊不至滕薛小邾之不至皆齊故也三國齊屬國寡君之憂不唯鄭罃将復扵寡君而請扵齊請齊會城虎牢以觀齊志得請而告吾子之功也服鄭之功歸獻子若不得請事将在齊先伐齊未服鄭吾子之請諸侯之福也豈唯寡君賴之傳言荀罃能用善謀也公在幼稚而仲孫用事故諸侯亦以大夫會大夫而専國國可知矣己未葬我小君齊姜齊諡也諡法執心克莊曰齊三月而葬速叔孫豹如宋左氏傳穆叔聘于宋通嗣君也豹僑如之弟襄公通好于宋也冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢虎牢故東虢邑鄭滅虢為制邑秦漢為成臯今孟州汜水縣有故虎牢城會左氏傳復㑹于戚齊崔武子及滕薛小邾之大夫皆知武子之言故也武子言事将在齊齊人懼帥小國而事之遂城虎牢鄭人乃成鄭果求成如孟獻子之謀陸氏微㫖曰諸侯之大夫取他國之邑相與城之非正也城虎牢可以安中國息征伐故聖人許之不繫扵鄭也張氏曰鄭黨楚為中國患晉動諸侯討之而不服故孟獻子謀城其巖邑以制之以伯主討不服從之國地非鄭之所可私有故彭城非宋有也伯主為宋討則繫之宋虎牢鄭地也以中國當討鄭而不繫鄭皆春秋眀王制以示予奪之正也楚殺其大夫公子申左氏傳楚公子申為右司馬與嬰齊壬夫同執楚政申多受小國之賂以偪嬰齊壬夫嬰齊壬夫畏其偪而殺之稱國以殺者君與臣同國之道也三年辛卯春楚公子嬰齊帥師伐吳申公巫臣以夏姬故而奔楚子重怒之而殺其族巫臣曰吾必使之奔命而死巫臣扵是通吳扵晉敎吳乗車與戰陣之法吳叛楚伐巢伐徐子重一嵗七奔命蠻方屬楚者吳盡取之而吳始大至此嬰齊伐吳雖克鳩兹吴丹陽蕪湖縣東至衡山烏程縣南鄧廖被獲組甲三百僅存八十被練三千止餘二百又為吳取駕邑所䘮多矣楚人咎子重子重病之遇心疾而卒故啟吳為中國患者楚子重也公如晉左氏傳公如晉始朝也夏四月壬戌公及晉侯盟于長樗近晉之地公至自晉左氏傳夏盟于長樗孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表密邇仇讐寡君将君是望敢不稽首父禮諸侯不親盟扵他國成二年公如晉晉人使陽處盟公三年雖改盟而猶盟于其國非禮也晉悼公修禮扵諸侯故雖襄公纔六嵗而春朝于晉至夏晉侯出其國都與公盟于長樗禮也公至自晉盟于長樗而不以長樗至者志本如晉以如晉為重也六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤雞澤杜氏注在廣平曲梁縣西南任公輔曰按地譜一名雞邱今洺州永平縣告左氏傳晉為鄭服故且欲修吳好将合諸侯使士匄于齊曰寡君使匄以嵗之不易多難也不虞之不戒寡君願與一二兄弟相見以謀不協請君臨之使匄乞盟齊侯欲勿許而難為不協乃盟于耏音而水名外六月公會單頃公及諸侯己未同盟于雞澤晉侯使荀㑹逆吳子于淮上吳子不至晉悼公欲尊王室而㑹單子與諸侯比齊桓公首止葵邱之㑹不同矣故書㑹單子者諸侯而己未同盟于雞澤儕王官與諸侯下同㰱血故不再言雞澤以示譏其亦例于新城柯陵之書也王臣盟以同書始于雞澤陳侯使袁僑如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟左氏傳楚子辛為令尹侵欲於小國陳成公使袁僑如會求成如㑹赴㑹也扵㑹受命也晉侯使和組父告于諸侯告陳服秋叔孫豹及諸侯之大夫及袁僑盟陳請服也雞澤之會盟諸侯也陳侯使袁僑如會焉大夫不可敵衆諸侯則不盟袁僑義也臣不可以敵君故也陳侯自宣十年辰陵之盟久即楚今背而歸晉内附中國不召而自来不受不可也諸侯之大夫盟袁僑權也晉侯使之盟而不曰使為嫌扵専制諸侯也上曰及主之也下曰及客之也諸侯皆在是又稱叔孫豹及諸侯之大夫受命扵其君之辭也此會晉侯本欲盟吳以攻楚使其類相攻伐禦戎上䇿吳不至是以但㑹單子及諸侯而已殊及袁僑亦言主盟袁僑也秋公至自會冬晉荀罃帥師伐許左氏傳許靈公事楚不會于雞澤冬晉知武子帥師伐許四年壬辰春王三月己酉陳侯午卒左氏傳三月陳成公卒楚人将伐陳聞䘮乃止陳人不聼命猶不聽楚命夏叔孫豹如晉左氏傳穆叔如晉報知武子之聘也秋七月戊子夫人姒氏薨杜氏注成公妾襄公母如杞姓姒氏妾母也何以稱夫人魯循襲之弊子既君妾母亦稱夫人非禮也經始書仲子正嫡妾之分厥後所書從同同也葬陳成公成公卒哀公立昭公八年卒八月辛亥葬我小君定姒杜氏注定謚也踰月而葬速襄陵許氏曰季文子欲不以夫人禮𦵏定姒盖志扵復古也而不得已於人言卒夫人之觀此踰月而葬盖禮略也冬公如晉左氏傳公如晉晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之宻邇於仇讐而願固事君無失官命鄫無賦於司馬為執事朝夕之命敝邑敝邑􅄶小闕而為罪寡君是以願借助焉晉侯許之陳人圍頓左氏傳楚使頓閒陳而侵伐之故陳人圍頓五年癸巳春公至自晉夏鄭伯使公子發来聘左氏傳鄭子國子産之父来聘通嗣君也鄭僖公前年初即位叔孫豹鄫世子巫如晉去年公如晉請晉令鄫屬於魯晉許之於是穆叔将鄫世子巫如晉以成之不書及者左氏謂比諸魯大夫也外相如不書此書者今公請鄫附庸同吾大夫徃晉為我事也鄫本屬莒魯請於晉為屬穆叔知莒必争以為不利終之眀年莒人滅鄫仲孫蔑衛孫林父會吳于善道杜氏注善道地闕榖梁作善稻何注善稻吴地左氏傳吳子使夀越如晉辭晉不會雞澤之故且請聽諸侯之好晉人将為之合諸侯使魯衛先㑹吳且告㑹期故孟獻子孫文子會吳于善道二子皆受晉命而行書㑹吳徃㑹之也成九年晉侯為蒲之會将以致吳而吳不至故十五年叔孫僑如晉士燮及諸侯之大夫㑹之于鍾離使荀㑹逆吳而吳又不至故此年使魯衛先㑹之于善道凡此皆徃會之故二㑹不序吳於列而皆殊之至秋戚之會序吳於列而不復殊者因其来會也由此觀之凡序吳者来㑹我也殊會者徃會之也㑹吳屢不至見其驕也晉侯所以汲汲於㑹吳者以為非得吳不足以抗楚也秋大雩左氏傳旱也楚殺其大夫公子壬夫左氏傳楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之書曰楚殺其大夫公子壬夫貪也君子謂楚共王於是不刑子辛之貪雖足以取死共王用刑為失其節故言不刑已則無信而殺人以逞不亦難乎共王伐宋封魚石背盟敗于鄢陵殺子反公子申及壬夫八年之中殺三卿故君子以為不可楚討陳叛故曰由壬夫實貪欲焉殺之壬夫則有罪矣廢而勿用可也殺之過矣故稱國以殺公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚戚衛地戚左氏傳九月丙午盟于會吳且命戍陳也穆叔以屬鄫為不利使鄫大夫聽命于會鄫莒有忿魯恐不能救致譴故乞還之楚子囊為令尹范宣子曰我䘮陳矣楚人討貳而立子囊必改行而疾討陳陳近於楚民朝夕急能無徃乎有陳非吾事也無之而後可為杜氏注不復殊吳者吳来會于戚程氏曰吳来會非主也吳初與諸侯盟也不書盟為晉諱也吳晉之盟春秋終諱之見哀十三年公至自㑹冬戍陳戍陳書于公至之下見公歸而遣戍也戚之會晉侯必與諸侯謀戍陳以備楚或命之不専故諸侯不戍而魯獨戍戍之者寡宜乎来楚之伐也經據實而書所以罪諸侯也楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳公榖曹伯下有莒子邾子滕子薛伯棣左氏傳子囊伐陳十一月甲申會于城以救之城棣鄭地陳陳附中國而楚争之来伐諸侯救之義在助而拒荆楚故春秋善其救也十有二月公至自救陳公方八嵗魯大夫佐之救陳雖善而亦甚危也故喜而至之辛未季孫行父卒左氏傳季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食栗之馬六年甲午春王三月杞伯姑容卒左氏傳杞桓公卒子孝公立夏宋華弱来奔左氏傳宋華弱與樂轡少相狎長相優調戯也又相謗也子蕩怒即樂轡以弓梏華弱扵朝張弓以貫其頭若械之在手故曰梏平公見之曰司武而梏扵朝難以勝矣司武司馬言其懦弱不足以勝敵遂逐之夏宋華弱来奔司城子罕曰同罪異罰非刑也専戮扵朝罪孰大焉亦逐子蕩秋葬杞桓公滕子来朝左氏傳滕成公来朝始朝公也莒人滅鄫鄫本屬莒因四年魯如晉而請屬故鄫為魯附庸魯大夫扵是偕鄫世子見晉鄫有所恃不備故莒乗其間滅之公榖皆以鄫立莒甥異姓以承其後故以滅書趙氏劉氏非之胡氏以黄歇吕不韋之事比之見莒假異姓絶人之祀與滅同經之書滅豈誣莒乎冬公孫豹如邾左氏傳穆叔如邾聘且修平襄四年邾莒伐鄫臧紇救鄫侵邾敗于狐駘今穆叔如邾平狐駘戰邾小國魯反聘之何削弱之甚也季孫宿如晉宿行父之子季武子也去年行父方卒魯使宿代父卿如晉大夫之䘮禮廢矣左氏謂晉以魯不救鄫為莒所滅故来討而宿如晉聽命晉不討莒而討魯何耶是知傳所言非實也十有二月齊侯滅萊襄二年齊伐莱莱人賂齊嬖臣索牛馬百匹索簡擇好者師乃還六年齊侯滅莱盖滅人之國經特書之甚之也七年乙未春郯子来朝左氏傳始朝公也夏四月三卜郊不從乃免牲左氏傳孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今既耕而卜郊宜其不從也石氏曰四月非郊之時三卜不從乃免牲皆非禮也小邾子来朝左氏傳小邾穆公来朝亦始朝公也城費左氏傳南遺為費宰費季氏邑叔仲昭伯為隧正隧正主徒役之官昭伯恵伯之孫欲善季氏而求媚扵南遺謂遺請城費使遺請城吾多與而役故季氏城費傳言祿去公室季氏所以强季文子相三君忠扵公室及其卒子宿嗣卿以强専魯乗主幼稚有無君之心小人求媚請城費邑以中其欲至其子意如遂出昭公魯之衰弱自宿為之洎定十二年費襲魯仲尼為司寇命申句須樂頎伐之費人北遂墮費自非聖人處之未易為也其禍始扵城費春秋書之以示貶見季氏之强濫觴于此矣秋季孫宿如衛左氏傳季武子即宿報子叔之聘子叔即公孫剽来聘在元年且辭緩報言國多難緩扵報聘非貳也八月螽書災也經書螽凡十一書八月螽凡三冬十月衛侯使孫林父来聘壬戌及孫林父盟左氏傳衛孫文子来聘且拜武子之言且拜季武子緩報非貳之言而尋孫桓子之盟盟在成三年楚公子貞帥師圍陳楚圍國初書大夫楚强甚矣十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬于軌切鄭地左氏傳楚子囊圍陳會于鄬以救之晉㑹諸侯于鄬以救陳鄭伯髠頑如會未見諸侯丙戌卒于鄵七報切又采南切鄭地經書鄭伯卒左氏以大夫子駟弑之以疾赴經以其告書之若實見弑而以卒書之諸國弑君安有以實告者偽赴而從其偽豈春秋誅亂賊法乎公榖以鄭欲附晉大夫欲從楚遂弑之一以不書弑為中國諱也一以不使附楚之賊加乎中國之君也胡氏取此說石氏劉氏俱非之謂果實弑而書卒是匿首惡之名使亂臣無所懼何其悖哉愚謂子駟既相鄭伯如會盖将見諸侯矣耳目矣甚邇必不敢遽行弑逆之事子駟甞勸鄭成公從中國今既相其嗣君来㑹豈得方變其說以從夷也或以子駟為政多殺疾之者因公卒于外而誣之若果實弑聖筆豈不眀書之乎然傳己言之矣聖人恐其失有罪故作疑似之辭書之諸侯卒于封内不書地今書地以疑之爾陳侯逃歸左氏傳陳人患楚慶虎慶寅謂楚人曰吾使公子黄徃而執之楚人從之二慶使告陳侯于㑹曰楚人執公子黄君若不来羣臣不忍社稷宗廟懼有二圖陳侯逃歸陳侯為其大夫謀以從楚俾楚執其弟以懼其心陳侯恐晉不能救故潜逃而歸經特書逃歸罪之也劉氏曰逃歸脫而歸也八年丙申春王正月公如晉左氏傳公如晉朝且聽朝聘之數禀其多少之數夏葬鄭僖公鄭伯果被弑則不書葬矣即經之辭可以證傳之妄鄭人侵蔡獲蔡公子燮鄭僖公甫葬嗣君俾子國子耳為晉出師無名侵蔡獲蔡公子燮以激楚之怒蔡楚與國也鄭人皆喜而子産獨懼未幾致楚之伐人微者也經特書人罪之也鄭人從楚從晉反覆靡定晉楚争之不已而况無故有以致之耶季孫宿會晉侯鄭伯齊人宋人衞人邾人于邢丘魯君時在晉晉侯以其幼稚不與㑹與魯大夫季孫宿齊髙厚宋向戌衛寗殖邾大夫會故經不書公而但書季孫宿貶其僣也時鄭伯獻蔡㨗扵會故親聽命齊宋以下稱人眀大夫不可敵晉鄭貶大夫不可會公侯也見政在大夫矣晉失正而不能防微以起其僣何以為盟主經據其事而書以示貶也邢丘杜氏注晉地河内平臯縣公至自晉眀公在晉而宿自㑹也莒人伐我東鄙左氏傳以疆鄫田莒既滅鄫魯侵其界故伐魯東鄙以正其封疆莒人滅鄫而魯不敢争伯主不討所以敢又興伐魯疆鄫田之師也秋九月大雩左氏傳旱也秋九月大雩凡三見僖公十三年冬楚公子貞帥師伐鄭左氏傳楚子囊伐鄭討其侵蔡也子駟欲兩從晉楚晉伐則從晉楚伐則從楚曰犧牲玉帛待扵二竟以待强者而請盟其何以能國子展不肯背晉五㑹之信唯欲待晉子駟請從楚而自受其咎乃及楚平平而不書見鄭之屈服扵楚而不信也晉侯使士匄来聘左氏傳晉范宣子来聘且拜公之辱告将用師于鄭九年丁酉春宋災天火曰災来告則書以外災不書来告則書一二見焉夏季孫宿如晉左氏傳季武子如晉報宣子之聘也五月辛酉夫人姜氏薨宣公夫人成公母穆姜薨于東宫秋八月癸未葬我小君穆姜杜氏注四月而葬速也冬公會晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲音熈伐鄭介晉楚二大國之間故晉楚常争鄭鄭與晉則楚與楚則晉伐而鄭亦疲弊扵兵矣今晉會十一國諸侯同伐鄭鄭固力之不能支乃受盟而紓禍而鄭雖来服而背楚之意未堅故公子騑言惟有禮與强可以庇民者是從而次年果有從楚伐宋之役左氏以為鄭服不然也書同盟懼其不同而强其同也盖戲之盟要盟也自是又凡再伐而晉修徳以来之至蕭魚之會而鄭始大服楚亦不復争可謂得善勝之道矣二十餘年無干戈之患晉悼之伯功扵是進矣楚子伐鄭左氏傳楚伐鄭子駟子展曰吾盟固云惟强是從今楚師至晉不我救則楚强矣自是晉三駕而鄭始平十年戊戌春公會晉侯宋公衞侯曹伯莒子邾子膝子薛伯杞伯小邾子齊世子光會吳于柤柤音查楚地吳子夀夢在柤晉與諸侯徃㑹之故曰會吳特書㑹吳以吳為會故也書吳但稱國抑而外之也曰吳則諸侯之恥見矣吳子在柤諸侯特徃㑹之可謂中國弱而外吳强矣夏五月甲午遂滅偪陽偪陽小國妘姓今彭城傅陽縣也晉率諸侯渉楚㑹吳因道用師以滅微國恃衆剽利無復伯討則中國之禮義盡矣夫何以格荒服甚之故日而志之也其曰遂者連上文諸侯㑹因而滅之併罪諸侯也公至自㑹兩事而至前事至會不至滅也亦因其以諸侯㑹狄而異之也楚公子貞鄭公孫輒帥師伐宋左氏傳六月楚子囊即公子貞鄭子耳即公孫輒師于貲母音無宋地門于桐門宋城門侯首書楚主兵也後鄭鄭從之也經書從外吳以伐諸鄭之罪著矣晉師伐秦左氏傳九年秦景公使士雃音牽乞師于楚将以伐晉楚子許之秋楚子師于武城以為秦援秦人侵晉晉饑弗能報也今年晉荀罃伐秦報其侵也秋莒人伐我東鄙左氏傳莒人閒去聲諸侯之有事也有討鄭之事故伐我東鄙四年邾莒伐鄭魯臧紇救鄫今年聞諸侯之将討鄭伐我東鄙亦以鄫之憾未釋爾公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭此晉悼三駕之初也三駕三興師也左氏傳諸侯伐鄭齊崔杼使太子光先至于師故長于滕己酉師于牛首晉齊世子光先滕薛杞邾者先期以會吳挟吳以要晉方倚重於吳不敢違吳之請此今年所以先四國而眀年先六國也周禮諸侯之適子誓扵天子攝其君則下其君之禮一等未誓則以皮帛繼子男齊世子光未命者柤之㑹列扵小邾之下正矣今先滕薛盟主進之夫子仍其舊文書之以譏失禮也鄭與楚伐宋故公會諸侯以伐之冬盜殺鄭公子騑公子發公孫輒左氏傳初子駟與尉止有争子駟為田洫司氏堵氏侯氏子師氏皆䘮田焉故五族聚羣不逞之人因公子之徒以作亂扵是子駟當國子國為司馬子耳為司空子孔為司徒冬十月尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政于西宫之朝殺子駟子國子耳子孔知之故不死盗程子曰不稱大夫失卿職也殺三卿者不名而稱小臣無列扵朝伺隙而竊發則盗也盗一日而殺三卿鄭伯不修其政刑可知矣戍鄭虎牢左氏傳諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戍之鄭及晉平鄭黨楚為中國患扵是二年諸大夫復㑹于戚遂城虎牢虎牢鄭巖邑也孟獻子謀取而城之以制鄭而扼楚所以安中國息征伐故聖人許之不繫扵鄭功覆過也此戍虎牢而繫之鄭者盖鄭人從楚困于力之不能敵楚晉不復深思所以制楚懐鄭既伐而又戍不以義服之徒恃諸侯之力以逼焉曽不以民人不獲享其土利辛苦墊隘無所底告之可矜也豈伯主服人之道乎故繫之鄭以罪諸侯也後書楚救鄭以救與楚見諸侯之不楚若也楚公子貞帥師救鄭子囊救鄭諸侯之師還鄭而南至于陽陵與楚夹潁而軍鄭子蟜宵渉潁與楚人盟則諸侯之戍鄭無能為可知也公至自伐鄭襄陵許氏曰書楚救鄭而至公知諸侯之避楚也十一年己亥春王正月作三軍左氏傳季武子作三軍三分公室而各有其一三分魯國民衆而三家各有其一分三子各毁其乗三家各壊其車乗分以足成三軍季氏使其乗之人以其役邑入者無征不入者倍征武子使其軍乗之人率其私邑之役徒入季氏者免其公征不入季氏者則使公家倍征之設利病欲驅使入已故昭五年傳曰季氏盡征之民避倍征故盡属季氏孟氏使半為臣若子若弟孟獻子取其子弟之半為臣盖四分其乗之人以三歸公而取其一叔孫使盡為臣叔孫穆子盡取子弟以其父兄歸公不然不舎制軍分民不如是則三家不舎其故而改作也杜氏注増立中軍萬二千五百為軍魯襄幼弱三家専政乃作三軍為私計也作創始為之也周制天子六軍大國三軍次國二軍小國一軍魯侯封扵曲阜至于七百里盖大國也其後甞衰僖公能復周公之宇故魯頌曰公車千乗又曰公徒三萬則魯之三軍舊矣此謂之作何也豈非宣成之世或侵削而為二也今襄公作三軍宜曰復而聖筆云作者盖三家變古之制而利扵私有所作而為之也至昭公則又合而兩之故書曰舎中軍皆以從其私也一作一舎見大夫之强公室之卑而魯寖以微矣夏四月四卜郊不從乃不郊穀梁傳夏四月不時也四卜非禮也鄭公孫舎之帥師侵宋左氏傳鄭人患晉楚之故諸大夫曰不從晉國幾亡楚弱扵晉晉不吾疾也疾急也言晉不急争鄭也晉疾晉若急争鄭楚将辟之何為而使晉師致死扵我何計使晉師致死力以争鄭楚弗敢敵然後可固與也可固與晉子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟来楚将不能楚将不能數来吾乃固與晉大夫說之鄭大夫恱其謀使疆場之司惡扵宋宋向戍侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告扵楚楚師至吾又與之盟而重賂晉師乃免矣夏鄭子展侵宋欲以致諸侯之師也公會晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北亳北鄭地復此晉以諸侯再駕伐鄭也程氏曰鄭服而同盟也隨從楚伐宋故云同見其反覆鄭子展謀以乍服乍叛使晉怒甚而屢致師扵我而楚不敢争然後與之也卒不能逃其謀而晉悼不惡其反覆惟其誠待之故其後始心服矣公至自伐鄭穀梁傳不以後至盟後復伐鄭也楚子鄭伯伐宋左氏傳楚子囊乞旅于秦秦右大夫詹帥師從楚子将以伐鄭鄭伯逆之丙子伐宋鄭逆服故更伐宋從子展之謀也公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會于蕭魚此晉悼伐鄭之三駕也鄭伯尋背亳北之盟與楚伐宋故晉悼復以諸侯伐鄭而楚之力已屈而不争鄭扵是始服于晉使行人良霄告于楚曰孤以社稷之故不能懐君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之諸侯之師觀兵于鄭東門鄭人使王子伯駢行成甲戌晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晉侯十二月戊寅會于蕭魚鄭服而與會也蕭魚鄭地雖晉楚争鄭踰五十年鄭以蕞爾之邦介二大國之間屢盟屢叛反覆無常然久困扵兵亦病矣伯者汲汲乎争此者以鄭居天下之中而虎牢之險晉楚之門户也楚得之則可以抗晉晉得之則可以卻楚伯者未有不得扵鄭而能卻楚也晉伯中微鄭人與楚悼公奮起服鄭有道初駕盟于戲再駕盟于亳北鄭雖服而又叛逮夫三駕晉赦鄭囚而歸之納斥候禁侵掠加禮扵鄭鄭人心恱誠服為會蕭魚鄭懐晉之徳不叛者二十四年諸侯少息中國少安晉悼伯業之盛春秋扵是有取焉吁晉何以得此哉盖由能用知罃之謀也鄭服而數叛曽不甚怒動諸侯之師以伐鄭兵力非不强也及楚救之未甞與之戰能堅忍而得善勝之道不暴骨以逞惟推誠信以感之故楚遂終屈而鄭亦心服及蕭魚之會但成交好之禮不事盟詛而要結自固初非强之而自服雖不及召陵城濮之舉而晉悼之功亦可尚也已公至自會榖梁傳伐而後會不以伐鄭得致鄭伯之辭程氏曰兵不加鄭故書至自會楚人執鄭行人良霄鄭使良霄告絶于楚楚人執之書曰楚人執鄭行人非其罪也許氏曰書楚執良霄見楚力盡扵此矣冬秦人伐晉左氏傳秦庶長鮑庶長武帥師伐晉以救鄭鮑先入晉地士魴禦之少秦師而不設備壬午武濟自輔氏與鮑交伐晉師己丑秦晉戰于櫟晉師敗績易秦故也說左氏者以晉師敗績晉恥不告未可必其然也十有二年庚子春王二月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆榖梁台作邰杜氏注琅琊費縣南有台亭鄆莒邑莒背蕭魚之會而伐魯東鄙圍台季孫宿受命救台經書遂入鄆専也大夫無遂事受命而救台不受命而入鄆惡季孫宿之擅權也夏晉侯使士魴来聘左氏傳晉士魴来聘且拜師謝累年伐鄭襄陵許氏曰晉悼服鄭抑楚而聘善持勝矣秋七月吳子乗卒左氏傳吳子夀夢卒臨于周廟禮也凡諸侯之䘮異姓臨于外同姓扵宗廟同宗扵祖廟同族扵禰廟宗所出之王祖始封之君同族髙祖以下是故魯為諸姬臨扵宗廟為邢凡蔣茅胙祭臨扵周公之廟泰山孫氏曰不書葬以其稱王罪大惡重貶之也襄陵許氏曰夀夢得一申公巫臣而國勢變化與華夏通楚以吳議其後亦不能為大患扵中國冬楚公子貞帥師侵宋左氏傳楚子囊秦庶長秦官無地庶長名伐宋師于揚梁宋地以報晉之取鄭公如晉左氏傳公如晉朝且拜士魴之辱十三年辛丑春公至自晉夏取邿公羊邿作詩邿音詩小左氏傳邿亂分為三師亭救邿遂取之杜氏注國也任城亢父縣有邿襄陵許氏曰晉始息民是以楚侵宋不報魯取邿不討取無大亂而已因其亂而救之可也因圍取焉假義之名以貪利其惡可知也秋七月庚辰楚子審卒共王卒康王立襄二十八年卒冬城防城臧氏之邑畢左氏傳書事時也於是将早城臧武仲請俟農事襄陵許氏曰鄭役既熄魯政有裕則知取邿以為利城防以為安而已矣十四年壬寅春王正月季孫宿叔老會晉士匄齊人宋人衞人鄭公孫蠆曹人莒人邾人滕人杞人小邾人會吳于向向鄭地叔老聲伯子也魯使二卿會晉敬事伯國齊崔杼宋華閱衛北宫括在㑹惰慢不攝故貶稱人侵吳来在向諸侯會之故曰㑹吳四左氏傳十三年吳楚戰于庸浦楚地大敗吳師十年吳告敗于晉會于向為吳謀楚也范宣子數吳之不徳地以退吳人士匄以前年吳伐䘮為不徳數而退之不為吳伐楚前年吴子卒此㑹新君諸樊也下稱人微者也扵是子叔齊子即叔老字為季武子介介副也武子即宿也卿為卿介非禮也以會自是晉人輕魯幣而益敬其使始襄陵許氏曰四卿帥師自大夫始二卿列㑹自襄公大夫張也何氏曰諸侯委任大夫交㑹强吳臣日以强三年之後君若贅旒矣二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衞北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦左氏傳諸侯之大夫從晉伐秦以報櫟之役也櫟之役在十一年今又不獲成乃歸晉人謂之遷延之役遷延却退也晉自殽師以来距此年伐秦六十九年自此以後兵禍始息齊宋稱人微者也己未衞侯出奔齊公羊衛侯下有衎字所衛侯衎出奔二卿孫林父寗殖之逐也不書臣之所逐不以臣而逐君也以自奔書亦以其君驕慢無禮不能自立而出奔也不書衎名所以抑强臣存大義也莒人侵我東鄙報十二年入鄆也秋楚公子貞帥師伐吳左氏傳楚子為庸浦之役故十三年吴乗楚䘮侵楚戰于庸浦子囊師于棠以伐吳吳不出而還冬季孫宿會晉士匄宋華閱衞孫林父鄭公孫蠆莒人邾人于戚左氏傳會于戚謀定衛也晉衛侯固無禮君也林父臣也而逐之祈于晉遂㑹諸侯于戚以定之逐君之賊晉侯曽不惡之而卒狥其私謀今又列于會經直書之所以貶諸侯也矧衛人立剽非正也而晉為謀定之則正弗勝矣師曠荀偃之言有保姦之志而無輔伯之忠晉悼之徳其衰矣乎洎襄昭之際大夫無君晉實啟之也十有五年癸卯春宋公使向戌来聘二月己亥及向戌盟于劉劉魯地左氏傳宋向戌来聘報二年豹之聘且尋盟尋十一年毫之盟襄陵許氏曰不盟于國而盟于劉崇向戌故公弱甚矣劉夏逆王后于齊杜氏注劉采邑夏名也天子卿書字劉夏非卿故書名天子無外所命則成故不言逆女者戚之會齊不至晉怨齊矣王逆后于師齊畏晉而使微經不書正月其以此邪左氏傳官從單靖公逆王后于齊卿不行非禮也官師劉夏也劉夏獨遇魯告昬故不書單靖公常山劉氏曰昬姻人倫之本王后者天下之母劉夏非三公而逆后是不重人倫之本不尊天下之母禮何以興而風化何以成乎不稱使不與天子之使夏也也春秋逆王后者二祭公行得禮而又書之者譏遂事劉夏之逆則以非三公而譏之也春秋二百四十二年周王十三其逆王后者惟二是知非禮則書之也夏齊侯伐我北鄙圍成公救成至遇遇魯地公羊傳其言至遇何不敢進也杜氏注書至遇公畏齊不敢進也常山劉氏曰武備不謹成郛見圍救患當速乃復畏避公之所為可知矣季孫宿叔孫豹帥師城成郛常山劉氏曰由不能救成故成郛見壊而城也吕氏曰成郛壊而城苟完而已當世君臣所以為國者如是而止寜為逺慮乎秋八月丁巳日有食之邾人伐我南鄙左氏傳邾人伐我使告于晉晉将為㑹以討邾莒晉侯有疾乃止故溴梁之㑹晉人執邾子莒子以歸魯莒人伐東鄙齊侯伐北鄙邾人伐南鄙三國固可罪之不能睦四鄰亦可知也冬十有一月癸亥晉侯周卒左氏傳晉悼卒遂不克㑹十有六年甲辰春王正月葬晉悼公葬悼公平公立速杜氏注踰月而葬也三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴扁入梁戊寅大夫盟溴水名出河内軹縣東南至温入河溴梁晉地又三年雞澤之會尚言及諸侯之大夫盟至于溴梁則甚矣政在大夫故不言諸侯之大夫盖大夫無諸侯也事之信否在大夫其専可知也衛齊髙厚逃盟故不書此書衛侯乃剽也二十五年侯入于夷儀衎也二君皆稱衛侯猶鄭突及儀皆稱鄭伯也晉人執莒子邾子以歸諸侯有罪當執之歸于京師不得自治之録以歸惡其専也以邾莒背盟伐魯故執之何以不得為伯討而稱晉人古之君子正已而物正先自治而治人晉侯之正未能以行其國而執人此所以非伯討也齊侯伐我北鄙齊貳晉故晉平踐祚齊侯遂即伐魯至秋又伐北鄙圍成十七年齊又兩伐魯晉帥列國同圍齊二十年澶淵之盟齊始服夏公至自㑹五月甲子地震地震凡五詳見文九年叔老會鄭伯晉荀偃衛寗殖宋人伐許左氏傳許請遷于晉許欲背楚遷都于晉諸侯遂遷許許大夫不可晉人歸諸侯以其師討許之不肯遷鄭子蟜公孫蠆聞将伐許遂相鄭伯以從諸侯之師穆叔從公齊子即叔老帥師㑹晉荀偃夏六月次于棫林許地庚寅伐許次于函氏許地鄭非主兵曷為書鄭伯不以大夫主諸侯則推而屬之鄭也晉雖主兵而先鄭伯臣不可過君也許男有從中國之志其臣沮之斯時大抵臣强而君不可以有為也秋齊侯伐我北鄙圍成成魯孟氏邑齊貳晉故伐魯徼左氏傳齊侯圍郕孟孺子速音澆要也之速孟獻子之子莊子也齊侯曰是好勇去之以為之名去之不與之戰以成其名速遂塞海陘而還海陘魯隘道速見齊師去已遂塞隘道以為名而歸大雩冬叔孫豹如晉言齊故也十八年晉帥諸侯同圍齊十有七年己巳春王二月庚午邾子牼苦耕切卒宣公卒悼公立昭元年卒卒十六年晉人執邾子以歸今書邾子牼則既釋之矣經不書其歸不告也宋人伐陳左氏傳宋莊朝宋微者伐陳獲司徒卬卑宋也陳卑宋師不設備故獲夏衛石買帥師伐曹石買石稷子于左氏傳衛孫蒯孫林父之子田曹隧飲馬于重平聲丘曹邑毁其瓶重丘人閉門而訽音候罵也之曰親逐而君謂林父爾父為厲言林父死當為惡鬼是之不憂而何以田為夏衛石買孫蒯伐曹取重丘杜氏注不書孫蒯非卿曹人愬于晉為眀年晉執石買傳衛孫蒯以匹夫一言之忿而欲申之遂輕棄大國之盟結鄰邦之怨勞衆害民其専甚矣蒯使石買徃伐故經以實事書之著其貶也秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防祧魯邑防魯臧紇邑自隠以来齊伐我皆書人君将書君自文十五年始大夫将書大夫自髙厚始杜氏注弁縣東南有桃墟三十五年齊圍成十六年齊又伐我至今年又圍二邑年之中加兵于魯者四前年之冬魯甞愬于晉至眀年晉師方出怠扵救患故齊恣為不道而伐魯之師猶未巳也九月大雩宋華臣出奔陳宋華閱卒華臣弱臯比之室華臣閲之弟臯比閱之子華臣以華閱卒臯比新立故弱其室而侵易之使賊殺其宰華吳賊六人以鈹刃劒属殺諸盧門城門合左師之後合左師向戌也左師懼曰老夫無罪賊曰臯比私有討扵吳遂幽其妻曰畀余而大璧言與我以汝大璧宋公聞之曰臣也華臣不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之恥也不如盖之乃舎之十一月國人逐瘈狗瘈音制又音計􅱭狾仝狂也瘈狗入于華臣氏國人從之華臣懼遂奔冬邾人伐我南鄙左氏傳為齊故也魯邾齊與國以前年晉執其君故怨而助齊伐我十有八年丙午春白狄来左氏傳白狄始来杜氏注白狄狄之别名未甞與魯接故曰始未白狄来不言朝公羊氏謂不能朝也書白狄不名其君所以外之也劉氏曰所以懲滛慝一内外也周公致太平越裳氏九譯而獻白雉公曰君子徳不及焉不享其贄此乃天子之讓也况列國之君守藩之臣乎夏晉人執衞行人石買左氏傳晉人執衛行人石買于長子長子上黨郡縣名長上聲又如字執孫蒯于純留純留亦上黨郡縣名為曹故也為前年衛伐曹故賁其伐曹不當因使執之故稱行人孫蒯使石買伐曹曹人訴諸晉石買以君命聘于晉晉人不當執之又不歸于京師不得為伯討故稱人以執罪晉可知矣秋齊師代我北鄙黜侯稱師貶其用衆也四年之中伐魯者五終之致十二國之師而幾不免齊環自取之也冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊溴梁之會齊侯不與三年之中五加兵于魯齊之驕暴甚矣今年晉帥十一國之師伐之同圍齊齊侯禦諸平隂而守之齊師遁遂入平隂荀偃士匄克京兹魏絳欒盈克邿焚雍門之萩及申池之木又焚北郭西郭東侵及濰南及沂齊侯駕将走郵棠太子抽劒斷鞅乃止齊侯受兵禍若此其亟也經書同圍見諸侯所同疾之也終書伐者師出有名而伐有罪也其罪齊之意可見矣曹伯負芻卒于師成公卒武公立昭十四年卒師成十三年伐秦之役曹伯盧卒于負芻殺其世子而自立晉侯執之歸于京師正也王不戮負天芻書曹伯歸自京師不正也今書曹伯負芻卒于師此意也天道好還王釋之天誅之始見王之不王也楚公子午帥師伐鄭自晉與諸侯蕭魚之㑹楚不敢加兵於鄭七年矣今鄭子孔即公子嘉将叛晉而欲起楚師以去諸大夫而専政使告楚子庚子庚不可楚子知之遂帥師伐鄭於是鄭子蟜公孫蠆伯有良霄子張公孫黒肱從鄭伯伐齊子孔子展公孫舎之子西公孫夏守鄭子展子西知子孔欲去諸大夫之謀完守入保子孔不敢出會楚師楚師侵鄭諸邑至蟲牢而反盖子孔召之也故眀年鄭討子孔十有九年丁未春王正月諸侯盟于祝柯去年圍齊之諸侯也祝柯齊地祝柯縣今屬濟南郡諸侯已圍齊又為祝柯之盟不序諸侯前目後凡也晉人執邾子左氏傳執邾悼公以其伐我故伐魯在十七年遂次于泗上疆我田正邾魯疆界取邾田自漷水歸之於我新晉前年執邾子以歸以其伐魯故既釋之而歸卒邾君立又復伐魯其無所忌憚若此曽不畏伯主之討今晉執其君削其田雖當罪而非正以其不由王命而皆出扵大夫故稱人以執非伯討也公至自伐齊胡氏曰圍齊以伐至見齊靈之無道宜得諸侯之伐免其圍齊之罪辭也春秋扵此有沮横逆抑强暴之意取邾田自漷水漷音宏入聲又音郭合取邾田以漷水為界也漷水出東海鄉縣西南經魯國至髙平湖陸縣入泗伯邾甞屢伐魯魯愬于晉晉怒因㑹執之魯乗其隙恃威以取其田取非其有故經書取邾田惡内也而又所取無厭直自漷水為界為尤甚矣聖筆僅書六字而晉魯之罪盡見交譏之也成元年晉敗齊于鞌使齊人歸我汶陽之田書曰取汶陽田不言齊魯地也與此異矣季孫宿如晉左氏傳季武子如晉拜師拜謝討齊之師也葬曹成公夏衞孫林父帥師伐齊左氏傳晉欒魴帥師從衛孫文子伐齊使欒魴欒氏族經不書兵并林父也夫討强暴之罪而逐君之大夫則晉何足以服齊之心故特書林父主兵以貶晉也秋七月辛卯齊侯環卒靈公卒莊公立二十六年遇弑晉士匄帥師侵齊至榖聞齊侯卒乃還左氏傳士匄侵齊及榖聞䘮而還禮也公羊傳還者何善辭也何善爾大其不伐䘮也古之為師也不伐䘮大夫以君命出境有可以安社稷利國家則専之可也榖齊地也記其至榖乃所眀境外得専之也非齊地則止師而請之示不敢専也時禮義廢乗人之危伐䘮者多矣宋圍滕䘮貶之稱人文九年鄭伐衛䘮狄之書鄭成三年如士匄之志信可嘉也八月丙辰仲孫蔑卒魯大夫孟獻子也齊殺其大夫髙厚齊靈娶于魯曰顔懿姬無子其姪鬷聲姫生光為太子諸子仲子戎子諸子皆妾姓子者二子皆宋女戎子嬖仲子生牙屬諸戎子戎子請為太子靈公許之仲子曰不可廢常不祥靈公使太子居東鄙以牙為太子令髙厚傅之夙沙衛為少傅靈公疾崔杼微逆光立焉光殺戎子執公子牙靈公卒光即位崔杼殺髙厚於灑藍齊地而兼其室書曰齊殺髙厚從君於昬也稱國以殺罪累上也不以丙下相殺書者其君之意也故以累上之辭言之鄭殺其大夫公子嘉左氏傳鄭子孔之為政也専國人患之乃討西宫之難十年盗殺三卿子孔知而不言與純門之師十八年召楚師于純門子孔當罪子展子西率國人伐之殺子孔而分其室胡氏曰嘉則有罪矣子展子西不能正以王法肆諸市朝與衆同棄乃利其室而分之有私意焉故稱國以殺而不去其官此春秋原情定罪之意殺嘉雖去其專然大夫為政國非其國矣冬葬齊靈公城西郛左氏傳懼齊也前年與晉伐齊故懼而為備叔孫豹會晉士匄于柯杜氏注魏郡内黄縣有柯城城武城備齊也杜氏注泰山南武城縣齊齊莊立始及晉平盟于大隧大隧地關魯懼故穆叔會范宣子于柯以自固穆叔見叔向賦載馳之四章四章曰控于大國誰因誰極欲引大國救助也叔向曰􅆄敢不承命穆叔歸曰齊猶未也不可以不懼乃城武城二十年戊申春王正月辛亥仲孫速㑹莒人盟于向向莒邑左氏傳春及莒平孟莊子即仲孫速㑹莒人盟于向督揚之盟故也督揚即祝柯莒數伐魯前年盟督揚故二國復自結盟好夏六月庚申公會晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵澶音蟬杜氏注澶淵在頓丘縣南一名繁汙衛地按唐置澶州今屬開徳府臨河縣左氏傳盟于澶淵齊成故也齊與晉平齊數伐魯魯愬于晉十八年晉㑹十二國諸侯討之而齊始懼去年又伐之遇齊䘮而還至澶淵之會而齊始服序齊扵晉下以専為齊而為㑹晉為盟主扵齊則賔之也秋公至自會仲孫速帥師伐邾速蔑之子矣今夏魯既與邾盟口血未乾孟莊子何為又復興伐經直書之著其背盟之罪也蔡殺其大夫公子燮蔡公子履出奔楚初蔡文侯今景侯父欲事晉曰先君謂莊侯與於踐土之盟在僖二十八年晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡蔡人殺之公子履其母弟同母弟也故出奔楚燮之謀合于義矣殺之何罪故稱國以殺而不去其官罪累上也履乃燮之同母弟燮被殺不容不懼禍而奔但奔楚為可罪爾陳侯之弟黄出奔楚陳慶虎慶寅畏公子黄之逼二慶陳卿畏黄偪奪其政愬于楚曰與蔡司馬同謀謂燮楚人以為討公子黄出奔楚書曰陳侯之弟黄出奔楚言非其罪也公子将出奔呼扵國曰慶氏無道求専陳國暴蔑其君而去其親五年不滅是無天也為二十三年陳殺二慶傳經顯書弟以惡其兄之不兄也非兄之罪則曰公子二慶欲専陳之政外挟強楚以去君之弟而陳侯不能眀其誣故特書弟以罪陳侯也叔老如齊左氏傳齊子即叔老初聘于齊齊既與魯平故叔老如齊修聘冬十月丙辰朔日有食之季孫宿如宋左氏傳季武子如宋報向戌之聘也向戌聘在十五年二十有一年己酉春王正月公如晉左氏傳公如晉拜師謝十八年伐齊之師及取邾田也兼謝十九年漷水之田邾庶其以漆閭丘来奔庶其邾大夫不書微也不氏未命也漆閭丘邾二邑也昭五年莒牟夷以牟婁及防兹来奔同此書惡魯受叛人邑也案左氏傳庶其非卿也以地来雖賤必書重地也庶其之来季武子又以公姑姊妻之故臧武仲譏其賞盗經特書其事惡魯以利接之不以義所以警貪也夏公至自晉秋晉欒盈出奔楚欒桓子黶娶范宣子匄女生懐子即盈十四年欒黶強逐范鞅奔秦故鞅怨欒氏與欒盈為公族大夫而不相能桓子妻范祁與其家臣州賔通幾已其室矣盈患之祁懼其討乃譛盈扵宣子曰盈将為亂宣子信之遂逐之秋欒盈出奔楚范匄逐之而曰欒盈出奔盈之罪有以取之盈不能閑其家有可逐之釁故逐之是亦盈之出奔也九月庚戌朔日有食之冬十月庚辰朔日有食之此年九月十月日食至二十四年七月八月又連食食之變起於文也有雖交而不食者襄公之世日食者七而三年之中又連月而食者再襄公見制強臣政不已出天象之示戒也曹伯来朝左氏傳曹武公来朝始見也即位三年始来見公也公會晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子于商任音壬地闕左氏傳㑹于商任錮欒氏也禁錮欒盈使諸侯不得受欒盈雖忲徒以權臣忌而譛之而出非其罪也儻踰境而恩義絶矣極之扵其所徃孟子猶以為不可况會諸侯以逞范鞅之積憾必欲使之無所容孔子曰人而不仁疾之已甚亂也故盈發憤入于曲沃為亂幸而勝不然幾致自貽其禍此皆以私敗公可為後世之戒也二十有二年庚戌春王正月公至自㑹夏四月夏四月凡十一秋七月辛酉叔老卒子叔齊子也冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨晉知欒盈在齊故㑹諸侯于沙隨復錮欒氏也欒盈以世勲之舊非有犯上之惡徒以范氏之怨故宣子逐之商任之會已俾諸侯錮之矣猶且逞憾不已再會諸侯沙隨復申錮之之舉逼之太甚是宜啟其怨憤以激其變也公至自會楚殺其大夫公子追舒追舒楚令尹子南益也罷楚人觀起未祿而有馬數十乗招權納賄所致楚人患之将討焉追舒之子棄疾為王御士王毎見必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國将討焉爾其居乎對曰父戮子居君焉用之洩命重刑臣亦不為王遂殺追舒而轘觀起其追舒之為人足以殺其身然而楚子與人之子而謀父其刑已甚不可行乎天下追舒罪不至死故稱國以殺大夫者罪累上也二十有三年辛亥春王二月癸酉朔日有食之三月己巳杞伯匄卒孝公卒弟文公姑容立夏邾畀我来奔書納邾叛人惡内也葬杞孝公陳殺其大夫慶虎及慶寅陳侯之弟黄自楚歸于陳左氏傳陳侯如楚公子黄愬二慶於楚楚人召之使慶樂徃樂二慶族殺之慶氏以陳叛因陳侯在楚而叛之夏屈建楚莫敖從陳侯圍陳陳人城治城以距其君板墜而殺人慶氏築城板墜地殺築人役人相命各殺其長遂殺慶虎及慶寅楚人納公子黄黄因楚得歸故曰納稱國以殺罪累上也其言及慶寅何以罪及之也二慶欲専陳國譛出公子黄而陳侯不能誅至因夷狄之力然後能克故稱國以殺公子黄之出入稱弟無失弟之道也特以地書譏陳侯也言歸者以其有歸之理也晉欒盈復入于晉入于曲沃欒盈晉勲舊之臣曲沃其所食之邑雖奔楚而仍書晉以其非叛未遽絶之也徒以遭䜛被逐而晉侯又兩會諸侯錮之之急使之無所容扵是盈不勝忿遂潜假齊之力由曲沃復入于晉攻之不勝乃走入于曲沃初曲沃大夫胥午告盈必不集事盈答以雖死無悔其志亂可知矣聖人至公之筆原其忿激作亂故不言叛書復入于晉又書入于曲沃者見其入晉不克而還入曲沃使能入晉則不入曲沃矣盖亦由欒氏忲極而當滅扵盈故因内亂以搆其禍幸而范宣子能用樂王鮒之䇿使范鞅奮勇强刼魏舒以分其勢而欒氏敗然亦危甚矣有國者可不鑒歟秋齊侯伐衞遂伐晉齊侯潜助欒盈入晉其志在乎謀晉晉既克欒齊乗亂以掩其不備聲言伐衛其實伐晉也背澶淵之盟而伐伯主取朝歌取郫邵二邑封晉尸于少水齊莊之惡甚矣經書遂原其志以貶之也識者有以覘齊莊之驕恣而禍亂自此作矣嗟夫晉伯衰而諸侯貳大夫強中國之憂也八月叔孫豹帥師救晉次于雍榆雍榆晉地汲郡朝歌縣東有雍城晉有欒氏之難齊乗閒而徃伐魯命豹帥師救之義也豹受命救患當急不當次止于雍榆而不克救經直書之以罪豹也己卯仲孫速卒孟莊子也冬十月乙亥臧孫紇出奔邾案傳季孫宿兩庶子長曰公彌又曰公鉏少曰紇宿欲立少訪扵臧武仲武仲阿順季孫廢長立少及孟莊子疾有二子長曰秩少曰羯豊㸃謂季孫長子公鉏曰苟立羯請讐臧氏遂立羯秩奔邾孟孫羯譛臧氏于季孫曰将為亂季孫怒命攻之乙亥臧紇斬鹿門之闗以出奔邾魯人聚大夫而盟之曰無或如臧孫紇干國之紀犯門斬闗仲尼曰知之難矣有臧武仲之知而不容扵魯國抑有由也作不順而施不恕也循理為順如心為恕武仲廢長立少不順不恕也蘧伯玉曰不以道事其君者其出乎紇亡如防據邑請後魯人為立臧為紇致防而奔齊孔子曰臧武仲以防求為後扵魯雖曰不要君吾不信也紇之不以道信矣魯以利納庶其畀我而以讒去臧孫紇収叛人去智士魯之為國可知矣晉人殺欒盈左氏傳晉人克欒盈于曲沃盡殺欒氏之族黨盈出奔楚義絶扵君臣非晉大夫故不曰大夫而但曰欒盈棄族而出為亂而入衆之所疾晉之冦也故書晉人殺欒盈討賊之辭也鄭良霄奔許已而入鄭伐北門鄭人殺之故書鄭人殺良霄與欒盈之事類也故不曰大夫而以舉衆討賊之辭書之齊侯襲莒左氏傳齊侯還自晉不入遂襲莒所春秋惟此一書襲謂掩其不備也特書爵以恥之也以大國而為盗賊掩襲之事其惡甚矣盖侵伐之中罪之尤者也二十有四年壬子春叔孫豹如晉豹即穆叔也杜氏曰賀克欒氏仲孫羯帥師侵齊左氏傳孟孝伯即羯侵齊晉故也前年齊伐晉魯為晉報侵夏楚子伐吳左氏傳楚子為舟師以伐吳不為軍政無功而還為下吳召舒鳩張本秋七月甲子朔日有食之既襄陵許氏曰春秋三書日食既桓三年以周桓敗宣八年以楚莊興至是而中國諸侯皆受盟于楚矣齊崔杼帥師伐莒左氏傳齊侯既伐晉而懼将欲見楚子楚子使薳啓疆楚大夫如齊聘且請期秋齊侯聞将有晉師使陳無宇齊大夫從薳啓疆如楚辭有晉師未得相見且乞師崔杼帥師送之遂伐莒侵介根莒邑復齊侯前年襲莒既已與之平今伐莒無信甚矣大水襄陵許氏曰夷儀之會以水不克伐齊則知水之所被廣矣非特魯之災也大水凡九詳見桓元年八月癸巳朔日有食之漢五行志曰董仲舒以為比食又既象陽将絶周室將衷㣲之象也後六君弑楚子伐鄭滅舒鳩魯侯朝之卒主中國王氏曰甲者日之首也子者陽之首也癸者日之末也已者陽之末也日之與陽皆君道也首末皆弱君道微矣况日之既乎此非天王之過乃諸侯之過也此年不書王罪諸侯也公會晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀夷儀邢地後為衛地左氏傳會于夷儀将以伐齊水不克晉合諸侯将伐齊以報前年見伐冬楚子蔡侯陳侯許男伐鄭左氏傳楚子伐鄭以救齊門于東門攻鄭東門次于棘澤諸侯還救鄭楚子自棘澤還使薳啓疆帥師送陳無宇言齊楚固相結也許氏曰夷儀之師不能正齊之亂而徒致棘澤之役以為鄭難則其救不足録矣公至自㑹陳鍼宜咎出奔楚左氏傳陳人復討慶氏之黨鍼宜咎出奔楚叔孫豹如京師左氏傳齊人城郏王城也穆叔如周聘且賀城王靈王嘉其有禮也賜之大路大路天子所賜車之揔名為昭四年叔孫以所賜路葬張本襄陵許氏曰自宣九年仲孫蔑如京師其後五十餘年乃始有叔孫豹以罕書也盖自是不書聘王矣大饑饑凡四大饑一榖是年日再食秋大水冝乎冬有大饑榖梁曰五不升為大饑有死傷曰大饑二十有五年癸丑春齊崔杼帥師伐我北鄙左氏傳齊崔杼帥師伐我北鄙報孝伯仲孫羯之師也公患之使告于晉孟公綽魯大夫曰崔子将有大志不在病我必速歸何患焉其来也不冦不為冦害志不在魯使民不嚴不尚威嚴欲得民心異於他日齊師徒歸襄陵許氏曰崔子之志鄰國知之而齊莊不悟人将戕其躬之不恤而務貪伐國之功故利令智昬外競而内昬自然之符也夏五月乙亥齊崔杼弑其君光齊棠邑大夫之妻東郭偃之姊也偃臣崔武子棠公死偃御武子以弔見棠姜美之使偃取之偃曰男女辨姓今君出自丁齊丁公崔之祖臣出自桓齊桓偃之祖不可崔子取之莊公通焉崔子又以其間伐晉也曰晉必将報欲弑公以說于晉崔子稱疾公徃問遂弑之太史書曰崔杼弑其君杼殺三人乃舎之十二日葬諸士孫之里晉侯濟自泮㑹于夷儀伐齊以報朝歌之役齊人以莊公說如字又音恱使隰鉏請成賂晉侯自六正下皆有賂晉侯許之齊莊背晉與楚而陵小國又亂崔杼之室不道甚矣崔杼弑以求成逆之大者晉侯既圍其事不能即而討之謀扵齊衆置君以定其亂反受其賂何以修方伯之職宜乎大夫自是恣横而不可制也故經直書崔杼之弑以著其惡公會晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀晉侯再㑹夷儀将以討齊也崔杼弑莊公為說重賂求免晉受之以成齊亂故經貶之如下文所云六月壬子鄭公孫舎之帥師入陳左氏傳初陳會楚子伐鄭當陳隧井堙木刋鄭人怒之六月鄭子展子産帥車七百乗伐陳宵突陳城遂入之陳服乃還子産鄭之賢者出師有名晉問有辭背楚與晉故杜氏謂陳以不義見入舎之無譏焉秋八月己巳諸侯同盟于重平聲丘夷儀之諸侯也夷儀之諸侯無齊重丘杜氏曰齊地在曹州乗氏縣有故城王氏曰同盟于重丘以成崔杼之志非義也若與齊同盟而誅崔杼則一動兩得之矣石氏曰同盟以眀齊之實在也不序齊人扵列而止曰諸侯猶齊之不與也聖人之意可見矣公至自會衞侯入于夷儀左氏傳晉侯使魏舒宛没逆衛侯将使衛與之夷儀崔子止其帑以求五鹿八月衞獻公入于夷儀杜氏注夷儀本邢地衛滅邢而為衛邑晉閔衛衎失國使衛分之一邑上書公㑹晉侯宋公衛侯云云于夷儀此衛侯剽也衛侯入于夷儀衎也衎以蔑其冢卿失國非臣下所當逐剽亦非臣下所當立故奔齊入夷儀衎仍書其爵而不名不名以正其名於復歸則正其失地之罪名之鄭伯突入于櫟則名之不當立也衎入于夷儀則不名當立也楚屈建帥師滅舒鳩左氏傳二十四年吳人為楚舟師之役召舒鳩人楚屬國舒鳩人叛楚楚子師于荒浦使沈尹夀與師祁犂讓之舒鳩子敬逆二子告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不貳吾又何求若猶叛我無辭有庸復無辭而我有功乃還二十五年楚薳子卒屈建為令尹舒鳩人卒叛令尹子木伐之及離城吳人救之大敗遂圍舒鳩八月楚滅舒鳩冬鄭公孫夏帥師伐陳左氏傳鄭子産獻㨗于晉晉人受之十月鄭伯如晉拜陳之功子西復伐陳陳及鄭平十有二月吳子遏伐楚門于巢卒遏即諸樊也巢南門也門于巢攻其門也如諸侯伐齊范鞅門于雍州綽門于東閭之類臣左氏傳吳子諸樊伐楚以報舟師之役門于巢巢牛曰吳王勇而輕去聲若啓之将親門我獲射之必殪從之吳子門焉牛臣隠扵短牆而射之卒書吳子遏之名以其卒也射之不言滅何死而非獲也死而非獲則卒也二十有六年甲寅春王二月辛卯衞寗喜弑其君剽十四年衛寗殖孫林父出其君衎而立剽二十年寗殖疾召其子喜命之悔出其君令入之以掩其罪殖卒至二十五年衛侯衎入于夷儀使與寗喜言喜許之大叔文子曰寗子視君不如奕棊其何以免乎九世之卿族一舉而滅之可哀也哉二十六年衛侯衎使子鮮為復子鮮辭懼君無信初公與寗喜言喜曰必子鮮在不然必敗故敬姒強命子鮮以公命與寗喜言曰苟反政由寗氏祭則寡人扵是寗喜攻孫氏克之遂殺子叔即剽也及大子角寗喜受父殖遺命使納衎以免逐君之名然扵衎則殖出之喜納之扵剽則殖君之喜弑之剽雖以公孫非次而立然寗氏父子君之久矣君臣之分已定而輒弑之故聖筆特正其弑君之罪而書之以示天下後世殖欲免逐君之罪而俾其子䧟弑君之惡而已亦與焉何其謬也經書辛卯弑剽而甲午衎復歸見衎待弑而歸也不言衎弑而言喜弑何也喜弑而衎歸弑君之罪喜専之也衞孫林父入于戚以叛經書叛始此曰左氏傳孫林父以戚如晉書入于戚以叛罪孫氏也杜氏注衎雖未居位林父専邑背國猶為叛也初衛獻公之奔齊也甯殖孫林父逐之寗喜弑剽以納獻公故林父懼而入于戚以叛甲午衛侯衎復歸于衛衛侯奔齊入夷儀皆不名此復歸而名之何耶衎之出奔不可謂無罪不名之者惡逐君之臣也今復歸而名之正其失國之罪也亦惡衎使甯喜弑君而納已也肆姦謀以濟大惡雖得歸不以正也凡言歸易辭言入難辭今歸之易寗喜公子鱄納之也故剽弑甫四日而即歸也夏晉侯使荀吳来聘公㑹晉人鄭良霄宋人曹人于澶淵左氏傳衛人侵戚東鄙孫林父以戚邑叛故衛侵之孫氏愬于晉林父叛衛附晉故衛侵則徃愬之晉戍茅氏茅氏戚東鄙晉兵戍守之殖綽伐茅氏綽本晉人今在衛為衛伐茅氏殺晉戍三百人復愬于晉晉為孫氏故召諸侯将以討衛也夏中行穆子即荀吳也来聘召公也召魯公㑹也六月公會晉趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田取衛西鄙懿氏六十戚城西北王十里有懿城晉取其田六十井以與孫氏以澶淵衛地又近戚田登林父逐衛侯衎衎復歸林父戚如晉晉為盟主而叛人乃率諸侯疆衛田以與孫氏非正也公畏晉徃會與諸大夫敵可恥也趙武貶稱人出良霄志其為大夫也扵宋曹復稱人焉是㑹也晉平之謬舉冝其自此而不競也秋宋公殺世子痤左氏傳初宋芮司徒生女子赤而毛棄諸堤下共姫宋伯姬之妾取以入名之曰棄長而美平公入夕平公共姬子也見棄也而視之尤姬納諸御嬖生佐即宋元公惡而婉大子痤美而狠合左師向戌也畏而惡之寺人恵牆氏伊戾名為大子内師而無寵秋楚客聘于晉過宋大子知之請野享之公使徃伊戾請從之公曰夫不惡女乎夫謂大子對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有貳心乎縱有共其外莫共其内臣請徃也遣之至則欿音坎用牲加書徴之詐極地作坎用牲加盟為大子反㣲驗而騁告公曰大子将為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚大子大子曰佐也能免我以佐婉順召而使請曰日中不来吾知死矣左師聞之聒而與之語大聒讙也欲使失期而大子自裁過期乃縊而死佐為子公徐聞其無罪也乃亨伊戾公殺世子母弟直書君者甚之也不省氏無惡眀矣宋輕信伊戾之䜛而殺其子以無罪父子之道絶矣寺人之譛而獨甚宋公者盖以其内有嬖妾配嫡外有小人結内援以為之助公之不眀故有以蠱惑之也經直書君者端本正源也晉人執衛寗喜初衛孫林父寗殖逐其君衎而立剽寗殖疾而悔之謂其子喜令復衎喜弑剽納衎林父懼入于所食戚邑以叛如晉而以戚屬晉晉扵是為㑹諸侯伐衛疆衛田以與林父乃執寗喜若以其弑而執之正也經書晉人不得為伯討者執之不以罪也晉人執之曰爾曷為納君而伐孫氏盖為孫氏執之也非伯討也又執衛侯執之不以罪眀已也已而衛侯納姫以免晉平之失政可知八月壬午許男寗卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公初許靈公如楚請伐鄭十六年鄭伯獨㑹諸大夫伐許故許男恚欲報之曰師不興孤不歸矣八月卒于楚楚子曰不伐鄭何以求諸侯扵是楚子率陳蔡伐鄭歸而葬許靈公二十有七年乙卯春齊侯使慶封来聘景公即位通嗣君也左氏傳齊慶封来聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相䑕亦不知也夏叔孫豹會晉趙武楚屈建蔡公孫歸生衞石惡陳孔奐鄭良霄許人曹人于宋晉楚始同主夏盟也諸侯分為晉楚之從而交相見扵是始則是南北二伯也天下之大變扵溴梁而無君臣之分扵宋而無夷夏之辨昭定哀之春秋将以終扵吳越焉爾矣晉案傳宋向戍善扵趙文子又善扵楚令尹子木故會楚以求弭諸侯之兵欲獲息民之名晉楚齊秦皆許之告扵小國為㑹扵宋子木謂向戍請晉楚之從交相見使諸侯從晉楚者交相朝見也釋齊秦他國請相見也經所以不書齊秦既會楚人𠂻甲将盟又争先乃先楚楚實主是盟而經先晉盖宋之盟中國無伯矣經猶先晉存中國也宋公不書見以國與地者其君必與兵不可瀆亦不可弭如刑罰之不得已也已之則天下不可為矣故向戍請賞子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文徳也聖人以興亂人以廢廢興存亡昬眀之術皆兵之由也而子求去之不亦誣乎以誣道蔽欺也諸侯罪莫大焉詳味子罕之論當矣故雖曰弭兵不足貴也自宋之㑹晉伯已衰諸侯日微天下之政中國之事皆大夫専之矣衞殺其大夫寗喜衛侯衎復歸寗喜納之也初公與喜言政由寗氏既歸而惡其専也殺之則為不義喜有弑剽之罪而不以討賊之辭書之而稱國以殺仍不去官者殺之不以其罪也衞侯之弟鱄出奔晉初衛侯欲返國使公鱄與寗喜要言焉既歸而殺喜鱄曰逐我者出謂林父納我者死謂喜君失其信而國無刑不亦難乎且鱄實使之遂出奔晉病其失言也經書衛侯之弟罪衛侯也言鱄可以稱弟而公不能弟之而使出奔也鱄之去是也可謂見其幾矣不使其兄有殺弟之惡全身去國近乎智織絇不仕近乎亷故經扵鱄無貶辭也秋七月辛巳豹及諸侯之大夫盟于宋豹在會已稱氏故在盟止書名一事而再見者卒名之前目後凡也地于宋以宋為主也溴梁之㑹已序諸侯矣不必言諸侯之大夫故云戊寅大夫盟此固省文法也亦以見事之信在大夫也至此諸侯不在會而獨大夫會于宋故書豹及諸侯之大夫盟既大夫獨㑹不可不言諸侯也經特書二事罪大夫専國之威權在大夫而不在君也傳曰楚衷甲趙氏云且大㑹諸侯弭兵為事豈有便行掩襲之事且子木賢大夫必不爾也傳又云先楚人案當時晉强於楚又是中國盟主豈有後扵楚之理冬十有二月乙卯朔日有食之二十有八年丙辰春無冰桓十四年成元年及此二十八年書無氷凡三古者日在北陸而藏氷西陸朝覿而出之食肉之祿氷皆與焉大夫命婦䘮祭用氷去年冬温無氷可藏至春無氷可出因以紀異也夏衞石惡出奔晉左氏傳衛人討寗氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀杜氏曰惡之先石碏有大功扵衛惡之罪不及不祀邾子来朝左氏傳邾悼公来朝也時事也修時事扵魯秋八月大雩左氏傳旱也仲孫羯如晉左氏傳孟孝伯即仲孫羯如晉告将為宋之盟故如楚也魯屬晉故告晉将為盟故徃朝于楚冬齊慶封来奔二十七年崔杼子崔成崔彊作亂崔杼出遂見慶封慶封使盧蒲嫳帥甲攻崔氏殺成與彊盡俘其家崔杼之妻縊崔杼至則無歸矣乃縊慶封當國二十八年慶封好田而嗜酒與慶舎政與盧蒲嫳易内而飲酒反盧蒲癸避崔氏難出奔者癸臣子之即慶舎有寵言王何而反之亦莊公黨出奔二人皆嬖冬十月慶封田于莱十一月乙亥甞于太公之廟慶舎涖事盧蒲癸刺子之王何以戈擊之死慶封歸伐西門弗克還伐北門克之入伐内宫弗克反陳反陳師于嶽請戰弗許遂来奔齊人来讓奔吳吳勾餘與之朱方富於其舊也慶封崔杼之黨専恣荒滛稔禍而出奔書名罪之自魯奔吳不書以絶位不為卿也十有一月公如楚左氏傳為宋之盟故公及陳侯鄭伯許男如楚諸侯之君旅見扵楚始扵此經書魯以見其餘也夏晉平不競不能主夏盟宋之會晉楚列諸侯上無夷之分伯業由是而衰不足以庇諸侯矣前此公如晉如齊與戎㑹盟春秋尚譏其非正今公偕宋鄭陳許逺朝强夷聖筆書之非特惡公盖傷夷狄日熾中國日微矣十有二月甲寅天王崩靈王也乙未楚子昭卒胡氏曰甲寅天王崩乙未楚子昭卒相距四十二日則閏月之驗也然不以閏書見䘮服之不數閏也天王崩魯不㑹葬楚子昭卒公在楚楚使公親禭世變至此惟知有强弱勢力安知有君臣也二十有九年丁巳春王正月公在楚左氏傳公在楚楚人使公親禭夏四月葬楚康王公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓公還及方城季武子取卞取卞邑以自益使公冶問璽書追與之曰聞守卞者将叛臣帥徒以討之既得之矣敢告公曰欲之而言叛祗見疏也適以見疏扵我公謂公冶曰吾可以入乎對曰君實有國誰敢違君欲無入榮成伯賦式微乃歸公甞如齊如晉矣未甞書在某所此如楚而又詳書在楚以公之居夷狄而失所如也内則季氏強僣不有其君是以書公在疑於無公也夏五月公至自楚至公者殆其徃而幸其反也庚午衛侯衎卒衛侯復歸纔三年而卒不逃右宰榖之先見也子襄公立閽弑吳子餘祭左氏傳吳子伐越獲俘焉以為閽使守舟吳子餘祭觀舟以刀弑之禮君不近刑人不邇怨呉子疏於防慎以速斯禍經特書之以為後世人君慮患之鑒吳子使札来聘吳始聘亦止此一聘耳子吳子夷昧也札吳公子季子札也季之賢何書法與楚子使椒秦伯使術一例盖札辭國而生亂因其来聘以示貶也吳子夀夢有子四長曰諸樊次餘祭次夷昧次季札也夀夢欲立札札辭去諸樊約諸弟以次𫝊必致國扵札札又辭乃立夷昧之子僚諸樊之子光曰我冝立使専諸刺僚卒稔簒國之禍誰為之耶是知聖人不以為賢而貶之也若季子者辭位守節則可矣㮣諸聖人時中之道則過矣秋七月葬衞獻公齊髙止出奔北燕杜氏注髙止髙厚之子北燕燕國薊縣此南燕見桓十二年註北燕召公奭之後姬姓之國至始見扵經左氏傳齊公孫蠆公孫竈放其大夫髙止扵北燕乙未出書曰出奔辠髙止也髙止好以事自為功且専故難及之襄陵許氏曰案傳子尾子雅實放髙止而經書出奔君子以為大夫而放于君也可也臣放大夫是無君也不可以訓故以出奔書冬仲孫羯如晉左氏傳孟孝伯即羯如晉報范叔即范獻子士鞅也也三十年戊午春王正月楚子使薳為上聲罷音皮来聘左氏傳楚子使薳罷来聘通嗣君也郏敖即位國楚聘凡三至此郏敖書楚子薳罷書名氏無異扵中矣張氏曰魯以君朝而楚以使聘此齊桓晉文所以行乎列國者故自宋之盟内外不辨楚人行伯主之禮扵中國非晉平趙武之責而誰責哉夏四月蔡世子般弑其君固左氏傳蔡景侯為大子般娶于楚通焉大子弑景侯之稱世子以眀有父之親稱君以眀有君之尊世子般扵君尊親盡矣固雖無道而罪不及民故稱世子所以甚般之惡也五月甲午宋災宋伯姬卒榖梁傳取卒之日加之災上者見以災卒也伯姬之舎失火左右曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不下堂遂逮乎火而死婦人以貞為行也伯姬之婦道盡矣詳其事賢伯姬也季伯姬之守禮義寜死而不顧其生其志節貞且烈矣世衰微罕能盡婦道者故春秋賢伯姬特書以表之也天王殺其弟佞夫王子瑕奔晉傳曰殺世子母弟直稱君甚之也靈王崩儋括欲立王子佞夫佞夫不知景王殺之非其罪也書曰殺其弟佞夫曰天王而稱弟甚其賊親親之恩忘天倫之愛也欲案傳周五大夫尹言多劉毅單蔑甘過鞏成以儋括立佞夫遂殺之儋括謀亂而免佞夫不知而死甚矣天王之不眀矣雖五臣殺之猶王殺之也為天子而不能庇一弟故書以惡之范氏曰王子瑕不言出周無外書賤瑕廖同奔不之也秋七月叔弓如宋葬宋共姬叔弓叔老子也共姬從夫諡也内女不書卒嫁扵諸侯則書之既錄其卒何得不錄其葬乎唯所貶則不書葬耳外夫人不書葬宋共姬稱謚而葬以其賢也莊四年齊侯葬紀伯姬三十年葬紀叔姫皆錄其徳厲婦道垂世訓也連年襄王景王崩魯公不親會葬止令卿徃非禮也今鄰國一婦人葬亦使卿徃雖曰隠之則過矣鄭良霄出奔許自許入于鄭鄭人殺良霄案左傳鄭伯有使公孫黒如楚辭伯有强使之子晳怒將伐伯有氏大夫和之十二月鄭大夫盟于伯有氏伯有嗜酒侈汰又將使子晳如楚子晳乗其醉以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許未幾伯有襲鄭因馬師頡介于襄庫以伐舊北門駟帶帥國人以伐之伯有死扵羊肆夫不言復入出未久位未絶也不言殺其大夫非其大也書鄭人殺良霄討賊之辭也冬十月葬蔡景公春秋之法君遇弑而賊未討則不書葬此特書變例也蔡景公雖滛亂君父也而世子般弑之諸侯不以為賊而討之乃徃會其葬竊意諸侯必潜受其賂故情義如此其篤世變人心至此而天理絶滅矣聖筆特變例而書葬以徧罪天下之諸侯也晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故宋以五月失火諸侯以冬十月㑹于澶淵方議恤之謀歸宋財既而亦無歸救災固如是乎上書蔡景侯葬下書諸大夫㑹為宋災故竊詳聖人之意比事而觀之可見矣弑􅊇大事曽不致討而反葬之恤災小事而會諸大夫何舎大而圖小也故諸國之卿貶而人之而諱魯卿又書其故其貶之也至矣三十有一年己未春王正月夏六月辛巳公薨于楚宫左氏傳公作楚宫六月辛巳公薨于楚宫杜氏注公適楚好其宫歸而作之不居先君之路寝而安其所樂失其所也公自楚歸作楚宫盖慕恱逺夷之室宇侈麗不度倣象而作之以居未久死是宫變夏從夷非正也秋七月癸巳子野卒左氏傳立胡女敬歸之子子野胡歸姓國敬歸襄公妾子野敬歸所生也次于季氏次舎也秋九月癸巳卒毁也因哀毁滅性經書七月夏正也左氏以夏十一月作周正月故書九月立敬歸之娣齊歸之子公子禂是為昭公穆叔不欲武子不聽立之子野襄公大子未踰年之君也名公未葬也不薨不地降成君也不書葬未成君也己亥仲孫羯卒左氏傳孟孝伯卒冬十月滕子来會葬諸侯来會葬扵是始癸酉葬我君襄公左氏傳冬十月滕成公来㑹葬惰而多涕子服恵伯曰滕君将死矣怠扵其位而哀已甚兆扵死所矣能無從乎能無從之而死乎為昭三年滕子卒𫝊癸酉葬襄公襄陵許氏曰子太叔曰先王之制諸侯之䘮士弔大夫送滕子會葬非禮也景氏曰當時諸侯不會葬天子而諸侯相㑹葬焉王室弱而公室强也十有一月莒人弑其君密州左氏傳莒犂比比平聲犂比莒子之號生去疾及展輿犂比二子既立展輿又廢之犂比公虐國人患之十一月展輿因國人以攻莒子弑之乃立去疾奔齊齊出也展輿吳出也陸氏辨疑曰據傳則展輿弑其父不當不書恐傳是展輿因國人之攻莒子弑之乃立誤以之為以字讀春秋編卷九
