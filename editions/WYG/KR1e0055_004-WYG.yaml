  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0055_WYG_004-1a, image: WYG0158/WYG0158-0550a.png}
body:
  text: 讀春秋編卷四宋陳深撰閔公名啓方莊公庶子母叔姜史記名開諡法在國遭難曰閔元年庚申春王正月案左氏去冬立閔公杜氏注於是年八嵗母叔姜哀姜之姊亦齊女故哀姜與慶父利其㓜而立焉不書即位内不承國於先君上不請命於天子故不書即位正人道之大倫也齊人救郉穀梁傳善救郉也胡氏曰凡書救未有不善之也左氏傳狄伐邢管仲請桓公救邢於是興救邢之師故春秋特書以與之其稱人將卑師少也夏六月辛酉葬我君莊公左氏傳亂故是以緩凡十一月乃葬秋八月公及齊侯盟于落姑落姑齊地侯左氏傳請復季友也齊許之使召諸陳公次于郎以待之以時閔公㓜弱國人思得季子靖難也季子來歸公羊傳其稱季子何賢也其言來歸何喜之也陸氏微旨曰季友之出不書何也慶父之難季子力不能正違而去之權也君立見召而來義故也聖人善其歸不譏其去以明變而得力進退不違道也能季子之賢内得於國人外聞於諸侯當時魯國大臣奉閔公盟覇主請復季子不為無所見借重於齊則慶父有所憚而不敢圖之季子亦有所倚而可以歸矣冬齊仲孫來趙伯循曰非致成命也故不言使非專命故但曰來左氏傳齊仲孫湫子小切仲孫名來省難蓋仲孫智謀之士使之來覘魯之虚實而以省難為辭其志蓋有在也非盟非聘故但書曰來而已字之者命大夫也齊桓坐視魯亂不修覇主之義以討簒弑之賊仲孫之來何補於魯致使慶父覬望非分之心不已而又再弑魯君何取其能覇也二年辛酉春王正月齊人遷陽陽國名漢志東海郡陽都縣蓋齊人偪徙之移其國於國中而為附庸齊桓為盟主將以治諸侯之不守王法者而乃以强力陵暴小國刼而遷之何以令諸侯哉故書人以貶之也夏五月乙酉吉禘于莊公趙伯循曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也成王以周公有大勲勞賜魯重祭故得禘於周公之廟以文王為所自出之帝而周公配之然非禮矣孔子曰魯之郊禘非禮也周公其衰矣故禘雖先王之所賜而止可用於周公之廟不可施於羣公禘言吉者喪禮二十五月而祥又兩月而禫然後以吉祭易喪祭今莊公之薨至此纔二十二月喪未三年主未遷祔而以吉禮盛樂行之何太早也于莊公者方杞于寢非宫廟也尤為非禮聖筆特書吉禘二字見僭禮之中又重失禮焉其貶之也至矣秋八月辛丑公薨左氏傳初公傅奪卜齮音蟻魯大夫田公弗禁共仲使卜齮賊公于武闈宫中小門成季以僖公適邾實弑而書薨諱之也書薨以示臣子之至情不地以存見弑之實凡君終必書其所獨至於見弑則没而無所其情厚矣其事亦白矣非聖人能修之乎繼此書夫人姜氏孫于邾公子慶父出奔莒則慶父弑夫人與焉明矣杜氏所謂微而顯者是也九月夫人姜氏孫于邾文姜殺其夫哀姜殺其子罪有輕重故文不得一稱孫者與聞乎故也公子慶父出奔莒左氏傳成季以僖公閔公庶兄適邾共仲奔莒乃入立之成季以僖公入魯立之以賂求共仲于莒莒人歸之及宻使公子魚奚斯也請不許哭而往共仲曰奚斯之聲也乃縊慶父與哀姜謀弑閔公欲自立而不遂蓋國人不與疾之者衆又聞齊桓使髙子將南陽之甲將至於是夫人與慶父懐懼而出奔季子既立僖公緩追逸賊既而以賂求慶父于莒莒人歸之慶父彷徨無所自容不許其入蓋慶父之罪雖重季子以親親之恩故聽其自裁卒不能致辟於甸人以致其兩弑其君之討仍存孟氏之族與叔牙同無復輕重之别豈非邦憲之失故經不書討賊而閔不書葬也冬齊髙子來盟髙子齊大夫髙徯也公羊傳不名喜之也何喜爾正我也魯比三君死曠年無君桓公使髙子將南陽之甲立僖公而城魯或曰自鹿門魯南城東門也至爭門者是也或曰自爭門至吏門者是也魯人至今以為美談曰猶望髙子也久濶思相見引此為喻齊侯使髙子來視魯而未定盟髙子至則平魯難定僖公盟以安魯之心所謂寧魯而親之者春秋予其奉使知權故特稱髙子以美之不稱使者髙子之來有取魯平魯之命初無一定繼絶之計在髙子為之故不曰齊侯使之也十有二月狄入衞衞自宣公上烝夷姜下納宣姜惠公庶兄公子頑又烝宣姜生齊子戴公文公宋桓夫人許穆夫人滛亂之極人類無以異于禽獸天理滅矣至懿公失政狄入衛懿公及狄人戰于熒澤而敗死焉此滛亂之禍必至滅亡也宋桓公迎衞之遺民渡河西南立戴公申于漕是年卒立其弟燬是為文公於是齊桓合諸侯以城楚丘而遷衛焉齊雖使衞之忘亡而不能為之救患于危急之際聖筆書之亦所以罪衛而病齊也鄭棄其師狄入衞衞在河北鄭在河南恐其渡河侵鄭故鄭文公使髙克將兵於河上禦之然文公本惡髙克而不能逺使之將兵禦狄久而不召衆散而歸髙克奔陳故公子素以為危國亡師之本作清人詩以刺之經書鄭棄其師言鄭自棄之爾所以罪鄭伯也讀春秋編卷四
