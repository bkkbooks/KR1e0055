body:
  text: 讀春秋編春秋類提要臣等謹按讀春秋編十二卷宋陳深撰深字子㣲平江人嘗題所居曰清全齋因以為號朱彜尊經義考載盧態蘇州志稱深生于宋宋亡篤志古學閉門著書天厯間奎章閣臣以能書薦潛匿不出考鄭元祐僑呉集有深次子植墓誌據其所稱植以至正二十二年卒年七十則植生于至元三十年癸巳又自稱長於植一年少于深三十餘年則深之生當在開慶景定間宋亡之時僅及弱冠故至天厯間尚存也所著有讀易編讀詩編今並未見惟此書僅存其説大抵以胡氏為宗而兼採左氏葢左氏身為魯史言必有據非公羊榖梁傳聞疑似者比自宋人喜以空言説春秋遂併其事實而疑之幾于束諸高閣深所推闡雖别無新異之見而獨能考據事實不為虚憍恃氣廢傳求經之髙論可謂篤實君子未可以平近忽之矣乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:592a50758e1980e4b1f5205625a231e2ab16df728f21762ccd82efe5dfc5d3da
