body:
  text: 讀春秋編卷二宋陳深撰桓公名軌惠公之子隱公之弟母仲子史記亦名允弑兄自立諡法辟土服逺曰桓元年庚午春王正月公即位聖筆直書此九字其意蓋曰天道之春王之正月而令弑逆者即位讀之顯然意不在言外程子所謂以天道王法正其罪也桓雖不天無王而天理未嘗亡故元年春書王言弑君者能免於王法之誅乎二年復書王猶有望於王誅而討賊也三年以後俱不書王見天下之不復有王也至十年則又書王十者數之極示天道當還也十一年復不書王見王道之絶也十八年書王者桓公之終也見王法雖不誅而天道之報終不可免嗚呼聖人書王之㫖深矣榖梁傳元年有王所以治桓也公羊傳其言即位何如其意也桓欲得位之急惟恐隱公忘遜位故甘心為弑逆之惡春秋從其事實而書即位所以著其惡也榖梁傳繼故不言即位正也故謂弑也繼故不言即位之為正何也曰先君不以其道終則子弟不忍即位繼故而言即位則與聞乎弑也范氏曰與弑尚然况親弑也胡氏曰書即位著其弑隱自立之罪深絶之也三月公㑹鄭伯于垂㑹者鄭之志謂由彼以致我也鄭以祊求易許祊入而未與許也鄭聞桓簒立遂乗此機以求許田公内懼諸侯之討亦欲脩好故從鄭之請而為垂之㑹鄭莊志在易地而首與弑逆者㑹故書公㑹鄭伯言由鄭之志所以貶鄭也杜氏注垂犬邱衛地鄭伯以璧假許田榖梁傳非假而曰假諱易地也二國之地皆先王所錫先祖所受不得私相貿易言假者諱國惡禮也鄭恐魯為未足而又加之以璧經書假言若暫借不敢言得之也夏四月丁未公及鄭伯盟于越杜氏注越近垂地名左氏傳結祊成也鄭終易二田然後結盟穀梁傳及者内為志焉爾程氏傳弑君之人凡民㒺不懟而鄭與之盟以定之其罪大矣鄭貪而未中所謀乗機欲得許田以滿其志故首為垂之㑹桓簒而方懼于中傾心欲結鄭好以固其援故勇為越之盟秋大水大非常也杜氏注書災也傳例曰凡平原出水曰大水穀梁傳髙下有水災曰大水天降隂沴魯桓惡逆之氣所召也冬十月穀梁傳無事焉何以書不遺時也春秋編年四時具而後為年二年辛未春王正月戊申宋督弑其君與夷及其大夫孔父桓無王元年書王以正其罪二年復書王猶望王誅討之也亦因以正華督之罪初宋宣公舍己子與夷而立弟穆公和和疾召大司馬孔父而屬與夷使公子馮出居于鄭穆公卒而立與夷與夷以馮居鄭在位十年凡十一戰鄭宋屢相侵伐以貽兵禍遂致簒逆皆宣穆自為之也華督蓋馮之黨將弑與夷而憚孔父故先攻殺孔父而弑殤公遂召馮而立焉忌先殺孔父而後弑君蓋孔父正色而立於朝為賊所而先翦之是君累及之也故聖筆先書弑君而及其大夫不失其官是春秋之所賢也滕子來朝桓公之世諸侯朝者七始于此滕侯爵也首朝弑逆之人故降稱子是滅天理廢人倫故貶之也此春秋正典刑之大㫖三月公㑹齊侯陳侯鄭伯于稷以成宋亂魯桓弑隱未久内懼諸侯之討方結鄭以自固而宋有華督之禍魯桓自蹈其罪同其大惡固不敢正人之罪乃因而為㑹三國相與受賂使三國恱已遂立公子馮而使督相之以成宋亂吁人心至此唯利是趨天理絶滅殆盡不復知有人倫矣成者始卒不虧之辭始焉弑逆者懐誅討之懼終焉諸侯受賂立之而還所以成宋亂也自此弑逆之徒得以肆其志亦何所憚而不為乎王者天討有罪之刑絶矣此天理所不容聖人所深惡故春秋直書成亂以貶四國夏四月取郜大音泰下同鼎于宋戊申納于大廟此聖筆直書魯受宋賂章其罪也繼之曰納于大廟章亦甚焉郜鼎杜氏註郜國所造器也濟隂城武縣東南有北郜城郜大鼎宋致賂也不謂之受而謂之取春秋之法凡言取非所當取也取非其有盜也傳例曰納者内不受也大廟周公之廟也納此成亂之賂器于大廟周公其享之乎故書納納者弗受而强致也秋七月紀侯來朝紀公榖作紀左氏作杞程氏傳凡紀稱侯者皆當為紀杞爵非侯文誤也及紀侯大去其國之後杞不復稱侯矣胡氏曰紀侯來朝何獨無貶乎當是時齊欲滅紀紀侯求魯為之主非為桓立而朝之也滕或曰杞夏王之後本公爵今降稱侯與本侯而書子同意蔡桓侯鄭莊伯㑹于鄧九月入杞外㑹而公不與故先書二國君而後言㑹于某地與書公㑹某侯某伯不同也鄧小國不稱地而舉國以書夫以三國之君為此㑹似乎講禮以通好無何而遂入杞入人之國王法所當誅罪之大者書此以著三國之惡詳聖人所書之文辭相屬而意不斷三國之㑹為謀杞也故九月入杞左氏以㑹于鄧始懼楚也以是年楚始僭王故附㑹其說以九月入杞為魯討杞是微者不書主名何不詳所書之㫖連上不容贅故不書主名也公及戎盟于唐公至自唐隐公元年嘗與戎盟及是又與之盟修舊好也桓弑逆而懼人之討汲汲乎與戎盟以自固書之以示貶也元年㑹鄭盟鄭二年與鄭齊陳㑹皆不書至今盟戎而還書至危之也十十二公之中君行一百七十有六而書至八二不書至者九十有四三年壬申春正月公㑹齊侯于嬴桓弑君而立三年矣經是年始不書王桓之弑已久方伯若㒺聞知天子不加之罪魯之臣子事讎而不知恥俾弑逆者得以自恣天理滅矣自此以後不書王至十年見魯桓無王天王之失政刑也自左傳㑹于嬴始書成昬于齊也杜氏曰公不由媒介與齊侯㑹而成昬非禮也嬴齊邑今泰山嬴縣所謂嬴博之間蓋齊之東南邑齊致公而往㑹之是㑹之意出於齊既㑹而及秋遂使公子翬如齊逆女乃知嬴之㑹謀昬也魯桓弑逆而齊與之㑹而為昬聖筆書此以貶齊也夏齊侯衞侯胥命于蒲杜氏注蒲衞地在陳留長垣縣西南公羊傳胥命相命也古者不盟結言而退穀梁傳相命而信諭謹言而退以是為近古也范氏曰申約言以相達不歃血而誓盟也荀卿曰春秋善胥命而詩非屢盟然不請命而私相命亦非正也已上本三傳而釋之也愚嘗反覆聖師之㫖二侯相期于蒲不言盟㑹而書曰胥命未必不闗天下之故而特書之蓋當是時周室既微荆楚僭王齊衛為列國之望齊太公之後東州之侯也衛康叔之後北州之侯也遂起而圖伯欲收天下之權歸已乃為蒲之㑹而私相命故春秋謹而書之以志二國擅命謀伯之始也六月公㑹紀侯于郕左氏穀梁作杞今從公羊作紀見二年註郕杜氏注東平剛父縣有郕鄉今單州任城縣也紀與魯親而畏齊鄭之强故二年來朝結援于魯至是公與之㑹也秋七月壬辰朔日有食之既既盡也何氏曰光明滅盡也程氏傳食盡為異大也胡氏傳日者衆陽之宗人君之象而有食之既則其為變大矣張氏曰先儒以為是後荆楚僭號鄭伯拒王師射王中肩故太陽之食既公子翬如齊逆女為君逆也翬為桓弑隱桓信任之使之逆女故稱公子見桓之黨也於隠之世則去公子稱名以其隠之賊也諸侯使卿逆夫人至所館則親迎禮也翬雖尊屬當官而行亦無嫌也九月齊侯送姜氏于讙公㑹齊侯于讙禮送女父不下堂母不出祭門諸父兄不出闕門齊僖愛其女乃越竟而送之非禮也魯桓不為親迎而出聞齊侯在讙特往㑹之僖之送桓之㑹皆非所以重大昬而正人倫之始也故春秋書以譏之夫人姜氏至自齊程氏傳告于廟也張氏曰不言翬之以夫人至者公已受姜氏于讙也受之齊侯則姜氏既得見乎公矣孫氏曰公受姜氏于讙不以讙至也不與受姜氏于讙也故曰夫人姜氏至自齊以正其義春秋書之見㛰姻之際一違於禮則始之不正而終無以正身而正家也冬齊侯使其弟年來聘左氏傳致夫人也杜氏曰古者女出嫁隨加聘問存謙敬序殷勤也在魯而出則曰致女在他國而來則揔曰聘故傳以致夫人釋之稱弟義見隠七年齊侯聘魯使其弟來與隱七年來聘辭同而意不同蓋姜氏至魯之後其季父以齊侯之意來致聘問之好而存問姜氏既近人情而於禮無違此所以明七年之非禮也有年穀梁傳五穀皆熟為有年年春秋常事不書書有年紀異也春秋二百四十而書有年大有年者二而已其一即宣公是也桓宣大惡是行何道而致有年乎桓宣享國十有八年獨此二年書有年它年之歉可知也公羊傳此其曰有年僅有年也何以書恃有年也何氏曰恃賴也若桓公之行諸侯所當誅百姓所當叛而又元年大水二年減耗人民將去國喪無日賴五穀皆有百姓安土樂業故喜而書之所以見不肖之君為國尤危也四年癸酉春正月公狩于郎公羊傳狩田狩也冬曰狩何氏曰禽獸多則傷五穀因習兵事又不空設故因捕禽獸以共宗廟示不忘武備因以為田除害范氏曰春而言狩蓋用冬狩之禮蒐狩例時而此月者重公失禮也啖氏曰蒐狩合禮者常事不書非時及越禮而為之則示譏也趙氏曰四時之田其事各殊其名亦異春以閱武擇材故以蒐稱夏以為苗除害故苗為名秋則順天時以殺物故以獮為義冬則因狩禽獸以習戰故以狩為目左氏曰春蒐夏苗秋獮冬狩是也杜氏註郎非國内之狩地狩郎譏非其地也孔氏曰狩之地須有常若鄭原圃秦具囿是諸國之常處違其常則犯害民物故書地以譏之魯狩之常大野是也郎狩耀武也桓公不義得國恐四鄰謀已故大閱狩郎即境上邑夏天王使宰渠伯糾來聘天王桓王也宰天子之冢宰也渠氏伯爵也糾名也王朝公卿書爵大夫書字上士中士書名下士書人例也糾位六卿之長而名之以示貶也桓内弑其君外成人之亂簒立四年未嘗請命于周其罪不容誅矣天王既不能討而反使其宰聘之寵逆亂而瀆三綱天理滅矣見周王之不王也糾為太宰論刑賞之法以詔王者也乃首承命以聘弑逆之賊見宰之非宰也春秋二百四十年必具四時以成一嵗之功今年不書秋冬非闕文也蓋示王政之失不能天討有罪猶天道有春夏之生長無秋冬之肅殺安能成嵗功也五年甲戌春正月甲戌陸淳曰此下文脫己丑陳侯鮑卒左氏傳陳侯鮑卒於是陳亂文公子佗殺大子免音問而代之夏齊侯鄭伯如紀外相朝曰如如者朝辭也齊鄭大國紀小國大不朝乎小齊鄭懷詐謀偽朝于紀實欲襲之紀人覺之其計遂阻吁齊僖鄭莊之心抑何險耶春秋不正其為詐使若誠朝然疾之也外相如不書此何以書紀與魯親恃魯為援故來告其事魯史書之於䇿夫子存之以著二國之罪此後齊遷紀三邑使紀侯大去其國至於滅紀而後已魯與紀雖親莫敢主之原齊之濳懐不義蓋萌於如紀之日春秋書之誅其意也天王使仍叔之子來聘仍國叔字周大夫也嘗作雲漢之詩羙宣王大雅之舊人也仍叔之子者必幼弱而未冠也古之仕者有世禄無世官周衰官人以世故卿大夫之子以幼弱任事故仍叔之子受命來聘是可譏也天王連年洊聘簒立之魯桓何也其失甚矣書之所以交譏之也葬陳桓公城祝丘泰山孫氏曰祝邱魯地杜氏曰齊鄭將襲紀故范氏曰譏公不脩徳政恃城以安民非齊鄭有窺紀之心魯與紀親故城祝邱為之備時役民以妨農書之以示貶也秋蔡人衞人陳人從王伐鄭王奪鄭伯政鄭伯不朝王以蔡人衞人陳人伐鄭書稱人以見微者爾夫以萬乗親臨矢石之閒三國偃然不以身從安知不畏鄭不得已而遣微者將兵以備數耳及其戰也鄭一鼔而蔡衛陳皆奔以致王卒之亂鄭師合而攻之王卒大敗以是知三國之兵非精銳而使疲弱者行故不戰而奔三國不能無罪不書王以蔡人衛人陳人伐鄭而書蔡人衛人陳人從王伐鄭蓋譏王之失亦以著三國之罪王不稱天謂非天討也當時諸侯不朝王者何獨鄭國而王以小忿而親伐之諸侯三不朝則六師移之蓋命將以討之未嘗親行也今以三國不得已而行之兵輕舉以致大敗自此王命不行於天下東周之不競有以也夫公羊傳曰從王正也啖氏曰不言及臣從君之辭也陳氏曰春秋之法天子在則諸侯稱人諸侯在則大夫稱人王師不書書伐鄭鄭不服也鄭不服而王命於天下東周不競鄭荘為之也大雩雩祈雨之祭也左氏曰龍見而雩杜氏注龍見建已之月蒼龍宿之體角亢七宿昬見東方萬物始盛故祭天逺為百穀祈膏雨月雩嵗之常杞不書春秋凡雩二十二未有當建已之蓋勤民之祭未嘗先舉及旱而始祭乃遍舞山川百神之間故非其時則書譏其慢也公羊所謂旱祭也故雩而雨則書雩以見非禮且志旱也雩而不雨則不書雩而書旱以紀災也謂之大者雩于上帝用盛樂天子之祀也諸侯雩于境内之山川百神耳魯大雩非禮也書之所以譏其僭也螽公羊傳螽何以書記災也程氏傳螽蝗也既旱又蝗譏不在書也冬州公如曹左氏傳淳于公如曹度其國危遂不復杜氏注淳于州國所都城陽淳氏縣也孔氏曰稱公者或嘗為三公之官若虢公之屬也曹姬姓武王封弟叔振鐸於定陶為曹國漢屬濟隂縣在唐為曹州今興仁府濟隂縣穀梁傳外相如不書此何以書過我也范氏曰過我六年寔來是也將有其末故先録其本六年乙亥春寔來寔時力反國左氏傳自曹來朝書曰寔來不復其也胡氏傳寔州公名也程氏傳寔不稱州亡其國也踰泰山孫氏曰闕文也師氏曰挈上文而曰寔來不應時隔年而書寔來必闕文也夏四月公㑹紀侯于成左氏傳紀來諮謀齊難也成魯地在泰山鉅縣東南齊窺紀久矣嘗與鄭如紀紀知之今㑹公于成結援豫謀以防齊也秋八月壬午大閱閱簡練兵車也周制大司馬仲冬教大閱非特天子行之而諸侯亦有閱但大閱則不可大閱大蒐天子田也書之譏僭禮也先王寓軍政於四時之田簡車徒習武事惟農隙可行今此八月妨農踐稼失政甚矣書之譏不時也竊詳桓之此舉與四年狩郎同意蔡人殺陳佗魯莊二十二年左氏傳陳厲公蔡出也故蔡人殺五父而立之五父即佗也簒大子免而立踰年國人不以為君故不書爵蔡桓公欲立厲公躍雖以私殺之而春秋書之同於討賊之例陸淳曰臣弑其君凡在官者殺無赦子弑其父凡在官者殺無赦蔡雖它國以義殺之亦變之正也故書曰蔡人程氏傳書蔡人見殺賊者衆人之公也九月丁夘子同生世子生春秋不書子同生何以書惠公以無嫡子隱桓皆庶子隱長當立隱自以為庶以桓母仲子手文之異欲讓桓久不去位桓遂疑而弑今桓之生子特書以記之所以明有嫡而世子之位定矣公羊氏所謂喜有正也其諸以病桓與何氏曰明欲以正見無正疾惡桓也冬紀侯來朝左氏傳紀侯來朝請王命以求成于齊杜氏曰紀微弱不能自通于天子欲因公以請王命公告不能豈紀既與公㑹而又來朝懼齊以求援於桓桓自懷懼能為爾援失其所主矣冝乎無益而不能保其國也七年丙子春二月己亥焚咸丘杜氏曰焚大田也咸邱魯地髙平鉅野縣南有咸亭譏盡物故書後古者田獵三驅失前禽不竭澤而漁冬月昆蟲蟄然大田去莽翳以逐禽獸今仲春草木萌動昆蟲啓蟄魯桓焚林而田春秋書之譏淫獵也不咸邱邾婁之邑公穀皆以為火攻之也疾其暴虐而仁也焚邑之罪與焚國同火攻附庸故謹而日之劉氏以為非火田也夏穀伯綏來朝鄧侯吾離來朝穀杜氏注在南鄉筑陽縣北今屬襄陽府穀城縣鄧今之鄧州諸二國去魯甚逺而特來朝貶而名之何也春秋之法侯非失地則不名非死則不名今名之者蓋罪其朝乎逆亂而黨惡也桓弑而立尤兾有討之者及王使冢宰下聘絶望於王誅矣故四年不書秋冬見王之不復能用刑也穀鄧逺朝則諸侯無復可望者矣故七年亦不書秋冬見諸侯不復知有綱常矣程氏傳邾葛牟來朝何以書秋冬曰四年與此明其義也三國之來别立義也同時來朝而特書之特見之也八年丁丑春正月己卯烝春曰祠夏曰礿秋曰嘗冬曰烝此常祀也春秋不書周官大司馬烝以仲冬冬月萬物咸備之時烝聚以薦于宗廟禮所冝然也今春正月而烝書之以譏非時也故穀梁氏曰烝冬事也春興之志不時也天王使家父來聘魯桓簒立天王不討其罪而反數數使人聘之失政刑矣始聘書宰渠伯糾貶而名之也再聘不書名以仍叔之子童穉亦貶之也至此而又不名著其愈不知恥而不足譏矣胡氏謂名其宰於前其餘無責焉爾五家父杜氏註天子大夫家氏父字孔氏曰此年及十年上距幽王之卒七十五嵗而詩節南山及家父刺幽王古人字或累世同之雲漢詩序仍叔羙宣王桓五年仍叔之子來聘仍氏亦世字如趙氏世稱孟智氏世稱伯也夏五月丁丑烝穀梁傳烝冬事也春夏興之黷祀也志不敬也禮記曰祭不欲疏䟽則怠不欲數數則煩己卯之烝怠也丁丑之烝煩也其怠也不時其煩也非禮秋伐邾伐邾蓋微者故不言公吕氏曰不書名微者也其事不可得詳也然則何以書曰天子在上諸侯擅相侵伐君子以為無王也師氏曰春火攻邾邑咸丘今秋又伐邾已甚也冬十月雨雪十月冬之初霜訊始肅寒氣猶薄而未至栗烈故十月為陽月何遽雨雪見隂之暴也書之以紀異也有若以十月為周正則夏之八月此時安得雪此亦夏正之明騐也祭公來遂逆王后于紀祭國名采地也公爵也祭公天子之三公也穀梁傳其不言使焉何也不正以宗廟大事即謀于我故弗與使也一遂者始終相繼之辭其來謀於魯則一事其如紀則事合而言之則逆后爾蓋始終相繼一事而已公㛰禮不稱主人天子娶后當使同姓諸侯主其事祭來謀昬于魯俾魯主之禮也但不明以王命來故不書使若私來也當時想以魯伯姬適紀而有女魯必知其甥之賢否故不復命于王而遂如紀逆后曽不行㛰姻之五禮見王者不重妃匹逆天下之母若逆婢妾何以為天地宗廟社稷之主哉夫既以同姓諸侯主其事謀既定當復命于上然後天子使卿逆之父母之國諸卿逆之至於京師舍而止天子乃親迎以入始合乎禮也公羊曰女在國稱女此其稱王后何王者無外其辭成矣穀梁曰王者無外王命之則成矣九年戊寅春紀季姜歸于京師杜氏註季姜桓王后也季字姜姓也師氏曰逆曰王后臣子尊之之稱也歸曰季姜未見王但存其所自出不敢忘父母也祭公來魯不書天王使故此亦不書祭公逆王后紀季姜歸于京師而但書姓字若紀季之自行見禮之不備也京大師衆也天子之居也夏四月無事書時也凡書十三秋七月凡書十七冬曹伯使其世子射音亦又音夜姑來朝左氏傳曹大子來朝賔之以上卿杜氏註諸侯之適子未誓於天子而攝其君則皮帛繼子男故賔之以上卿當其國之上卿曹伯有疾使其子代已行朝禮於魯曹伯何汲汲於朝桓邪世子為國之本君病而使伉諸侯之禮而來朝以啓姦邪之窺伺曹伯之非也從曹伯之命世子之非也書以交譏之也離春秋多從同同之例射姑之朝桓當以滕子穀綏鄧吾之例推之則知其父子之悖人倫忘大計也十年己卯春王正月桓自三年無王至十年而復書數已極而理當復其常天道人事未有久而不變者也庚申曹伯終生卒舊史以其來告書之夫子因存而不去也夏五月葬曹桓公魯以曹伯雖病而特使其子來朝未幾來赴故徃㑹葬秋公㑹衞侯于桃丘弗遇杜氏註衞侯與公為㑹期中背公更與齊鄭故公獨往而不相遇也桃邱衞地濟北東阿縣東南有桃城穀梁傳弗者内辭也范氏曰倡㑹者衞魯至桃邱而衞不來故書弗遇以殺恥偕衞與魯期而中變蓋為齊鄭所挾至冬而齊鄭衛來戰冝其背信而不至也冬十有二月丙午齊侯衛侯鄭伯來戰于郎左氏傳齊衞鄭來戰于郎我有辭也初北戎病齊在六年諸侯救之鄭公子忽有功焉齊人餼諸侯使魯為其班魯以周班後鄭鄭人怒請師於齊齊人以衛師助之故不稱侵伐杜氏曰不稱侵伐而以戰為文明魯直諸侯由故言我有辭劉氏曰來戰于郎外為志乎戰也已孟子曰善戰者服上刑夫戰者仁人之所惡有不得而應者矣未有得已而先之者也特書曰來戰以甚彼之惡也魯桓之簒逆三國不能奉天討而反與之㑹盟今因小故以無辭伐有辭則罪在三國矣十有一年庚辰春正月齊人衞人鄭人盟于惡曹杜氏註惡曹地闕又齊衛鄭三國去冬興師無名為郎之戰已可罪也今盟以脩前好是過而不改為惡不悛故奪爵而人之以正其罪夏五月癸未鄭伯寤生卒鄭莊始不能制其弟之惡至於相殘又不能定忽之位而公子至於五争外雖倚齊之强不見翦滅於諸侯而内制於權臣之手卒貽後禍秋七月葬鄭莊公諸侯五月而葬三月而葬速九月宋人執鄭祭仲左氏傳鄭昭公之敗北戎也齊人將妻之昭公辭祭仲曰必取之君多内寵子無大援將不立三公子皆君也子突子壹子儀之母皆有寵弗從夏鄭莊公卒初祭封人仲足有寵於莊公莊公使為卿為公娶鄧曼生昭公故祭仲立之宋雍氏宋大夫女於鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公求賂焉祭仲與宋人盟以厲公歸而立之九月丁亥昭公奔衛己亥厲公立之祭仲鄭之相當國君新立而輕出為宋所執脅而與盟以突歸鄭此宋之不道徇私好利以亂鄭也故貶而人之突以庶子借勢挾權以奪嫡卒禍其宗突之不仁甚矣名之者以其本非有國由脅祭仲而立也是皆春秋之所深惡也仲之畏死不能立節隱忍與宋盟而歸大臣言不必信惟義所在背之何傷也又畏宋之伐而不敢遂使忽疑懼而奔及旬日而立突仲之不忠既不能負一國之重徒竊一時之權至於逐君而立庶以稔大禍焉用彼相也祭仲命大夫也字之非賢之也乃尊王命貴正卿待之厚所以責之深甚仲之罪也吁鄭莊之用心姦險矣春秋之初與齊為黨啓兵之端天下始多故伐人之國民不堪命及禦王師射王中肩其罪大矣身没未幾庶孽奪嫡兄弟相殘其禍㦧甚曽子曰出乎爾者反乎爾孟子曰殺人之子者人亦殺其子是皆鄭莊自殺之也惡積之報可不畏乎突歸于鄭鄭忽出奔衞突為宋所納故曰歸穀梁傳歸易辭也程氏曰突不稱公子不可以有國也忽國氏正也不能有其位故不稱爵忽果能君祭仲何敢冐然挾突而歸忽初聞仲之被宋執也已知突之在宋使忽有才略即與賢臣圖事内操兵柄易置仲之私人外交大國為援仲與突亦安敢歸之易若此縱容之歸亦安能為唯其不能君故仲蔑視之突則恃仲以無恐反俾忽疑懼而自奔也春秋凡未踰年之君出奔皆名之蓋以其未能為君也柔㑹宋公陳侯蔡叔盟于折之設反又市列反魯杜氏註折地闕東海曰地柔魯大夫未賜族蔡叔蔡大夫叔名也諸内大夫㑹諸侯出盟自此始柔以未命之大夫外盟侯其專若此故貶之禮樂自大夫出希不失矣東海曰諸侯母弟未命為大夫蔡叔許叔紀季是也公㑹宋公于夫音扶鍾杜氏註夫鍾郕地冬十有二月公㑹宋公于闞杜氏註闞魯地在東平須昌縣東南魯大夫柔與宋陳蔡盟未久公又屢與宋㑹屢盟而背數㑹而離亦何益焉書以譏之也十有二年辛巳春正月夏六月壬寅公㑹杞侯莒子于曲池杞公穀並作紀曲池公羊作毆虵杜氏註曲池魯地魯國汶陽縣北有曲水亭左氏傳盟于曲池平杞莒也隱四年莒伐杞取牟婁自是遂不平至曲池之㑹魯為平之方釋其憾秋七月丁亥公㑹宋公燕人盟于穀丘杜氏註燕人南燕大夫髙郵孫氏日北燕伯欵出奔齊又稱北燕則燕有二燕矣言北燕則亦有南燕也北燕限于山戎莊二十八年齊桓伐山戎之後始通于中國於此猶未通杜氏以燕為南燕是也八月壬辰陳侯躍卒陳厲公也不書葬者陳亂而不來告諸侯莫往㑹葬公㑹宋公于虚公羊作郯杜氏註虚宋地冬十有一月公㑹宋公于龜杜氏註龜宋地賂宋以立鄭厲公故多責於鄭鄭人不堪故不平公欲平之踰年而六㑹㑹而盟者二宋貪鄭賂而卒辭不與鄭平凡此屢盟數㑹皆不足以講信修睦徒爾紛亂卒致激怒用兵是可厭也故特屢書以譏之丙戌公㑹鄭伯盟于武父音甫陽杜氏註武父鄭地陳留濟縣東北有武父城魯欲平宋鄭屢與宋㑹宋辭平遂激公之怒㑹鄭盟于武父以謀宋也至十二月乃伐宋焉魯桓宋莊鄭厲皆簒國而立屢盟數㑹惟利是圖以肆其志志不得則興兵以交亂書之以紀其罪也丙戌衞侯晉卒師氏曰前武父之㑹既日矣而繼此書衞侯卒又日之一日而兩書蓋不如是不足以明衛侯之卒日也武父之㑹而卒日不相闗不可承上文故也冬十有二月及鄭師伐宋丁未戰于宋及謂公也及鄭師我先及之也不書公去爵以貶之也書鄭師不言鄭伯亦貶其不道而勞民也宋責賂於鄭魯為平之屢與之盟而復背故魯鄭聲其罪以伐之故書伐戰于宋者魯鄭與宋戰于宋之城下也交兵而勝負未分故但書曰戰十有三年壬午春二月公㑹紀侯鄭伯己巳及齊侯宋公衞侯燕人戰齊師宋師衛師燕師敗績㑹者紀為主主在紀侯故先書紀知紀弱而齊窺之久矣紀又魯之親宋去年為魯伐齊宋欲修怨故挾宋而又與衛燕同伐之期於必勝而取之紀依魯欲圖自存故求魯援而鄭又魯之與國鄭方怒宋責賂亦畏其修怨故三國合謀以禦之春秋於戰無不書地今不書地在紀近故也趙氏曰内兵以紀為主外兵以齊為主齊與三國之師伐紀欲滅之公與鄭救之而勝也春秋首書公㑹公及罪之也四國之師衆若可勝也而皆敗績見衆之不可恃也凡諸侯在喪而有境外之事以喪行者稱子以吉行者稱爵衛宣未葬朔乃即戎己為失禮不稱子以吉服從金革之事其為惡大矣聖筆直書而惡自見三月葬衛宣公魯方與衛戰何為往㑹其葬劉氏曰葬自内録也君子怨不棄義怒不廢禮惡不忘親胡氏曰怨不棄義怒不廢禮是知古人以葬為重也夏大水桓方十三年而大水一再隂盛之災也詳見元年秋七月凡十七說見隱六年冬十月凡十二說見桓元年十有四年癸未春正月公㑹鄭厲伯于曹莊杜氏曰修十二年武父之好也以曹地曹與㑹左氏曰曹人致餼禮也㑹鄭伯得公之助以伐宋又嘗敗宋師以快其憤今講而報公以徳故公往㑹之無冰穀梁傳無冰時燠也蓋冬温無冰至正月無冰可藏也豳風二之日鑿冰沖沖謂十二月取冰也三之日納于淩隂謂正月藏冰于冰室也今冬温故至正月無冰可藏因書以紀異也周禮淩人掌冰正嵗十二月令斬冰與豳風同若以為周正則十二月乃夏之孟冬十月水始凍冰可藏乎今此春正月若周正則十一月時燠無冰尚有十二月隆寒則必有厚冰未可遽以無冰書之也以天時人事推之此蓋夏正月也夏五杜氏曰不書月闕文泰山孫氏曰不書月後人傳之脫漏耳鄭伯使其弟語來盟今春魯鄭已㑹于曹至此又使其弟語來盟以申固前約也左氏為子人即語也其後為子人氏穀梁曰不日前定之盟也胡氏曰諸侯之弟兄例以字通而書名者罪其有寵愛之私非友于之義也夫來盟者彼來欲之也與外為志同義蘇氏曰凡外大來盟于魯内大夫涖盟於他國皆盟其君也秋八月壬申御廩災杜氏曰御廩藏公所親耕以奉粢盛之倉也天火曰災書之以記災也乙亥嘗八月而嘗秋祭也此豈非夏時乎嘗常祭也何以書御廩災方四日遇災略不知懼而遽有事於祖考特書之以志其不敬也冬十有二月丁巳齊侯禄父卒隱六年盟于艾僖公卒襄公立宋人以齊人蔡人衛人陳人伐鄭左氏傳宋人以諸侯伐鄭報宋之戰也在十二年焚渠門鄭城門入及大逵伐東郊鄭郊取牛首鄭邑以大宫鄭祖廟之椽歸為盧門宋城門之椽杜氏曰凡師能左右之曰以公羊傳以者何行其意也以己從人曰行言四國行宋意也宋用四國之師而左右死生唯宋人之為聽比於平日諸侯各率其師以伐人者又不同故書以以别之征伐自天子出宋諸侯而可專用之乎擅以四國之師伐鄭焚毁殘破以逞其憤皆王法所當誅甚於摟諸侯以伐諸侯者故聖筆特書曰以而皆人之併著四國之罪也十有五年甲申春二月天王使家父來求車車服乃上之所以賜下故諸侯不貢車服諸侯有常職貢故天子不求私財自周室衰微號令不行貢賦不入國家無以充費故求賻求金已為不可況求車乎上越禮以求之取輕天下春秋書之于以見天王失為君之體著諸侯不臣之罪交譏之也三月乙未天王崩夏四月己巳葬齊僖公天王桓王也王崩而莊王立至魯莊一十八年崩經不書不於天王崩之後不見公奔赴亦未嘗遣使供喪葬亦㑹於齊僖卒而書卒書葬見其盡禮是知有諸侯不知有天子尤為可誅也五月鄭伯突出奔蔡左氏傳祭仲專鄭伯患之使其壻雍糾殺之將享諸郊雍姬知之遂告祭仲祭仲殺雍糾尸諸周氏之汪汪池也夏厲公出奔蔡突既欲殺祭仲而不克故畏仲而出奔也書鄭伯著其已簒立而鄭之臣子嘗君之也諸侯不生名鄭伯奔而名之譏其以庶奪正不可以有國初比于權臣而簒位又復謀於小臣為反覆盜賊之計故名以絶之又以自奔為文罪之也鄭世子忽復歸于鄭程氏曰稱世子本當立者不能保其位故不爵蘇氏曰忽嘗為君矣其出也稱鄭忽其復歸也稱世子何也於其出言不能君也於其復歸言其所以得反國者唯世子也舎是無足以歸矣忽忽自十一年五月莊公卒而立至九月祭仲與突歸疑而出奔衞五年于外今乃復歸不從衞侯朔衎之例稱爵乃稱世子者忽之所以得歸者以嘗為世子也不稱鄭伯者以其不能君也鄭自莊公卒迄魯莊十四年厲公復立國難方定四公子之亂相尋而作二十餘年忽一出而一歸突再出而再歸子亹子儀皆以國人而見殺不終其位詩人閔鄭之亂曰公子五爭兵革不息謂厲公兩立忽子亹子儀皆一立凡五也許叔入于許許太岳之𦙍許叔許莊公之弟隱十一年魯與齊鄭伐許遂入許許莊公奔衞齊以許讓魯魯辭以與鄭鄭不敢居以許東偏奉許叔使其大夫公孫獲處西偏許無君者十五年許叔不敢入許以居正也鄭莊卒突與忽爭鄭亂故許叔乗此隙始入于許昔為三國所伐未聞可滅之罪今其入也亦許人之所願有意於舊君之弟也故書字以襃之著其當有國善其興復也書入者難詞也以其不能申大義請于天王告于大國以復先君之宗廟社稷乃竊入焉故不書歸而書入志非其正也公㑹齊侯于艾艾公羊作鄗穀梁作蒿偏左氏傳謀定許也鄭莊昔置許東許不敢擅居正鄭莊卒國内亂齊魯遂為之謀以定許叔之位許得以復存也邾人牟人葛人來朝杜氏注牟國今泰山牟縣葛國在梁國寧陵縣東北三國皆附庸小國不當旅見于簒逆故貶而人之夷狄之也非天子不旅見三國行之桓受之其罪惟均聖筆直書之而惡自見矣秋九月鄭伯突入于櫟杜氏註櫟鄭别都也今河南陽翟音狄縣左氏傳鄭伯因櫟人殺檀伯而遂居櫟鄭突使櫟人殺其守櫟之大夫檀伯即曼伯也十七年髙渠彌弑昭公而立公子亹十八年齊人殺子亹祭仲逆鄭子昭公弟子儀也于陳而立之莊十四年傅瑕殺鄭子及其二子而納厲公厲公入昭十一年申無宇對楚子䖍曰鄭莊公城櫟而置子元焉使昭公不立由是觀之則害于國末大必折尾大不掉君所知也櫟突亂鄭忽出而復歸正也故書之突出而繼書入于其後不書復國以見櫟耦國强大入之則鄭無如之何矣又以見突之簒奪國非其國故略之春秋謹嚴忽亹儀之為君末矣故其事皆不足紀但書入櫟以見亂之根自鄭莊啓之于以為來世之鑒也冬十有一月公㑹宋公衞侯陳侯于袲伐鄭袲公羊作侈杜氏註袲宋地在沛國相縣西南曰左氏傳㑹于袲謀伐鄭將納厲公也弗克而還穀梁地而後伐疑辭也非其疑也地而後伐止此與豈元棐林以胡氏曰非其疑於為義果於為不義相與連兵動衆納簒國之公子故詳書其㑹地而言伐以譏之也侯鄭突善結諸侯故皆為伐鄭忽而欲納之也當時諸唯賂是好不顧是非奪正與邪故忽日以微以至于弑突日以强而遂得復立義安在也十有六年乙酉春正月公㑹宋莊公蔡桓侯衛惠侯于曹左氏傳㑹于曹謀伐鄭也杜氏曰前年冬謀納厲公不克故復更謀此又挾蔡與謀其勢益盛果於連兵為惡而不知懼蔑有王法矣夏四月公㑹宋公衛侯陳莊侯蔡侯伐鄭鄭亂未己公㑹諸侯于曹謀鄭也至夏而伐之至春㑹而蔡居衞上夏伐而蔡居最下杜氏以為蔡後吕氏曰當時諸侯皆以强弱利害為先後不復用周班也秋七月公至自伐鄭凡至危之也此書至伐之始桓之出二十五而至其甚者二㑹戎此二也助簒伐正踰時而返書自伐至亦譏之也冬城向此書冬繼以十一月則知城向在十月此正夏時也十月農事畢可以興役凡土功水昬正而栽音在今冬水星將正故城向也衞詩定之方中作于楚宫定北方之宿營室星也朱子曰此星昬正中夏正十月也左氏謂書時是也既云書時於此謂周正可乎若以為周正改月下既有十一月則此冬乃夏時之八月其時禾未穫可興土功用民力乎此夏時十月之明證也十有一月衛侯朔出奔齊左氏傳初衞宣公烝於夷姜宣公之庶母上滛曰烝生急子急詩作伋屬諸右公子為之娶於齊而羙公取之生夀及朔屬夀於左公子夷姜縊失寵自經死宣姜與公子朔構急子公使諸齊使盜待諸莘將殺之夀子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒夀子載其旌以先盜殺之急子至曰我之求也彼何罪請殺我乎又殺之二公子故怨惠公十一月左公子洩右公子職立公子黔牟惠公奔齊杜氏曰朔讒構取國故不言二公子逐罪之也公羊傳衞侯何以名絶曷為絶之得罪于天子也穀梁傳天子召而不往也朔時已立五年二公子見其得罪於王室將欲討之故因而逐之以立黔牟又安知諸侯受賂以抗王命反欲納之乎十有七年丙戌春正月丙辰公㑹齊侯紀侯盟于黄杜氏註黄齊地左氏傳平齊紀且謀衞故也覺盟于黄齊志也公往㑹之齊初與鄭如紀欲圖之紀而有備遂止紀于是懷懼求援于魯謀保其國後㑹魯鄭及齊戰而敗之齊襄憾之隂為詭計約魯紀㑹為黄之盟以安紀之心而弛其備二年後遂遷紀之三邑又三年紀侯大去其國吁齊襄之用心亦險矣盟之所以圖之也朔庶孽既立而出奔且得罪於周室魯謀欲納之連諸侯以抗王命何邪蓋利其賂耳二月丙午公及邾儀父盟于趡左氏作㑹公穀作及是也趡翠軌切又取水切志杜氏註趡魯地字之之義與隱元年盟蔑同及内為邾附庸之君非敢盟君公欲與之盟耳當以及字為定十五年邾朝桓則人之今此盟則字之朝可罪而盟可襃也五月丙午及齊師戰于奚杜氏註奚魯地左氏傳及齊師戰于奚疆事也於是齊人侵魯疆疆吏來告曰疆場之事慎守其一而備其不虞事至而戰又何謁焉今年春魯方與齊盟于黄至夏乃及之戰盟可恃乎聖筆列書其實事盟未幾而戰以見當時諸侯惟利是圖信義絶滅矣六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡蔡侯封人無子蔡季當立封人欲立弟獻舞而疾害季季辟之陳封人卒季奔喪獻舞立矣季不有其國故賢而字之劉氏敞曰蔡季何以稱字賢也何賢爾其去也以道其反也以禮公子不去國何賢乎季之去權也若季者道足以與權而不亂力足以得國而不居逺而不擕邇而不偪者也其言自陳陳有力焉爾歸易辭也内則國人望之外則陳有力可助其歸也無難讓而不有其國可謂賢乎哉故字而嘉之也癸巳葬蔡桓侯史記蔡之諸君皆諡為侯經則皆稱公者以其私諡與僭同也唯蔡桓稱侯蓋其弟蔡季之賢而請諡於王也故特書之以明得禮人亦有多愛其君者莫能愛君以禮而蔡季行之此賢者所以異於人也及宋人衞人伐邾左氏傳宋志也杜氏註邾宋争疆魯從宋志背趡之盟今春正月魯與齊盟夏五月與之戰二月魯與邾盟秋八月伐之何盟之易寒也案左氏推魯從宋志此書及則亦魯之志也冬十月朔日有食之左氏傳不書日官失之也予謂書朔則日可知矣甲乙厯之所紀已定可推而得之也十有八年丁亥春王正月范氏曰此年書王以王法終治桓之事自桓元年書王或不書王咸有意義已見元年并本年下此十八年桓之終乃復書王胡氏謂是時諸侯簒弑者已列於㑹則不復致討春秋於是年復書王者明弑君之賊雖身已没而王法不得赦也已列於㑹則不致討可乎故曰春秋成而亂臣賊子懼公㑹齊侯于濼盧篤切一音洛說文匹沃切公與夫人姜氏遂如齊杜氏注濼水在濟南歴城縣西北入濟公本與夫人俱行至濼公與齊侯行㑹禮故先書㑹濼既㑹而相隨至齊故曰遂左氏傳公㑹齊侯于濼遂及文姜如齊齊侯通焉公謫之以告初齊約公㑹于濼公與夫人同行申繻諌不聽是㑹夫人必與二國君行㑹禮夫人固不必書也此行公遇弑原其禍之所始則不可不書夫人也夏四月丙子公薨于齊左氏傳夏四月丙子享公使公子彭生乘公公薨于車魯人告于齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生公羊傳夫人譖公于齊侯齊侯怒與之飲酒於其出也使公子彭生送之於其乗焉搚榦而殺之何氏曰搚折聲也扶上車以手搚折其榦而殺之杜氏曰彭生多力拉公榦而殺之杜氏曰不言戕諱之也齊襄實弑公而書薨則以不地又死非以疾但書薨于齊見其弑於齊也明矣丁酉公之喪至自齊杜氏曰告廟也丁酉五月一日有日而無月石氏曰公内不能正室外取禍於齊也誅嗚呼鍾巫之慘桓忍為之雖幸免王法之終不能逃天道之報也秋七月冬十有二月己丑葬我君桓公九月乃葬何緩也既是魯史所書魯君之葬稱我君而後舉諡見臣子之敬辭也春秋之法君弑而賊不討則不書葬而此書者以齊强魯弱不可立得報故君子量力且假使書葬於可復讎而不復乃責之也讀春秋編卷二
