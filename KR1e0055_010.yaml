body:
  text: 讀春秋編卷十宋陳深撰昭公名禱襄公之子齊歸所生在位二十五年昭在外八年凡三十二年諡法威儀恭明曰元年庚申春王正月公即位春秋十二公繼未踰年之君者三皆同正君閔之繼般宣之繼赤昭之繼野是已閔以八嵗立內無所承雖繼故而不與聞乎弒故不書以志其哀宣之立雖與桓不同然其母私事公子遂遂託之以奪嫡宣公寧不知之故書即位以與聞乎故而如其意昭公之繼子野非故也正也繼正即位正也不胡氏曰子野有命立昭公故穆叔雖欲而不能止也叔孫豹㑹晉趙武楚公子圍齊國弱公羊弱作酌宋向戍衛齊惡公羊作石惡陳公子招蔡公孫歸生鄭罕虎公羊作軒虎許人曹人于虢公羊作漷榖梁作郭二左氏傳㑹于虢尋宋之盟也宋盟在襄十七年楚令尹圍請用牲讀舊書宋之盟書加于牲上而已晉人許之三月甲辰盟宋之盟楚爭先晉讓之今虢之㑹楚公子圍以晉楚迭霸更主夏盟恐晉先之於是請讀舊書加于牲上而不復㰱故經不書盟蓋楚圍用計而欲爭勝也夷狄之專盟其端見矣經於此二役皆先趙武抑强夷而進中國也劉氏曰此陳侯之弟招也何不稱弟諸侯之尊弟兄不得以屬通也胡氏曰公子者其本當稱也曰弟者因事而特稱之也三月取鄆左氏傳季武子伐莒取鄆莒人告于㑹楚告于晉曰尋盟未退謂弭兵之盟而魯伐莒瀆齊盟請戮其使時叔孫在㑹故請戮之樂桓子樂王鮒相趙文子欲求貨於叔孫而為之請使請帶焉指言求貨以請帶為辭弗與梁其脛曰貨以藩身子何愛焉叔孫曰諸侯之㑹衛社稷也我以貨免魯必受師是禍之也何衛之為雖怨季孫伐莒纍已魯國何罪叔出季處叔出使已守國有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰𢃄其褊矣裂帛示不相逆趙孟聞之乃請諸楚曰魯雖有罪其執事不避難畏威而敬命矣子若免之以勸左右可也封疆之削何國蔑有主齊盟者誰能辨焉莒魯爭鄆為日久矣苟無大害於社稷可無亢也固請諸楚楚人許之乃免叔孫易傳言伐莒而經不書為內諱也言取乘莒亂而得之也晉楚㑹諸侯以弭兵而盟季武乃乘莒之隙以兵取鄆志貪利而不顧信義幾陷叔孫以為國羞晉雖未肯遽戮而豹亦殆矣矧昭公即位之始內外未聞德音而首取鄰邑以自封殖豈交鄰國之道乎夏秦伯之弟針出奔晉左氏傳秦后子即針也桓公子景公母弟有寵於桓如二君於景如兩君於景公之世其母曰弗去懼選選數也恐景公數其罪而加戮癸卯針適晉其車千乘書曰秦伯之弟針出奔晉罪秦伯也不后子之奔由其父寵之太過雖曰愛之其實害之經書公子而曰秦伯之弟見秦伯不能友愛而使之出奔也罪在所奔者則以常文書之如公子慶出奔莒是也六月丁巳邾子華卒悼公卒莊公立晉荀吳帥師敗狄于大鹵大鹵公榖作大原大原晉陽縣榖梁曰中國曰大原狄人曰大鹵大左氏傳晉中行穆子即荀吳敗無終山戎及羣狄于原崇卒也聚卒而戰也將戰魏舒曰彼徒我車所遇又厄本又作隘以什共車更增十人必克困諸厄又克去車故克請皆卒自我始乃毁車以為行為步陳五乘為三伍乘車者車三人五乘十五人今去車更以五人為伍分為三伍荀吳之嬖人不肯即卒斬以狥為五陳以相離制步卒為五陳互相救援蓋以道既難於用衆制為五陳不相聨屬易於進退兩於前兩一也伍於後伍二也專為右角專三也參為左角參四也偏為前拒偏五也以誘之狄人笑之未陳而薄之大敗之厲狄為中國患久矣僖文之際連年入寇自成二年晉公敗之交剛迄悼公伯狄師不出至是而敗狄再見然晉伯之衰止此矣魏絳曰勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛戎禽獸也獲戎失華母乃不可乎及悼公卒未幾復有伐楚之師至昭十二年經書晉伐鮮虞則外之矣秋莒去疾自齊入于莒莒展輿出奔吳莒子二子長去疾缺展輿莒子遇弒去疾奔齊展輿立奪羣公子秩公子召去疾於齊秋齊公子鉏納去疾齊雖納去疾莒人先召之故經從國逆例書入展輿奔吳展輿吳外孫去疾假齊之力以入莒討展輿之罪正也故以國氏不稱公子者以以其無所禀命自以為公子可立也展輿踰年之君也不書莒子國人不與之亦不君之也然猶以國氏惡崇亂也叔弓帥師疆鄆田春取鄆今又乘莒之變恃其徒衆往正疆界以亂為利也葬邾悼公冬十有一月己酉楚子麇卒麇公榖作卷聘左氏傳冬楚公子圍將于鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而弒之遂殺其二子幕及平夏葬王于郟謂之郟敖使赴于鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長楚公子圍弒其君麇而立乃以疾赴諸侯經不破其僞何耶是時晉伯衰而楚最强中國諸侯力所不能討故聖筆包顯微之義因之而不革也楚使使如晉求致諸侯復請昏晉皆許之於是大㑹十二國于申雖內外混淆而中國之列侯居過半矣向戍子産之良咸獻㑹禮焉遂用齊桓㑹召陵之禮中國愈弱諸侯皆從于楚矣聖師感世變之若此倘革而正之恐天下後世以楚麇之弒而伯主不問諸侯不討反從之以主盟㑹則其弒君等土苴耳故因其僞赴而不正其弒逆之罪為中國諱也楚公子此出奔晉左氏傳公子圍弒楚子右尹子干即公子比出奔晉宫廄尹子晳出奔鄭即黑肱也蘇氏曰君弒畏逼而出二年辛酉春晉侯使韓起來聘左氏傳晉侯使韓宣子來聘且告為政而來見起代趙武為政而來見魯禮也觀書于大史氏見易象與魯春秋曰周禮盡在魯矣曰吾乃今知周公之德與周之所以王也夏叔弓如晉左氏傳報宣子也秋鄭殺其大夫公孫黑案傳駟黑伐良霄而逐之君弗誅也又與游楚爭娶于徐吾氏徐吾氏歸楚黑怒欲殺之楚知之逐之以戈傷君放楚于吳而盟諸大夫黑於是自以為卿又將作亂欲去游氏疾作而不果子産使吏數之曰爾有亂心無厭專伐伯有而罪一也兄弟爭室而罪二也薰隧之盟女矯君位而罪三也不速死大刑將至七月壬寅縊尸諸周氏之衢加木焉稱國以殺大夫罪纍上也惡鄭伯不討有罪以放乎亂也黑富而怙强鄭人畏之故日肆其惡子産因其疾也數其罪而殺之然亦幸而勝之耳冬公如晉至河乃復季孫宿如晉左氏傳晉少姜卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉致少姜之禭服公之如晉非禮也非禮而往至於見拒然後歸孰若始遣季孫宿行哉而公如晉至河乃復者六唯二十三年書有疾明有疾反餘皆譏公數如晉見拒不能以禮自重大取困辱也三年壬戌春王正月丁未滕子原公羊作泉卒成公卒悼公寧立夏叔弓如滕五月葬滕成公滕小國使叔弓㑹葬甚矣秋小邾子來朝左氏傳小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉逆羣好也其如舊而加敬焉季孫從之八月大雩左氏傳旱也大雩凡三說見桓五年冬大雨雹北燕伯款出奔齊左氏傳燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比相親比以殺公之外嬖公懼奔齊書曰北燕伯款出奔齊罪之也以自奔書者以其不能君而為臣所脅而出也不書臣之所逐不以臣而逐君也四年癸亥春王正月大雨雹自冬甫春大雨雹者二陰陽乖戾之氣也左氏載申豐之對歸咎於不藏氷天人之理未必在于此豐季氏之黨佞人也不肯端言其故蓋陰侵陽不入則為雹是時春已三陽陰猶盛而干陽其應為三家專政無君之兆故洊有此災異昭公曽不知懼而思其政之闕失宜乎出亡在外也夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申胡汝陰縣西北有胡城淮夷淮浦之夷也申姜姓國南陽宛縣晉諸侯自夷儀之㑹晉受齊賂不討崔杼以成齊亂而失其政矣宋之盟則政在大夫晉楚始同主夏盟自此諸侯不出者幾十年中國無伯矣楚公子圍弒郟敖自立使于晉求合諸侯晉許之於是諸侯大㑹于申而楚主之不殊㑹淮夷楚固同類在㑹之諸侯靡然從之天下幾何不折而入楚乎周自東遷天子受制於諸侯魯文以來諸侯受制於大夫此年申之㑹中國受制於蠻荆尚有魯衛曹邾不至厥後晉君少安不在諸侯而政日以衰故楚得以逞其欲而無忌憚矣經書楚子於諸侯之上正以病中國之無人也楚人執徐子左氏傳徐子吳出也以為二焉故執諸申楚子以疑罪執諸侯故書人以譏之秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之左氏傳秋七月楚子以諸侯伐吳宋太子鄭伯先歸宋華費遂鄭大夫從從楚伐吳使屈申圍朱方吳邑齊慶封所封申屈蕩之子八月甲申克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以徇於諸侯曰無或如齊慶封弒其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弒其君兄之子麇而代之以盟諸侯王使速殺之榖梁傳慶封其齊氏何也為齊討也慶封弒其君而不以弒君之罪罪之者慶封不為靈王服也不與楚討也春秋之義用貴治賤用賢治不肖不以亂治亂也孔子曰懷惡而討雖死不服不曰楚子㑹諸侯伐吳不與楚人主中國也執徐子楚意也不以諸侯共執為文而曰楚人執徐子所以甚楚子也吳之伐執齊慶封者亦楚意也不曰楚執之而以諸侯共執為文不與楚子之討慶封也楚非為齊誅故不繫以討賊之辭也遂滅賴賴公榖作厲諸賴國今蔡州褒信縣有賴亭許左氏傳遂以侯滅賴遷賴于鄢楚子欲遷于賴使鬬韋龜及公子棄疾城之而還榖梁曰遂繼事也許氏曰惡其因義而為利以惡終也既伐吳執齊慶封殺之今又滅賴楚人之暴甚矣九月取鄫左氏傳取鄫言易也以襄六年莒人滅鄫此言取鄫者蓋莒滅鄫為附庸今魯乘莒亂取之爾冬十有二月乙卯叔孫豹卒案傳初穆子辟僑如之難成十六年及庚宗魯地遇婦人使私為食而宿焉適齊娶于國氏生孟丙仲壬夢天壓已弗勝顧而見人黑而上僂深目而豭喙號之曰牛助豫乃勝之及兄宣伯奔齊魯召穆子歸襄二年庚宗婦人獻以雉問其姓女生曰姓謂子也曰余子長矣召而見之則所夢也號之曰牛使為豎小臣也有寵長使為政公孫明與叔孫相知於齊歸未逆國姜公孫明取之故怒其子長而後使迎之田於邱蕕遇疾豎牛欲亂其室讒殺孟逐仲疾急召仲牛許而不召豹饑渴牛不與食十二月癸丑叔孫不食乙卯卒牛立昭子豹庶子婼而相之五年仲至豎牛攻殺之昭子曰豎牛禍叔孫氏殺嫡立庶必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外報父仇也穆子才智士也少避難偶非其類遂有孽子以符所夢故寵之卒為讒殺二嫡其身亦餒而死蓋由犯禮不慎其始卒迷于愛以致大禍叔孫不徵於理而徵於夢果可恃乎昭子不以豎牛立已為勞亟發其罪遄遇其報天也昭子之識見亦逺矣五年甲子春王正月舍中軍魯本二軍襄十一年作三軍三分公室各有其一季氏盡征之叔孫臣其子弟孟氏取其半及其舍之四分公室季氏擇二二子各一皆盡征之以貢于公皆季氏之私意卑公室也經書作書舍志其罪也詳見襄十一年楚殺其大夫屈申楚仇吳而疑屈申二於吳也而殺之故稱國以殺大夫罪纍上也公如晉左氏傳公如晉自郊勞至于贈賄無失禮晉侯謂女音汝叔齊曰魯侯不亦善於禮乎對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家大夫家不能取也有子家羈莊公𤣥孫懿伯也其人賢弗能用也奸大國之盟陵虐小國取鄆利人之難取鄫不知其私公室四分民食於他他謂三家思莫在公不圖其終為國君難將及身不恤其所不憂其所底止禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎卑公二年嘗如晉為晉所辭至河而復今又復往公之弱見侮而不知恥可知矣夏莒牟夷以牟婁及防兹來奔左氏傳莒牟夷以牟婁及防兹來奔牟婁及防與兹莒三邑牟夷非卿而書尊地也竊地之罪重故不得不録其人杜氏注城陽平昌縣西南有防亭姑幕縣東北有茲亭地譜密州安邱縣有平昌故城莒縣有姑幕故城魯之於莒鄰國也元年取鄆六年取鄫今又受牟夷以牟婁防兹三邑來奔貪利而不顧義甚矣不五年而取其五邑欲盡其地矣經屢書之以惡內也時公如晉未返而輒受莒叛人三邑惡季氏之專也胡氏曰經於三叛人襄十一年邾庶其五年莒牟夷二十一年邾黑肱雖賤特書其名以懲不義懼淫人為後戒也秋七月公至自晉左氏傳莒人訴于晉晉侯欲止公范獻子范鞅曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉間音間乃歸公七月公至自晉戊辰叔弓帥師敗莒師于蚡音粉泉左氏傳莒人來討不設備戊辰叔弓敗諸蚡泉莒未陳也蚡泉杜氏注魯地魯東境之地張氏曰晉人方欲止公以魯受牟夷敗莒人大夫之專不顧霸討君辱比書而罪大夫之專可見矣秦伯卒左氏傳秦后子復歸于秦秦景公卒故也秦針奔晉至是歸秦景公卒哀公立冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳左氏傳四年冬吳伐楚入棘櫟麻楚三邑以報朱方之役五年冬楚子以諸侯及東夷伐吳以報棘櫟麻之役吳早設備楚無功而還國越始見經姒姓夏后少康之庶子封於越其先也越㑹稽山陰縣經於楚不遽進之越初見即書人以其為中國患淺與楚暴不同也六年乙丑春王正月杞伯益姑卒杞文公卒平公立葬秦景公夏季孫宿如晉左氏傳拜莒田也葬杞文公宋華合比出奔衛左氏傳宋寺人栁有寵大子佐惡之華合比曰我殺之栁聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟于北郭矣使視之有焉遂逐華合比合比奔衛襄陵許氏曰經書宋公殺其世子痤宋華合比出奔衛皆著寺人讒慝敗國以為世戒而秦漢以來庸君衰季溺心嬖習逺去忠良亂亡相屬若出一軌春秋惡可一日而不開明哉秋九月大雩旱也楚薳罷帥師伐吳左氏傳徐儀楚聘于楚楚子執之逃歸懼其叛也使薳泄伐徐吳人救之令尹子蕩子蕩即薳罷帥師伐吳師于豫章而次于乾溪乾溪在譙國城父縣南楚東竟吳人敗其師于房鍾吳地獲宫廄尹棄疾棄疾鬬韋龜之父非公子棄疾也子蕩歸罪於薳泄而殺之襄陵許氏曰敗楚師者非薳泄也而泄伏其誅故書薳罷伐吳以正之楚再不競於吳乃弭兵鋒有事陳蔡至復伐徐而國亂矣吳蓋自是休兵息民國始寖强冬叔弓如楚襄陵許氏曰四年公不㑹申既而震楚兵威將朝楚而未能故以叔弓先聘明年而躬繼之也齊侯伐北燕左氏傳齊侯如晉請伐北燕晉侯許之十二月齊侯遂伐北燕將納簡公即北燕伯三年出奔齊今將納之晏子曰不入燕有君矣民不二吾君賄左右諂諛作大事不以信未嘗可也七年正月癸巳齊侯次于虢燕竟燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪公孫晳曰受服而退俟釁而動可也二月戊午盟于濡上燕人歸燕姬賂以瑶罋玉櫝斚耳玉爵不克而還七年丙寅春王正月暨齊平榖梁傳平者成也暨者不得已也以外及內曰暨爾雅曰暨及也孫氏曰齊來求平不得已而許之故曰暨且明非魯志也齊强魯弱以魯㛰吳附楚也故來求平三月公如楚左氏傳楚子成章華之臺願與諸侯落之大宰薳啓疆來召公三月公如楚魯昭本欲如楚雖無薳啓疆之召亦往也去夏而從楚經特書以貶之也叔孫婼如齊蒞盟榖梁曰蒞位也內之前定之辭曰蒞外之前定之辭曰來始齊欲我平魯不得已而與之平今乃使婼往蒞盟我所欲也彼既求平而又往盟是反畏之也夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒襄公卒孔成子立靈公元榖梁傳鄉曰衛齊惡在元年今曰衛侯惡此何為君臣同名也君子不奪人名不奪人親之所名重其所來也王父名子也蓋言人之子不敢與世子同名有生在世子前王父名之者則亦不改也受親之所名臣雖欲改君不當聽欲使人重父命也父名于王父王父沒則稱王父命名之九月公至自楚公如楚凡六月而返書至幸之也冬十有一月癸未季孫宿卒襄陵許氏曰季武子相魯作三軍舍中軍唯已所利取鄆瀆盟敗諸侯約幾陷名卿以為國憂則知昭公乾侯之禍其專欲不忌之習非一日也十二月癸亥葬衛襄公八年丁卯春陳侯之弟招殺陳世子偃師夏四月辛丑陳侯溺卒左氏傳陳哀公元妃鄭姬生悼大子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾三月甲申公子招公子過殺大子偃師而立公子留夏四月辛亥哀公縊不曰公子招而曰陳侯之弟招親之者所以甚招之惡也哀公昏迷溺愛而以公子留屬其弟招與過而輔之哀公首禍固可罪也招以叔父之親不思宗社之重而逄君之惡殞冡嗣以立庶孽及其禍作哀公亦憂恚自殺以致楚滅陳而縣之招之罪大矣叔弓如晉左氏傳晉侯築虒音斯祁之宫在絳西四十里臨汾水虒祁地名叔弓如晉賀虒祁也游吉即子太叔相鄭伯以如晉亦賀虒祁也史趙見子太叔曰甚哉其相蒙也蒙欺也可弔也而又賀之當楚之强暴專盟橫行中夏晉侯於此時宜與二三忠良深慮逺圖思所以制之之道方且侈汰自安唯宫室是崇是可弔不可賀也吁晉文之霸政衰矣楚人執陳行人干徵師殺之陳公子留出奔鄭左氏傳干徵師赴于楚且告有立君告立留公子勝訴之于楚楚人執而殺之公子留奔鄭書曰楚人執陳行人干徵師殺之罪不在行人也在楚人惡公子招而殺干徵師非其罪也古者兵交使其閒可也楚將討陳故留出奔留既為君何以稱公子留留立於招未成君也秋搜于紅杜氏注魯地沛國蕭縣西有紅亭逺疑劉氏傳搜春事也秋興之非正也搜有常地矣于紅亦非正也然則曷為不言公公不得與於搜爾曷為不得與於搜三家者專魯而分之政令出焉公民食焉爾陳人殺其大夫公子過公子招歸罪於過而殺之以說於楚過與殺偃師經以招首事書招而不及過今雖招殺過然過與殺偃師之罪重招殺過之罪輕不與招之殺過也故以陳人自討為文招所以不死而得放大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐左氏傳九月楚公子棄疾帥師奉孫吳偃師之子圍陳宋戴惡㑹之十一月壬午滅陳招殺世子之賊也楚子執而放之陳孔奐無罪之人也楚子殺之楚靈暴虐無道滅人之國而淫刑以逞不仁之甚也經直書之惡楚也葬陳哀公榖梁傳不與楚滅閔之也泰山孫氏曰十月壬午楚師滅陳葬陳哀公知不滅之辭者楚子葬之也不言楚子葬之者不與楚子滅陳葬哀公故以陳人自葬為文所以存陳也九年戊辰春叔弓㑹楚子于陳左氏傳叔弓宋華亥鄭游吉衛趙黶㑹楚子于陳楚子在陳故四國大夫往不行㑹禮故不揔書是楚滅陳諸夏之大夫震懾不召而至皆旅見于楚於始舉魯以見其餘也是年楚滅陳以穿封戍為縣公許遷于夷左氏傳二月庚申楚公子棄疾遷許于夷實城父此時改城父為夷故傳實之城父縣屬譙郡許畏鄭欲遷故經以自遷為文夏四月陳災楚滅陳已縣之矣及災經猶書陳災公羊謂存陳也此後五年而陳復天未絶陳陳未亡故也仍書陳災者中國無滅於夷狄之道也書滅以罪夷狄書陳災以存中國秋仲孫貜如齊左氏傳孟僖子如齊殷聘盛聘以結好禮也自叔老聘齊至今二十年今復修盛聘得繼好息民之禮也冬築郎囿築苑囿於郎也昭公為强臣所制不思危辱將至方且築囿於郎郎非國內乃逺地也徒知從事游觀之樂豈急務乎十年己巳春王正月齊欒施來奔齊欒施髙彊嗜酒信內多怨彊於鮑氏而惡之陳鮑及其醉而攻之欒高戰不勝來奔不書高彊非卿也齊政歸陳氏久矣欒高陳鮑之伉也欒施高彊既奔則陳氏由此益大也秋七月季孫意如叔弓仲孫貜帥師伐莒左氏傳平子即意如伐莒取郠音梗莒邑獻俘始用人于亳社亳社殷社魯有殷社所謂兩社是也至是魯始以人祭殷社臧武仲在齊聞之曰周公其不饗魯祭乎杜氏注取郠不書公見討平邱故諱之十三年平邱之盟不見公公不與盟又執季孫意如以莒告魯伐之故也胡氏曰已舍中軍曷為猶以三卿並將乎季氏毁中軍四分公室擇其二二家各有其一至是季孫身為主將二子各率一軍為之副則三軍固在其曰舍之者特欲中分魯國之衆為已私耳戊子晉侯彪卒左氏傳晉平公卒鄭伯如晉及河晉人辭之游吉遂如晉九月叔孫婼如晉葬晉平公左氏傳九月叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉葬平公也十有二月甲子宋公成卒左氏傳宋平公卒元公立杜氏注無冬闕文公羊成作戍十有一年庚午春王二月叔弓如宋葬宋平公夏四月丁巳楚子虔誘蔡侯般殺之于申楚公子棄疾帥師圍蔡左氏傳楚子在申召蔡靈侯靈侯將往蔡大夫曰王貪而無信唯蔡於感憾同今幣重而言甘誘我也不如無往蔡侯不可三月丙申楚子伏甲而饗蔡侯于申醉而執之夏四月丁巳殺之刑其士七十人公子棄疾帥師圍蔡韓宣子問於叔向曰楚其克乎對曰克哉蔡侯獲罪於其君而不能其民天將假手于楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫吳以討於陳曰將定而國陳人聽命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣蔡般殺君父而立其罪固不容誅諸侯不能討十三年矣楚子誘而殺之遂滅其國執世子以歸用之其心本非除逆特利其土地以詐取之而肆其虐耳故經惡楚子而名之不與其為討也五月甲申夫人歸氏薨昭公母胡女歸姓大搜于比蒲昭公方有母喪而不廢搜況大搜非諸侯所當行是越禮之中又越禮也夫喪不二事果有外侮關於社稷則不得已而行之今之搜可已而不已昭公在疚曽無一日之戚其心喪矣宜乎被出而卒不返矣比蒲地譜是魯南鄙之地仲孫貜㑹邾子盟于祲祥左氏傳孟僖子即貜㑹邾子盟于祲祥盟㑹以安社稷故喪盟謂之禮杜氏注祲祥地闕秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人杞人于厥憗魚靳切地闕蔡晉韓起率諸侯㑹于厥憗謀救也經不書救蔡以其畏楚而不能救也楚自㑹申之後滅陳圍蔡愈肆其暴晉為盟主恬不之恤惟荀吳以為不恤亡國將焉用之兹役既合天下之兵而不能救徒遣使請命于楚而楚弗許是示之不能而楚益驕且有以量中國之力而得以行其虐也然書此無貶者聖人感世變若此故略之而不復以禮義望諸侯矣此後間一貶之而又不忍終棄之也九月己亥葬我小君齊歸齊歸昭公之母齊諡也向左氏傳葬齊歸公不戚叔曰魯公室其卑乎君有大喪國不廢搜有三年之喪無一日之戚國不恤喪不忌君也君無戚容不顧親也能無卑乎殆其失國冬十有一月丁酉楚師滅蔡執蔡世子有榖梁作友以歸用之左氏傳楚子滅蔡用隱大子于岡山杜氏曰用之殺以祭山楚子而曰楚師惡而貶之也惡其用衆而不與其滅也君沒未葬或已葬嗣君稱子今蔡侯死於楚其喪未至況當危難窮迫雖立不成乎君故但稱世子楚自四月圍蔡世子有守禦至于十一月凡八月而力屈被執楚以有不服故以其歸而虐用之有之效死勿去為子道盡矣故不沒其世子之名春秋滅國者多矣未有如此暴者書誘書圍書滅書執又書其虐用之故特詳記又稱時稱月稱日以愼之蓋以傷中國之衰微而甚惡夷狄之殘忍不道也十有二年辛未春齊高偃帥師納北燕伯于陽三年燕伯款出奔齊六年齊伐燕欲納之受燕賂不克至是始納之于唐高偃高徯𤣥孫齊大夫陽即唐燕别邑中山有唐縣左氏傳高偃納北燕伯款于唐因其衆也因唐衆欲納之故得先入唐而未得至于燕也燕伯三年出奔名之今納之不名與襄二十五年衛侯入于夷儀同蓋國君非臣下所當逐入于夷儀納于陽不名以正君臣之分也以燕之罪未至如衛朔衛衎鄭突諸侯失國諸侯納之正也凡諸侯之奔有書名者有不書者書名者罪失守也不書者皆被兵出奔恕其力不足也出入皆名者皆有惡也三月壬申鄭伯嘉卒鄭簡公卒定公立夏宋公使華定來聘左氏傳通嗣君也宋元公新即位公如晉至河而復左氏傳齊侯衛侯鄭伯如晉朝嗣君也晉昭公新立郠之役六年公伐莒取郠莒人訴于晉晉有平公之喪未之治也故辭公公子憗遂如晉五月葬鄭簡公杜氏曰三月而葬速楚殺其大夫成熊熊公羊作然榖梁作虎遂左氏傳楚子謂成虎若敖之餘也殺之成虎令尹子玉之孫與鬬氏同出於若敖或譖成虎於楚子成虎知之而不能行書曰楚殺其大夫成虎懷寵也當貶楚子信讒殺其大夫不當貶成虎不能行傳以名為貶未可以一槩論也秋七月冬十月公子憗出奔齊左氏傳季平子即季孫意如立立在七年而不禮於南蒯蒯南遺之子季氏費邑宰南蒯謂子仲即公子憗吾出季氏而歸其室於公子更其位子謂憗我以費為公臣子仲許之叔仲小南蒯公子憗謀季氏憗告公而遂從公如晉南蒯懼不克以費叛如齊子仲還及衛聞亂逃介介副使而先及郊聞費叛遂奔齊變南蒯為季氏不禮謀去季氏而立公子憗不克而事憗不得不奔其志則忠於魯也杜氏以謀亂故書名謬矣楚子伐徐左氏傳楚子狩于州來次于潁尾使蕩侯潘子司馬督嚻尹午陵尹喜五大夫帥師圍徐以懼吳徐吳與國圍之以懼吳楚子次于乾溪在譙國城父縣南以為之援晉伐鮮虞鮮虞白狄别種也在中山新市縣古鮮虞國子姓左氏傳六月晉荀吳僞㑹齊師者假道於鮮虞遂入昔陽昔陽肥國都秋八月壬午滅肥以肥子綿臯歸冬伐鮮虞因肥之役也經書晉伐外之也惇信明義君子之道也懷利尚詐小人之道也晉假道鮮虞聲言㑹齊乃滅肥又伐鮮虞是行小人之事故外之昔獻公假道於虞以滅虢書晉師其執虞公也書晉人今伐鮮虞特書晉以外之時楚滅陳蔡而晉不救以其力不能故不復罪之能伐鮮虞不救陳蔡非力不足也絶意中夏而棄諸侯也何以言盟主故春秋外之以著其罪也十有三年壬申春叔弓帥師圍費費魯邑南蒯為季氏宰此邑以邑叛故叔弓以兵圍之凡家臣以邑叛悉不書叛但書大夫圍之則邑叛可知且罪大夫無政而使家臣得專邑而叛也克之不書本非他國之邑也胡氏曰季孫意如以所惡於下者事上而不忠其君以所惡於上者使下而不禮其臣出乎爾者反乎爾宜南蒯之及此也强蒯之叛雖以季氏不禮之故而其所以欲去季氏以公室則未為不忠於魯故難以叛書之但書使大夫帥師圍費亦見季氏雖强而家臣不服也夏四月楚公子比自晉歸于楚弒其君虔于乾溪乾溪在譙國城父縣東竟疾楚子審共王有子五人曰昭曰虔曰比曰黑肱曰棄審卒昭立昭卒昭之子麇立虔弒之而自立比出奔晉黑肱奔鄭楚虔立十三年棄疾為蔡公觀起之子從在蔡矯蔡公命召公子比與黑肱入襲蔡奉蔡公蔓成然蔡朝吳帥陳蔡不羮音郎許葉之師因四族之徒薳氏許圍蔡洧蔓成然羣失職者以入楚因正僕人太子近官殺太子祿及公子罷敵公子比為王公子黑肱為令尹次于魚陂公子棄疾為司馬使觀從從師于乾溪而遂告之楚子虔駭縊于芊尹申亥氏比之歸非其謀也亂始於觀從而成於棄疾以比為名而已為君非比志也比不志為君迫於觀從棄疾而以身許之以致虔死則雖不弒君而弒君之名比尸之矣楚比之歸虔猶在楚不曰入何也觀從召之蔡人與之人不拒則比之歸無難也棄疾為蔡公志於篡久矣而觀從召比之至乘諸失職者之亂既已致虔之死又殺其子大惡則比當之矣比既無能無德而棄疾安肯使之坐享其位故譎計以恐之使之自殺則棄疾之志得矣其謀亦巧乎哉故春秋於比不以討賊辭書者殺之不以罪也故以兩下相殺之辭書之比雖立而曰公子比亦不以為君也然比兄也黑肱弟也棄疾其季弟也立比為王肱為令尹棄疾為司馬以長幼之序立之也春秋誅其意歸罪棄疾而無所隱也楚公子棄疾殺公子比公子比鄙懦人耳初觀從召之也非有為君之心從挾之入楚立之為王從又說之殺棄疾不從乃行其行也從未必不反為棄疾謀及棄疾使人遍呼國中逼之自殺視比之行止死生皆聽人自為略無所能則棄疾安肯君之哉比雖立而不能君其國故經不稱君但以公子書之又不以討賊書原棄疾之意在於伐比而非討之也秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平邱平邱今在開封府封邱縣東漢志尚為平邱縣心左氏傳晉成虒音斯祁宫也諸侯朝而歸者皆有二為取郠在十年郠莒邑魯取之晉將以諸侯來討為莒討魯叔向曰諸侯不可以不示威乃並徵㑹于吳秋晉侯㑹吳子夷昧也于良下邳水道不可吳子辭乃還七月丙寅治兵邾南甲車四千乘羊舌鮒叔向弟攝司馬遂合諸侯于平邱晉之合諸侯止于此矣雖能張中國之勢未足以服荆楚也王人與十三諸侯㑹兵車之盛固足以使强楚知畏陳蔡滅國一日俱復然徒耀以兵威而不以德異乎桓文矣自平邱一盟之後訖于召陵諸侯不出者二十四年至若鄟陵一㑹參盟復作自齊威以來未之有於是再見自是晉不復主盟而齊專盟矣晉之霸業自是而不復振也八月甲戌同盟于平邱書同盟者以齊人不欲盟要之乃可鄭伯滕子邾子又皆從楚非一日今一旦㑹盟不得不疑是以必為之同盟冀其自此無復有異矣再書平邱者胡氏曰惡之也惡其德不競而矜兵甲脅持之也公不與盟此㑹以邾莒訴魯取郠故意欲討魯今將因㑹而執季孫意如故怒而不使與盟雖一時似有沮喪之辱而此盟不與得免於罪實為幸也此非國惡故聖筆不諱而書之晉人執季孫意如以歸晉執意如亦伯討也何以書人曰季氏專魯無君意如尤甚信可罪晉不能以大義廢之使三家臣順徒信邾莒以魯數侵不能共晉貢而遂執之安得為霸討故稱人以罪晉也公至自㑹蔡侯廬歸于蔡陳侯吳歸于陳蔡周宗室陳虞舜後楚靈彊暴一旦滅之伯主不討諸侯不救楚平立乃復之諸侯若不聞焉則是二國之命制于夷狄也聖筆以陳蔡自歸為文所以折强夷而存中國也冬十月葬蔡靈公國復乃葬凡三十一月榖梁傳變之不葬有三失德不葬弒君不葬滅國不葬然且葬之不與楚滅也陳蔡之復聖人舉王法以治蓋陳蔡者先王之建國非楚可滅而可復也故書爵歸言二國之嗣位其所固有國其所宜歸也公如晉至河乃復左氏傳公如晉荀吳謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯辭公于河辭公不與平邱盟又以季孫意如在晉故再如之晉人焉至河乃復晉彊而魯弱甚矣吳滅州來左氏傳吳滅州來楚令尹子期請伐吳王弗許曰吾未撫人民未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之州來楚邑也不言吳帥師不言侵伐于以見其滅之易十有四年癸酉春意如至自晉大夫不至見執而後至亦危之也不稱氏前見也以一事再見卒名耳荀意如被執子服惠伯湫也從意如之歸以子服私說吳之謀以利動之也晉之政可知矣三月曹伯滕卒武公卒子平公須立夏四月夏四月凡十一詳見桓九年秋葬曹武公八月莒子去疾卒冬莒殺其公子意恢左氏傳莒著音除邱公卒郊公著邱子不戚國人弗順欲立著邱之弟庚輿共公蒲餘侯莒大夫兹大也惡公子意恢而善於庚輿公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之冬十二月蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸迎庚輿於齊襄陵許氏曰公子鐸首亂而無見焉者春秋書法表見王道而已不誅其人若鐸類者多矣此意自韓愈發之韓愈詩曰春秋書王法不誅其人身十有五年甲戌春王正月吳子夷末公羊作夷昧卒王僚立二月癸酉有事于武宫魯武公廟籥入叔弓卒去樂卒事左氏傳禘合祭于武宫叔弓涖事籥入而卒去樂卒事禮也籥羽舞也方入而大臣卒故去樂而終禘祭之事春秋常事不書此記禮之變而書之也夏蔡朝吳出奔鄭朝吳蔡臣也楚平以其忠於舊君而信之費無極楚之讒人也惡朝吳之寵以計害之使蔡人逐朝吳出奔鄭楚平不察無極讒慝卒使吳師入郢辱及宗廟可不畏哉聖筆志朝吳出奔為後世戒之也六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞左氏傳晉荀吳伐鮮虞圍鼓白狄之别克之以鼓子䳒鞮歸帥師伐鮮虞凡三冬公如晉左氏傳平邱之㑹故也平邱㑹公不與盟季孫見執今既得免故往謝之公不以不與平邱為恥而往如之屢見辭於晉今又復往微弱甚矣十有六年乙亥春齊侯伐徐左氏傳齊侯伐徐二月丙申齊師至于蒲隧徐地下邳徐人行成徐子及郯人莒人㑹齊侯于蒲隧賂以甲父之鼎甲父古國名叔孫昭子曰諸侯之無伯害哉為小國害齊君之無道也興師而伐逺方㑹之有成而還莫之亢也無伯也夫襄陵許氏曰景公之時吳楚方爭晉既不能逺略以齊之强務德修政以通天下之志紏合諸侯復霸可也區區務乎伐徐伐莒之利志亦卑矣楚子誘戎蠻子殺之蠻公羊作曼杜氏注河南新城縣有蠻城今伊闕縣新城也左氏傳楚子聞蠻氏之亂也與蠻子之無質信也也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉蘇氏曰楚子誘蔡侯殺之名而書地以其殘害中國疾之也誘殺戎蠻不名不地其類相殘略之也戎蠻不名告略也夏公至自晉左氏傳正月公在晉晉人止公不書諱之也公至自晉子服昭伯子服回也語季平子曰晉之公室其將遂卑矣君幼弱六卿强而奢傲將因是以習習實為常能無卑乎魯昭朝晉三至于河而不得入兩得見晉侯又問其罪而止之昭之懦可知矣責其自强必不能也秋八月己亥晉侯夷卒昭公卒子頃公去疾立九月大雩旱也季孫意如如晉冬十月葬晉昭公杜氏注三月而葬速十有七年丙子春小邾子來朝左氏傳小邾穆公來朝朝魯也夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎陸渾之戎密邇王室而雜處非肅畿輔别內外之義也晉滅之舉荀吳名氏非褒辭也才得無貶耳晉以其二於楚故也冬有星孛于大辰公羊傳孛者何彗星也其言于大辰何在大辰也大辰者何大火也大火心星大火為大辰伐為大辰北辰亦為大辰伐謂參伐大火與伐天所以示民時早晚北辰北極天之中也迷東西者常視此以别心伐何以書記異也天左氏傳有星孛于大辰西及漢孛出辰西光芒東及漢申須魯大夫曰彗所以除舊布新也天事恆象天道恆以象示人今除於火火出必布焉諸侯其有火災乎鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斚玉瓚鄭必不火子産弗與胡氏傳大辰心也為明堂天子之象其前星太子後星庶子孛星加心象天子適庶將分爭也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝歷數載而後定至哀十三年有星孛于東方不言宿名者不加于宿也當是時吳人僭亂憑陵上國日敝於兵暴骨如莾其戾所感固將壅吳而降之罰也故氛祲所指在于東方假手越人吳國遂滅天之示人顯矣史之有占明矣許氏曰星孛大辰火災應之天地之符也大辰明堂當宋之分故王室亂宋亦亂衛陳鄭災氣所溢也衛亂君奔陳敗卿獲惟鄭有令政而無後災是知禍福之可轉矣楚人及吳戰于長岸長岸楚地言戰不言敗勝負均也春秋伐者為客見伐者為主吳伐楚戰于長岸先書楚人主及客也故楚彊非吳之敵今長岸之戰勝負適均由楚德不競其彊易弱經特書之于以見强之不足恃也十有八年丁丑春王三月曹伯須卒平公卒子悼公午立夏五月壬午宋衛陳鄭災左氏傳夏五月火始昏見丙子風梓愼曰魯大夫是謂融風火之始也融風木也木火母七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火公羊傳何以書記異也何異爾異其同日而災也外異不書此何以書為天下記異也前年有星孛于大辰禆竈豫言四國同日火今已驗鄭子産臨事而備至于書焚室而寬其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子以是知陳許之先亡也禆竈雖言之於先子産以天道逺亦不深信遂不聽竈以瓘斚禳火但修德以德消變耳六月邾人入鄅音禹又音矩妘姓國在琅邪開陽縣今屬沂州臨沂縣邾人乘鄅人藉稻蓋履行之若今踏田也襲之遂入盡俘以歸邾反鄅夫人而舍去聲其女不義甚矣故明年致宋之伐秋葬曹平公冬許遷于白羽白羽一名析楚邑今鄧州內鄉縣許自夷遷葉今復畏逼於鄭楚人遷之白羽皆以自遷為文蓋許志也十有九年戊寅春宋公伐邾左氏傳鄅夫人宋向戌之女故向寧戍之子請師二月宋公伐邾圍蟲邾邑三月取之乃盡歸鄅俘胡氏曰此所謂聲罪執言之師也故書伐邾而釋其取邑之罪此亦善善長惡惡短之義夏五月許世子止弒其君買左氏傳許悼公瘧五月戊辰飲大子止之藥卒大子奔晉書曰弒其君榖梁傳止不弒也不弒而曰弒貴止也止曰我與夫弒者不立乎其位以與其弟虺哭泣啜飦粥嗌不容粒未踰年而死故君子即止自責而責之也許悼公瘧世子止進藥公飲之遽卒夫疾瘧未足以致死飲其藥即死豈非藥之誤以致死乎觀左氏所記世子出奔與榖梁所載止悔恨之言則因藥誤而死無疑矣誤以藥殺亦猶弒也其心雖異乎商臣蔡般之所為而春秋一以弒書以臣子之於君父不可過也加之大惡所以遏篡弒之萌爾使後世凜然知懼以過誤致君父死猶被此惡名不少恕果有篡逆之惡安可逃其罪乎此聖筆垂訓之意也己卯地震石氏曰地震者陽伏而不能出陰迫而不能蒸也地震凡五詳見文九秋齊高發帥師伐莒左氏傳齊高發帥師伐莒莒子奔紀鄣莒邑使孫書伐之孫書陳無宇之子子占也初莒有婦人莒子殺其夫已為婺婦及老託於紀鄣託身紀鄣之邑紡焉以度而去之因紡纑連所紡以度城而藏之以待外攻者欲以報仇及師至則投諸外或獻諸子占子占使師夜縋以登登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀冬葬許悼公賊不討何以書葬曰止非躬蹈乎大逆也其出奔哀毁自責可以見其心也公羊謂經書世子弒其君買是君子之聽止也聽治其罪葬許悼公是君子之赦止也赦止者免止之罪辭也二十年己卯春王正月夏曹公孫㑹自鄸出奔宋鄸莫公反又音夢今曹州乘氏縣古鄸城也言自鄸者大夫有罪待放于境而後出奔也胡氏曰曹無大夫其曰公孫賢之也待放而賢之為公子喜時子臧也之後賢之也喜時能以國讓以其賢者之後苟有善焉斯進之矣秋盜殺衛侯之兄縶盜衛司寇齊豹也縶衛襄公長子也縶有疾弟靈公受其國縶狎齊豹奪其司寇與鄄邑又惡北宫喜禇司圃欲去之公子朝通于襄夫人宣姜懼討豹遂與此三人作亂殺縶齊豹非卿書盜者目罪人之賤者也不書衛公子而斥言衛侯之兄者纍及衛侯也謂衛侯俾兄與政縱其無禮於大夫又不能制其母春秋貶靈公無政刑致盜賊竊發兄死幾亡其國故直書之以著其罪也冬十月宋華亥向寧華定出奔陳寧公羊作寧而宋元公無信多私惡華向三大夫華亥誘羣公子殺之公如華氏請焉弗許遂劫之取太子為質公不忍其詬攻之華向奔陳華登奔吳而華向誘殺羣公子又劫公其專恣悖逆甚矣公不忍攻之一日而三卿出亡君臣之道喪矣宋之亂自此而未巳也十有一月辛卯蔡侯廬卒平公卒太子朱悼立弟東國賂楚費無極計以出朱故奔楚而東國篡立昭二十三年卒二十有一年庚辰春王三月葬蔡平公夏晉侯使士鞅來聘晉頃公即位通嗣君也左氏傳晉士鞅即范獻子來聘叔孫即昭子為政季孫平子欲惡諸晉憎叔孫位在已上欲使得罪於晉使有司以齊鮑國歸費之禮為士鞅鮑文子歸費在十四年為七牢士鞅怒曰鮑國之位下卿位卑下其國小而使鞅從其牢禮是卑敝邑卑晉國也將復諸寡君言歸告君討魯罪魯人恐加四牢焉為十一牢言魯不能以禮事大國為哀七年吳百牢起本襄陵許氏曰禮好不結而財求無度則聘義亡矣自是聘不復志宋華亥向寧華定自陳入于宋南里以叛公羊作畔宋司馬華費遂之子貙及多僚相惡多僚譖貙于公公將逐之貙殺多僚劫費遂以叛而召亡人華亥等華向入華氏居盧門以南里叛南里宋城內里門宋城舊鄘及桑林之門而守之華向等與宋分國而居之召吳楚以自救齊師宋師敗吳師遂敗華氏公子城以晉師至曹翰胡曹大夫㑹晉荀吳齊苑何忌衛公子朝救宋與華氏戰于赭邱大敗華氏楚薳越帥師逆華氏諸國大夫遂出之華亥向寧華定華貙華登皇奄傷省臧士平出奔楚華向前年抗君背國結黨而出今年因華貙召之復入于宋南里以叛為人臣而悖亂搆禍若此所當誅滅而不赦今入宋而戰敗宋師既圍之於內諸侯助之於外何患賊之不得也楚人釋君而臣是助諸侯之戍怠於救患固請逸賊而宋又從之則皆罪也故諸國大夫救宋經皆不書聖人之意可見也想其時叛臣困守圍內至急必行賄於諸國大夫不然何滅叛垂成而欲縱之也度諸大夫又慮楚援無功或致怒楚不肯盡力誅叛俾宋逸之失此之舉亂臣賊子無忌憚矣秋七月壬午朔日有食之左氏傳七月壬午朔日有食之公問於梓愼曰是何物也禍福何為對曰二至二分日有食之不為災日月之行分同道也二分日夜等故言同道至相過也二至長短極故言相過其他月則為災陽不克也陰侵陽是陽不勝陰故常為水於是叔輒哭日食昭子叔孫婼曰子叔即輒將死非所哭也八月叔輒卒八月乙亥叔輒卒見上文冬蔡侯朱出奔楚左氏傳費無極取貨於東國朱之叔而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴于楚楚嘗誘蔡侯般殺之又執世子有用之東國欲奪國賂楚權姦出朱而立朱奔訴于楚不克以權姦為之謀以阻之也然二子棄中國忘世讎其惡甚矣公如晉至河乃復左氏傳公如晉及河鼓叛晉晉克鼓在十五年鼓屬鮮虞晉將伐鮮虞故辭公公如晉至河而復凡五詳見昭二年二十有二年辛巳春齊侯景伐莒左氏傳齊北郭啓齊大夫帥師伐莒莒子將戰苑羊牧之諫曰齊帥賤其求不多不如下之大國不可怒也弗聽敗齊師于夀餘莒地齊侯伐莒莒子行成司馬竈如莒涖盟莒子如齊涖盟于稷門齊地門也之外莒於是大惡其君為明年莒子來奔傳襄陵許氏曰齊景矜忿貪欲不務反德而亟伐人國以詘莒於稷門矜而自功惡能及逺哉宋華亥向寧華定自宋南里出奔楚左氏傳楚薳越使告于宋曰寡君聞君有不令之臣為君憂寡君請受而戮之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已乃固請出之宋人從之己巳宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚大華向叛逆之罪不可勝誅宋師圍之必可𠞰之也諸夫畏楚之救請縱之俾楚有功亂人得以逸宋洎諸國大夫俱可罪也大搜于昌閒劉氏傳何以書譏何譏爾大搜于昌閒公不與非禮也蓋不得與爾襄陵許氏曰八年秋搜十一年夏搜以為書不時今此春搜時矣而書則凡昭公書搜主刺大夫咸强公失其政兵戎是務而禮防不興上下相與以樂慆憂也文王之時人倫既正而後軍旅以律朝廷既治而後田野即功是以詩歌庶類蕃殖搜田以時當魯昭之季朝廷人倫逆亂極矣而惟搜田之是務是以屢書以刺之夏四月乙丑天王崩左氏傳王子朝賓起有寵於景王子朝景王之長庶子賓起子朝之𫝊王與賓孟即起說之欲立之劉獻公之庶子伯蚠事單穆公獻公劉摯伯蚠劉狄穆公單旗惡賓孟之為人也願殺之又惡王子朝之言以為亂願去之于朝有欲位之言故劉蚠惡之夏四月王田北山使公卿皆從將殺單子劉子王知單劉不欲立于朝故欲因田獵先殺之王有心疾乙丑崩于榮錡氏戊辰劉子摯卒無子單子立劉蚠五月庚辰見王見王猛蓋太子壽之母弟遂攻賓起殺之盟羣王子于單氏王子猛次正故劉單立之懼諸王子或黨子朝故盟之六月叔鞅如京師葬景王叔鞅叔弓子三月而葬亂故速石氏曰魯使㑹天王之葬者二叔孫得臣葬襄王與此叔鞅葬景王是也魯公不親往而使大夫非正也王室亂王室亂景王為之也景王太子夀早卒次立王猛又寵愛孽子子朝而欲立之不克而崩劉子單子奉子猛為王而子朝結黨作亂書王室亂者言亂自內作猶若一家之亂也昔襄王子帶之亂與此同何為不書曰成晉文之功也一定襄王而亂不復作也今子朝之亂而特書傷晉文不復見而無以治之也不先書王室亂何以書後事也劉子單子以王猛居于皇劉單奉子猛為王而子朝作亂故出居于皇以避之猛未踰年稱王成猛之為王以猛為宜立也出而言居如成君也其言劉子單子以王猛者子朝亂猛位未定進退在二子也二子卿子爵皇周地河南鞏縣有黃亭也未踰年不可稱天王稱王繫名乃王者在喪之常稱秋劉子單子以王猛入于王城王城郟鄏今河南洛陽也即所謂成周也不言成周而言王城以未得國也再書以王者見劉單挾天子專國柄也其言入子朝難之也冬十月王子猛卒左氏傳十一月乙酉王子猛卒乙酉在十一月經書十月誤雖未即位周人諡曰悼王不成喪也釋所以不書王崩己丑敬王即位猛母弟王子丐館于子旅氏周大夫不崩不葬降成君也言猛所以别羣王子也時十月官籍談荀躒以九州之戎即陸渾及四邑之師納王十二月晉籍談荀躒賈辛司馬督帥師軍于陰等處閏月晉箕遺樂徵右行詭取前城及圍郊其始皆內懷觀望無救難之實也王室之亂若此天下卒無諸侯之助匹夫之救故雖有晉之師纍至而春秋皆不書之也十有二月癸酉朔日有食之二十有三年壬午春王正月叔孫婼如晉案傳邾人城翼還自離姑邾邑武城人塞其前道徑魯之武城斷其後之木而弗殊弗絶之也邾師過乃推而蹶之推斷木而蹶仆於地以絶邾師走路遂取邾師言易也獲徐鉏邱弱茅地邾人訴于晉晉人來討叔孫婼如晉謝取邾師之罪傳言晉人來討何其訴之急而討之速而經不見蓋魯取邾師度邾必訴于晉故令叔孫往聘以抒其事癸丑叔鞅卒晉人執我行人叔孫婼書晉人貶晉執使人取邾師非使人之罪言執我行人甚晉之罪也魯取邾師邾訴于晉晉為盟主當問魯之罪可也今執其行人豈其罪耶故書晉以人貶之也晉雖執叔孫問罪卒不能屈而歸之安能使邾之心服而魯之知懼也晉伯於是乎衰矣晉人圍郊左氏傳正月壬寅朔二師圍郊王師晉師也郊子朝邑癸卯郊潯潰二邑子朝所據丁未晉師在平陰今河陰縣王師在澤邑周地王使告閒子朝敗故敬王使人告間暇於晉庚戌還吕氏曰當時王必以為無假晉師故使之閒晉師歸而子朝之勢復熾若因郊之潰遂取子朝不如後日之難也胡氏曰既不書大夫之名氏又不稱師而曰晉人微之也所謂以其事而微之也張氏曰既不書晉師之納王又不書郊潰而特書晉人圍郊則晉之勤王不力縱賊不誅以貽後患之罪具見矣夏六月蔡侯東國卒于楚東國假楚以計篡國今朝楚而卒于楚屈已事讎不二年身死于外亦可誅也東國卒昭侯申立秋七月莒子庚輿來奔左氏傳庚輿虐而好劒苟鑄劒必試諸人國人患之又將叛齊烏存莒大夫率國人逐之烏存執殳道左庚輿過之遂出奔幸而免耳齊人立郊公為君而不仁幾何而不亡其國庚輿入國不書書出奔惡之也郊公出入皆不書微之也戊辰吳敗頓胡沈蔡陳許之師于雞父音甫楚地安豐縣胡子髠沈子逞滅獲陳夏齧左氏傳吳人伐州來楚邑楚薳越帥師及諸侯之師奔命救州來吳人禦諸鍾離子瑕卒楚令尹楚師熸音尖火滅為熸言軍中無氣勢吳公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲已是以來吾聞之曰作事威克其愛雖小必濟胡沈之君幼而狂陳大夫齧壯而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不一七國同役而不同心帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威示之以不整以誘之後者敦陳整旅敦厚也吳子從之戊辰晦戰于雞父吳以罪人三千先犯胡沈與陳囚徒不習戰以示不整三國爭之吳為三軍以繫於後中軍從王光帥右掩餘吳壽夢子帥左吳之罪人或奔或止三國亂吳師擊之三國敗獲沈胡之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之吳師三國奔楚師大奔同書其敗不以國分而以君大夫為序書其死不以事而以君臣為别皆取以辨上下定民志書胡沈以自滅為文皆以其自取滅亡深惡之也計不書楚者吳知楚令尹亡將卑而六國心不一以譎又以晦日忌戰出其不意不待成列先誘三國戰三國敗而獲其君諸侯奔而楚師亦奔故不書也傳初言薳越帥師及諸侯之師救州來則楚師同在此也楚雖不喪師而大奔亦敗也不然薳越何肯自獈而不歸也經特以楚未嘗與吳戰故不書楚天王居于狄泉尹氏立王子朝天王王猛之母弟敬王丐也既葬踰年臣子可以天王稱之矣經直書之所以明天下之君也居狄泉以避子朝也狄泉今洛陽城內太倉西南池水也時在城外居此言未得京師也尹氏尹文公圉周世卿也不書爵不書名字曰尹氏譏世卿也書尹氏立王子朝猶曰尹氏所欲立也將欲王天下而尹氏以世卿擅國獨欲立之則莫之與矣經既書天王居于狄泉繼云尹氏立王子朝篡辭也其惡不待貶而自見矣八月乙未地震地震凡五詳見文公九年冬公如晉至河有疾乃復公七如晉一見止四見拒而不得入今書有疾乃復公羊氏所謂殺恥也因有疾以殺畏晉之恥能公纍如晉而纍有見卻之辱曽不知愧微弱之甚豈自立哉宜乎見制權臣而卒于外也二十有四年癸未春王二月丙戌仲孫貜俱縳切卒孟僖子也婼至自晉公羊作叔孫舍胡氏從之至晉執婼而釋之以歸故書其夏五月乙未朔日有食之秋八月大雩傳旱也丁酉杞伯郁釐卒公羊作鬱釐冬吳滅巢左氏傳楚子為舟師以略吳疆行吳疆界將侵之沈尹戍曰此行也楚必亡邑不撫民而勞之吳不動而速之吳踵楚而疆場無備邑能無亡乎王及圉陽而還吳人踵楚而邊人不備遂滅巢及鍾離而還沈尹戍曰亡郢之始於此在矣王一動而亡二姓之帥亡守巢鍾離二大夫幾如是而不及郢胡氏曰巢楚附庸實邑之也書吳入州來著陵楚之漸書吳入巢著入郢之漸四鄰封境之守既不能制則封境震矣四境國都之守既不能保則國都危矣故沈尹戍以此為亡郢之始也葬杞平公二十有五年甲申春叔孫婼如宋夏叔詣㑹晉趙鞅宋樂大心衛北宫喜鄭游吉曹人邾人滕人薛人小邾人于黃父案左氏傳鄭子太叔見晉范獻子獻子曰若王室何對曰王室之不寧晉之恥也獻子懼而與宣子圖之乃徵㑹於諸侯期以明年二十五年㑹于黃父謀王室也反王室之亂今四載矣晉為方伯帥諸侯勤王平難特掌耳乃命大夫出師圍郊之後不出者又二年王子朝之黨日熾敬王出居狄泉有東王西王之分二十四年三月方使士景伯問周始絶子朝之使及六月鄭子太叔至晉有言方議明年徵㑹黃父又皆使大夫往養亂至數年而後定京洛交戰喋血敬王出入靡定晉侯曽不以王室為憂愧乎厥祖文公矣果以大夫而定王國政在大夫權移于下實啓將來之禍未艾也黃父即黑壤晉地有鸜鵒來巢公羊鸜作鸛大左氏傳有鸜鵒來巢書所無也師已魯夫曰童謠有之鸜之鵒之公出辱之鸜鵒之羽公在外野云云公羊傳記異也何異爾非中國之禽也宜穴又巢也何氏曰宜穴又巢權臣自下居上之微也其後卒為季氏所逐范氏曰鸜鵒不渡濟非中國之禽故曰來飛之類屬陽得氣之先鸜鵒不踰濟今至魯其徵見矣書有以非所當有書來巢非所當巢物失其性而反其常異之大也季氏以臣抗君昭公出外是其應也秋七月上辛大雩季辛又雩左氏傳再雩旱甚也而魯旱甚不聞省躬修政從事禱祠之末一月而再雩瀆神者數烏能消變也九月己亥公孫于齊次于陽州魯昭孱弱不能自立久矣一旦不忍一朝之忿謀於羣小欲去强悍之季氏何不思之甚也季氏擅權凡四世矣得衆之久豈易圖之昔宣公末年歸父欲張公室而未能豈區區稠父所能去之哉宜乎見逐于外也書孫于齊不言奔諱之也次止也次于陽州待齊命也陽州齊魯境上地齊侯唁公于野井左氏傳齊侯將唁公于平陰平陰齊地在濟北今東平府平陰縣公先至于野井濟南府禹城縣東野井亭齊侯曰寡人之罪也使有司待于平陰為近故也杜氏注齊侯唁公公不敢逺勞故逆之往至野井唁慰安之也生事曰唁死事曰弔昭公不量力欲攻季氏不克為季氏迫脅而出往齊求援欲假齊之力伐季氏齊侯逺唁禮與辭雖足觀特末耳而卒無為公討强臣復國之實意豈非陰與季氏乎經書唁公實貶齊侯也冬十月戊辰叔孫婼卒叔孫昭子魯之良大夫也昭公孫于齊昭子自闞歸見季孫謀納公季孫許之而異志昭子憤其見欺祈死于宗戊辰卒杜氏曰恥為平子所欺因祈而自殺十有一月己亥宋公佐卒于曲棘左氏傳宋元公將為公故如晉己亥卒于曲棘公羊傳曲棘者何宋之邑諸侯卒其封內不地此何以地憂內也時宋公聞昭公見逐欲憂納之至曲棘而卒故録之杜氏注陳留外黃縣城中有曲棘里外黃城在開封雍邱縣胡氏傳宋元季孫意如之外舅元公夫人曹氏生女妻意如不此之顧而欲納公是以正倫恤患為心而不恤其私親者也其賢於當時諸侯逺矣故卒于封內而特書其地以别之也十有二月齊侯取鄆鄆季氏邑魯之所有齊侯取以處公也外取邑不書此何以書為公取之也外取邑稱人齊獨稱侯者以齊有方伯討不登畔人之意所以異之也惜乎齊侯不能以義討季氏使公得復國而徒假之以力取邊邑以居之非正也故書取焉取易辭也魯昭不能取而齊能取之以此見昭之微弱不能自有其國而他人是望可哀也已二十有六年乙酉春王正月葬宋元公杜氏注三月而葬速三月公至自齊居于鄆公孫于齊次于陽州陽州齊魯境上齊侯來見之亦可以言至自齊也今居鄆則入魯境其書至宜也猶在外故書地見為季氏所拒而不得入國也凡公行反而告廟則書至在外雖不告而書至所以存公也胡氏謂書居于鄆者存一國之防也諸侯之於封國四境之內莫非其土非大夫所得專也居齊侯逺唁昭公盡其辭禮而實有拒之之意取鄆以之使之於魯境僅得有所處而其實陰與季氏使之得以恣其專齊侯無急義救患之心洞見矣經止書實事而義見於言外季氏之罪自可知也夏公圍成成孟氏邑也孟氏得民久矣公假齊師之力圍之者成不服而拒守也見國內知有季氏而不知有昭公也秋公㑹齊侯莒子邾子杞伯盟于鄟陵鄟音專又音團左氏傳謀納公也見此參盟也自齊桓以來未之有也於是再見其再何晉不復主盟矣晉不復主盟而後齊專盟矣公至自㑹居于鄆公圍成而鄟陵之㑹至書居于鄆明不得成也率謀納公已而不果納公復居于鄆九月庚申楚子居卒平王卒子昭王軫立冬十月天王入于成周尹氏召伯毛伯以王子朝奔楚案傳晉師克鞏召伯盈逐王子朝天王入于成周盈本黨子朝知其不成更逐之而逆敬王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚定五年王人殺子朝于楚成周今在洛陽城東三十餘里故城即周公所營下都也王城今河南城武王定鼎于郟鄏至成王在豐使召伯先相宅卜澗水東瀍水西而營洛邑是為王城子朝作亂居王城今雖奔楚尚有餘黨敬王畏之徙都成周經不言歸而言入以著即位于外也亂之萌也皆景王寵庶孽以搆禍其危甚矣亂至數年而後定聖筆特書于魯史以垂世戒也二十有七年丙戌春公如齊自鄆行也公至自齊居于鄆左氏傳言在外也公在外邑故書地夏四月吳弒其君僚左氏傳吳子欲因楚喪而伐之使公子掩餘公子燭庸帥師圍潛楚邑使延州來季子聘于上國楚莠尹然工尹麇音君帥師救潛吳師不能退吳公子光曰此時也弗可失也告鱄設諸曰我王嗣也吾欲求之夏四月光伏甲於堀室而享王鱄讒諸置劒於魚中以進抽劒刺王鈹交於胸遂弒王吳公子掩餘奔徐公子燭庸奔鍾吾皆僚母弟吳子夀夢四子長諸樊次餘祭次夷末次季札光諸樊之子僚夷末之子諸樊兄弟以次相及必欲致國季子而季子終不受則宜歸之光不當立僚也故春秋不書光弒僚而稱國以弒者罪當時秉政之大臣也大臣置君使內外物議厭服庶幾國本定而不搖若出於私意立非其正未必不貽禍將來也經之稱國以弒其旨微矣楚殺其大夫郤宛案傳稱郤宛直而和國人說之令尹子常賄而信讒宛為費無極所惡讒之於子常設詭計陷之而宛不察甲兵豈宴享贈遺之物無極俾陳之以與子常無異戲兒童而宛特信之何蔽之甚也宜其蹈殺身之禍是時楚平昏虐囊瓦貪殘以無罪而殺楚之良俾讒譖得以肆其毒故稱國以殺罪纍上也秋晉士鞅宋樂祁犁衛北宫喜曹人邾人滕人㑹于扈案傳㑹于扈令戍周且謀納公也宋樂祁犁衛北宫喜皆利納公固請之士鞅取貨於季孫拒之曰二子皆圖國者也而納魯君請從二子圍魯無成死之二子懼皆辭乃辭小國而以難復季孫逐君衆所疾惡范鞅貪而志賂反道季氏之善使少知義肯如是乎其人不足取也然經無貶辭以有戍周之善故序而不略也文十五年諸侯伐齊齊賂晉不克還經於是略而不序扈京兆府鄠縣扈鄉冬十月曹伯午卒悼公卒弟聲公野立邾快來奔快邾大夫不氏略之也邾之臣來奔者書之邾與魯鄰國而聚其逋逃經悉書之以示譏也公如齊自鄆行公至自齊居于鄆二十有八年丁亥春王三月葬曹悼公六月而葬緩公如晉次于乾侯乾侯在魏郡晉境內邑不公如晉求援次于乾侯以待命晉答焉此明年所以復居于鄆也公連年如齊而不見禮今又如晉而不得入其窮辱若此齊甥舅之國而晉又盟主皆與季氏而不見恤中國之伯政衰矣公至晉子家子諸次竟以待命而公弗聽晉人諸復于境而後逆公已在外有一子家而不用其言則公之自任以取辱宜矣夏四月丙戌鄭伯寧卒定公卒獻公蠆立六月葬鄭定公三月而葬速秋七月癸已滕子寧卒悼公卒頃公結立冬葬滕悼公二十有九年戊子春公至自乾侯居于鄆杜氏曰以乾侯至不得見晉侯故今前此公次于陽州而書公至自齊者齊侯見公也言至自乾侯者晉侯不見公也所以深罪晉也齊侯使高張來唁公唁公不得入于晉也高張高偃子於唁公稱主君大夫稱主君比魯公大夫子家子曰齊卑君矣君祗辱焉公如乾侯公為齊所卑故復適晉冀晉見恤公如晉次于乾侯再如晉亦不納公既無所往姑次于乾侯昭公至自齊居于鄆三至自㑹居于鄆一至自乾侯居于鄆一書至書居所以存君也公播越于外不獲其所而魯國君臣之義其可絶乎下書公在乾侯亦此意也晉諸侯失國託於諸侯禮也諸侯失國諸侯納之正也坐視而不之救齊徒唁之而未嘗見恤亦何濟也夏四月庚子叔詣卒秋七月冬十月鄆潰潰散也民散而逃去也公居鄆四年無德以懷其民民畏季氏之威而不安嘗以公而敗于且音苴知矣今潰而叛去之公尺地一民無有也往于乾侯聊復寄耳書鄆潰如鄭棄其師梁亡是也三十年己丑春王正月公在乾侯經每嵗首月書公在乾侯者存公也公居于鄆猶魯地也客寄乾侯晉地也非其所矣必言公之所在不與季氏之專國也其罪權臣貶諸侯之意具見矣襄二十九年春王正月公在楚以其留於夷狄為失其所故亦書其所在因以譏之也今之書在以公在外不敢遽無公也其於君父之義盡矣夏六月庚辰晉侯去上聲疾卒頃公卒定公午立秋八月葬晉頃公三月而葬速冬十有二月吳滅徐徐子章羽奔楚案傳吳子執鍾吾子遂伐徐己卯滅徐徐子章羽斷其髮擕其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚楚沈尹戍帥師救徐不及遂城夷使徐子處之常山劉氏曰齊滅談談子奔莒楚滅弦弦子奔黃狄滅溫溫子奔衛國滅君奔皆不名春秋之世强陵弱衆暴寡而滅人之國其君力有不勝而奔者於其國義未絶也訴於天子方伯則理可伸而邦可復矣焉可遽絶之哉唯徐子章羽獨名者以既服吳而奔楚安有興復之志乎故名之以著其絶也三十有一年庚寅春王正月公在乾侯季孫意如㑹晉荀躒音厯于適厯適音的晉地左氏傳晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉侯召季孫獻子使私焉曰子必來我受其無咎季孫意如㑹晉荀躒于適厯荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君言魯君若以臣為有罪請囚于費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心扈之㑹晉欲納公范獻子受季孫之貨而還季孫必用意深結獻子今晉使荀躒來將以納公而獻子又私謂季孫令必來季孫如㑹何晉不罪季孫反與之㑹皆季孫善於要結晉卿為之蒙蔽而不見其惡季孫包藏姦慝善於言辭繆為禮遜所謂象恭滔天者也晉定為下所蔽不能燭其姦其昏可知安能主夏盟矣夏四月丁巳薛伯榖卒襄二十五年薛與盟故書獻公卒子襄公定立晉侯使荀躒唁公于乾侯左氏傳季孫從知伯即荀躒知乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人謂季孫已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐言晉君恐不獲納君之罪敢與知魯國之難臣請復於寡君退而謂季孫君怒未怠子姑歸祭言且歸攝君事子家子曰君以一乘入于魯師季孫必與君歸公欲從之衆從者脅公不得歸耳魯昭既出如齊如晉皆不見納徒使使來唁特虛禮昭之庸劣執蔽固不足道君也季氏以臣出君可乎齊晉不明君臣之義為季氏要結其卿以自固卒之寵姦成亂不知從自及也秋葬薛獻公冬黑肱以濫來奔杜氏注濫東海昌慮縣不書邾史闕文左氏傳邾黑肱以濫來奔賤而書名重地也許氏曰邾快黑肱相繼來奔季孫當國以類至也十有二月辛亥朔日有食之三十有二年辛卯春玉正月公在乾侯取闞口暫反杜氏注公居乾侯遣人取之石氏曰非公意也如取鄫取鄆之比杜氏誤闞東平須昌縣有闞城魯羣公墓地今東平府須城縣東平鄆州闞昭公之難叔孫自闞歸定元年季孫使役如公氏將溝焉蓋魯地也夏吳伐越左氏傳始用師於越也史墨曰不及四十年越其有吳乎越得嵗而吳伐之必受其凶嵗嵅星也此年嵗在星紀星紀吳越之分也嵗星所在其國有福吳先用兵故反受其殃哀二十二年越果滅吳去此三十八嵗伐吳報越昭五年從楚來之憾秋七月冬仲孫何忌㑹晉韓不信齊高張宋仲幾衛世叔申鄭參曹人莒人薛人杞人小邾人城成周左氏傳秋八月王使富辛與石張如晉請城成周范獻子謂魏獻子曰與其戍周不如城之雖有後事晉勿與知可也冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周己丑士彌牟營成周計丈數計所當城之文數揣高卑度高曰揣度厚薄仞溝洫度深曰仞物土方物相也相取土之方面議逺邇議役徒之逺邇量事期知事幾時畢計徒庸知用幾人功慮財用知費幾財用書餱糧知用幾糧食以令役於諸侯屬役賦丈賦所當城丈尺書以授帥而更效諸劉子帥諸侯之大夫效致也韓簡子臨之以為成命榖梁傳天子微諸侯不享覲天子之在者惟祭與號故諸侯之大夫相帥以成之此變之正也孫氏曰城成周者不與大夫城京師也天子微諸侯又微故諸侯不城京師而大夫城之是天敬下無諸侯也故云諸侯之大夫城成周以惡之張氏田王遷都成周因諸大夫城之而以成周書紀實也十有二月己未公薨于乾侯左氏傳書曰公薨于乾侯言失其所也不薨路寢為失所魯自季友受費為上卿至于意如專執國命四世矣昭公憤其太專攻之不克而出如齊如晉求援而不見答晉雖欲納公不思逐季氏使公從晉而入亦仍制於季氏故昭公不肯入而卒客死于外而當世之於季氏則亦莫之罪也吁人心至此禮義絶滅惟知有勢利耳故經于公之出魯國政事皆不載但書公所在蓋聖筆誅權臣存大義也讀春秋編卷十
